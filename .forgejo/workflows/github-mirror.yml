name: GitHub Mirror

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      MIRROR_REPOSITORY: git@github.com:carverauto/serviceradar-forgejo.git
      MIRROR_SSH_PRIVATE_KEY: ${{ secrets.GITHUB_MIRROR_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate mirror credentials
        run: |
          set -euo pipefail
          if [[ -z "${MIRROR_SSH_PRIVATE_KEY:-}" ]]; then
            echo "GITHUB_MIRROR_SSH_PRIVATE_KEY secret is not configured." >&2
            exit 1
          fi

      - name: Configure SSH for GitHub
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${MIRROR_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          ssh-keyscan -H github.com >> "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"
          {
            echo "GIT_SSH_COMMAND=ssh -i ${HOME}/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          } >> "${GITHUB_ENV}"

      - name: Configure mirror remote
        run: |
          set -euo pipefail
          git remote remove github-mirror 2>/dev/null || true
          git remote add github-mirror "${MIRROR_REPOSITORY}"

      - name: Mirror default branch
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail
          git fetch origin main --tags
          git push --force github-mirror refs/remotes/origin/main:refs/heads/main

      - name: Mirror tags on manual sync
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue
            git push --force github-mirror "refs/tags/${tag}:refs/tags/${tag}"
          done < <(git tag -l)

      - name: Mirror pushed tag
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git push --force github-mirror "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
