name: Publish OCI Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional extra tag to apply to all pushed images (e.g. v1.2.3)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: arc-runner-set
    env:
      BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
      OCI_REGISTRY: registry.carverauto.dev
      OCI_PROJECT: serviceradar
      OCI_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
      OCI_TOKEN: ${{ secrets.HARBOR_ROBOT_SECRET }}
      BAZELISK_HOME: ${{ github.workspace }}/.cache/bazelisk
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Bazel artifacts
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BAZELISK_HOME }}
            third_party/bazel-repo-cache
            third_party/bazel-disk-cache
            third_party/distdir
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Install build dependencies
        run: |
          ensure_pkg_config() {
            if command -v pkg-config >/dev/null 2>&1; then
              return
            fi

            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get install -y pkg-config
            elif command -v dnf >/dev/null 2>&1; then
              if ! sudo dnf install -y pkgconfig; then
                sudo dnf install -y pkgconf-pkg-config
              fi
            elif command -v yum >/dev/null 2>&1; then
              if ! sudo yum install -y pkgconfig; then
                sudo yum install -y pkgconf-pkg-config
              fi
            elif command -v microdnf >/dev/null 2>&1; then
              if ! sudo microdnf install -y pkgconfig; then
                sudo microdnf install -y pkgconf-pkg-config
              fi
            else
              echo "pkg-config is required but no supported package manager was found." >&2
              exit 1
            fi
          }

          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y build-essential pkg-config libssl-dev protobuf-compiler cmake flex bison
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y gcc gcc-c++ make openssl-devel protobuf-compiler cmake flex bison
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y gcc gcc-c++ make openssl-devel protobuf-compiler cmake flex bison
          elif command -v microdnf >/dev/null 2>&1; then
            sudo microdnf install -y gcc gcc-c++ make openssl-devel protobuf-compiler cmake flex bison
          else
            echo "Unsupported package manager; please install gcc, g++ (or clang), make, OpenSSL headers, pkg-config, cmake, flex, bison, and protoc manually." >&2
            exit 1
          fi

          ensure_pkg_config
          protoc --version || (echo "protoc installation failed" && exit 1)

      - name: Install Bazelisk
        run: ./scripts/install-bazelisk.sh

      - name: Verify Bazel version
        run: |
          set -euo pipefail
          expected="$(tr -d '\r\n' < .bazelversion)"
          actual="$(bazel --version | awk '{print $NF}')"
          echo "Expected Bazel: ${expected}"
          echo "Resolved Bazel: ${actual}"
          test "${actual}" = "${expected}"

      - name: Configure BuildBuddy remote cache
        if: ${{ env.BUILDBUDDY_ORG_API_KEY != '' }}
        run: |
          umask 077
          printf 'common --remote_header=x-buildbuddy-api-key=%s\n' "${BUILDBUDDY_ORG_API_KEY}" > .bazelrc.remote

      - name: Resolve release tag
        id: release
        env:
          WORKFLOW_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || '' }}
        run: |
          tag="$WORKFLOW_INPUT"
          if [[ -z "$tag" && "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Authenticate Docker for OCI registry
        run: |
          set -euo pipefail
          login_registry() {
            local user="${1:-}"
            local token="${2:-}"
            if [[ -z "${user}" || -z "${token}" ]]; then
              return 1
            fi
            echo "${token}" | docker login "${OCI_REGISTRY}" -u "${user}" --password-stdin
          }

          if [[ -z "${OCI_USERNAME:-}" || -z "${OCI_TOKEN:-}" ]]; then
            echo "Missing Harbor robot credentials. Set HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET." >&2
            exit 1
          fi

          login_registry "${OCI_USERNAME}" "${OCI_TOKEN}"

          export OCI_DOCKER_AUTH=""
          unset OCI_DOCKER_AUTH || true
          {
            echo "OCI_USERNAME=${OCI_USERNAME}"
            echo "OCI_TOKEN=${OCI_TOKEN}"
            echo "OCI_DOCKER_AUTH="
          } >> "${GITHUB_ENV}"

          chmod +x ./buildbuddy_setup_docker_auth.sh
          ./buildbuddy_setup_docker_auth.sh

      - name: Build (no publish)
        run: |
          bazel build \
            --config=remote \
            -c opt \
            //:images

      - name: Publish images
        env:
          EXTRA_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          cmd=(bazel run --config=remote -c opt --stamp //:push)
          if [[ -n "${EXTRA_TAG}" ]]; then
            cmd+=(-- --tag "${EXTRA_TAG}")
          fi
          "${cmd[@]}"

          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq skopeo >/dev/null 2>&1
          fi

          verify_tags=(latest "sha-${GITHUB_SHA}")
          if [[ -n "${EXTRA_TAG}" ]]; then
            verify_tags+=("${EXTRA_TAG}")
          fi
          ./scripts/verify-ghcr-publish.sh "${verify_tags[@]}"

      - name: Summarize pushed tags
        env:
          EXTRA_TAG: ${{ steps.release.outputs.tag }}
        run: |
          printf 'Published tags include:\n'
          printf '  - latest\n'
          sha_prefix="${GITHUB_SHA:0:12}"
          printf '  - sha-%s\n' "${sha_prefix}"
          if [[ -n "${EXTRA_TAG}" ]]; then
            printf '  - %s\n' "${EXTRA_TAG}"
          fi
