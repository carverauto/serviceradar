name: Golang Tests
on:
  push:
    paths-ignore:
      - 'rust/**'  # Ignore changes in the Rust project directory

permissions:
  contents: write

jobs:
  test-go:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
      - name: Run Go Tests
        run: |
          go test -timeout=45s -race -count=10 -failfast -shuffle=on -short ./... -coverprofile=./cover.short.profile -covermode=atomic -coverpkg=./...
          go test -timeout=120s -race -count=1 -failfast -shuffle=on ./... -coverprofile=./cover.long.profile -covermode=atomic -coverpkg=./...
        env:
          GOFLAGS: "-tags=ci"
