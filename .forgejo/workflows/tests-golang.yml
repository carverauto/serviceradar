name: Golang Tests
on:
  push:
    paths-ignore:
      - 'rust/**'  # Ignore changes in the Rust project directory

permissions:
  contents: write

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run Go Tests
        run: |
          go test -timeout=15s -race -count=10 -failfast -shuffle=on -short ./... -coverprofile=./cover.short.profile -covermode=atomic -coverpkg=./...
          go test -timeout=120s -race -count=1 -failfast -shuffle=on ./... -coverprofile=./cover.long.profile -covermode=atomic -coverpkg=./...
        env:
          GOFLAGS: "-tags=ci"
