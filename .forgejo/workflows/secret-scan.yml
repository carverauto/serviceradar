name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - staging
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: ./scripts/install-gitleaks.sh

      - name: Resolve scan scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event_name == 'push' && github.event.before || '' }}
          CURRENT_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
        run: |
          set -euo pipefail

          zero_oid='0000000000000000000000000000000000000000'
          mode='full-history'
          log_opts=''

          case "${EVENT_NAME}" in
            pull_request)
              mode='pull-request-range'
              log_opts="${PR_BASE_SHA}..${PR_HEAD_SHA}"
              ;;
            push)
              if [[ -n "${PUSH_BEFORE:-}" && "${PUSH_BEFORE}" != "${zero_oid}" ]]; then
                mode='push-range'
                log_opts="${PUSH_BEFORE}..${CURRENT_SHA}"
              else
                mode='full-history-bootstrap'
              fi
              ;;
            schedule)
              mode='full-history-scheduled'
              ;;
            workflow_dispatch)
              mode='full-history-manual'
              ;;
          esac

          {
            echo "mode=${mode}"
            echo "log_opts=${log_opts}"
          } >> "${GITHUB_OUTPUT}"

      - name: Run Gitleaks
        env:
          SCAN_MODE: ${{ steps.scope.outputs.mode }}
          SCAN_LOG_OPTS: ${{ steps.scope.outputs.log_opts }}
        run: |
          set -euo pipefail

          mkdir -p out/security/secrets
          report_path="out/security/secrets/gitleaks.json"

          cmd=(gitleaks git --no-banner --redact --report-format json --report-path "${report_path}")
          if [[ -n "${SCAN_LOG_OPTS:-}" ]]; then
            cmd+=(--log-opts "${SCAN_LOG_OPTS}")
          fi
          cmd+=(.)

          set +e
          "${cmd[@]}"
          exit_code=$?
          set -e

          {
            echo "## Secret Scan"
            echo
            echo "Mode: \`${SCAN_MODE}\`"
            if [[ -n "${SCAN_LOG_OPTS:-}" ]]; then
              echo "Commit range: \`${SCAN_LOG_OPTS}\`"
            else
              echo "Commit range: full history"
            fi
            echo "Report: \`${report_path}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          exit "${exit_code}"
