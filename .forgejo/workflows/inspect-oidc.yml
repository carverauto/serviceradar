name: Inspect OIDC Claims

on:
  workflow_dispatch:
    inputs:
      audience:
        description: "OIDC audience to request from Forgejo Actions"
        required: false
        type: string
        default: sigstore

permissions:
  contents: read
  id-token: write

jobs:
  inspect:
    runs-on: ubuntu-24.04
    enable-openid-connect: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Decode workflow OIDC token claims
        env:
          SIGSTORE_OIDC_AUDIENCE: ${{ github.event.inputs.audience || 'sigstore' }}
        run: |
          set -euo pipefail
          ./scripts/inspect-actions-oidc.sh | tee oidc-claims.json

      - name: Summarize relevant claims
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("oidc-claims.json").read_text(encoding="utf-8"))
          payload = data.get("payload", {})
          print("OK:", data.get("ok", False))
          print("Token source:", data.get("token_source", ""))
          print("Requested audience:", data.get("requested_audience", ""))
          for key, value in sorted(data.get("environment", {}).items()):
              print(f"{key}: {value}")
          if data.get("error"):
              print("Error:", data["error"])
          print("Issuer:", payload.get("iss", ""))
          print("Subject:", payload.get("sub", ""))
          print("Audience:", payload.get("aud", ""))
          for key in sorted(payload):
              if key in {"iss", "sub", "aud"}:
                  continue
              print(f"{key}: {payload[key]}")
          summary = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as fh:
              fh.write("## OIDC Inspection\n")
              fh.write(f"- ok: `{data.get('ok', False)}`\n")
              fh.write(f"- token_source: `{data.get('token_source', '')}`\n")
              fh.write(f"- requested_audience: `{data.get('requested_audience', '')}`\n")
              if data.get("error"):
                  fh.write(f"- error: `{data['error']}`\n")
              if payload:
                  fh.write(f"- issuer: `{payload.get('iss', '')}`\n")
                  fh.write(f"- subject: `{payload.get('sub', '')}`\n")
                  fh.write(f"- audience: `{payload.get('aud', '')}`\n")
          PY

      - name: Upload OIDC diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v3
        with:
          name: oidc-claims
          path: oidc-claims.json
          if-no-files-found: error
