name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
      OCI_REGISTRY: registry.carverauto.dev
      OCI_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
      OCI_TOKEN: ${{ secrets.HARBOR_ROBOT_SECRET }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      TEST_CNPG_DATABASE: serviceradar_web_ng_test
      BAZELISK_HOME: ${{ github.workspace }}/.cache/bazelisk

    steps:
      - name: Checkout
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
        run: |
          set -euo pipefail

          mkdir -p "${GITHUB_WORKSPACE}"
          cd "${GITHUB_WORKSPACE}"

          if [ -d .git ]; then
            git reset --hard
            git clean -ffdx
            if git remote get-url origin >/dev/null 2>&1; then
              git remote set-url origin "${REPO_URL}"
            else
              git remote add origin "${REPO_URL}"
            fi
          else
            find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            git init -q
            git remote add origin "${REPO_URL}"
          fi

          git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Install build dependencies
        run: |
          ensure_pkg_config() {
            if command -v pkg-config >/dev/null 2>&1; then
              return
            fi

            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get install -y pkg-config
            elif command -v dnf >/dev/null 2>&1; then
              if ! sudo dnf install -y pkgconfig; then
                sudo dnf install -y pkgconf-pkg-config
              fi
            elif command -v yum >/dev/null 2>&1; then
              if ! sudo yum install -y pkgconfig; then
                sudo yum install -y pkgconf-pkg-config
              fi
            elif command -v microdnf >/dev/null 2>&1; then
              if ! sudo microdnf install -y pkgconfig; then
                sudo microdnf install -y pkgconf-pkg-config
              fi
            else
              echo "pkg-config is required but no supported package manager was found." >&2
              exit 1
            fi
          }

          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y build-essential pkg-config libssl-dev protobuf-compiler cmake flex bison rpm rpm2cpio postgresql-client
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y gcc gcc-c++ make openssl-devel protobuf-compiler cmake flex bison rpm-build rpm postgresql
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y gcc gcc-c++ make openssl-devel protobuf-compiler cmake flex bison rpm-build rpm postgresql
          elif command -v microdnf >/dev/null 2>&1; then
            sudo microdnf install -y gcc gcc-c++ make openssl-devel protobuf-compiler cmake flex bison rpm-build rpm postgresql
          else
            echo "Unsupported package manager; please install gcc, g++ (or clang), make, OpenSSL headers, pkg-config, and protoc manually." >&2
            exit 1
          fi

          ensure_pkg_config
          command -v rpmbuild >/dev/null 2>&1 || (echo "rpmbuild installation failed" && exit 1)
          command -v psql >/dev/null 2>&1 || (echo "psql installation failed" && exit 1)
          protoc --version || (echo "protoc installation failed" && exit 1)

      - name: Setup Beam
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
        with:
          otp-version: "28.3"
          elixir-version: "1.19.4"

      - name: Setup Rust
        run: |
          set -euo pipefail

          export PATH="${HOME}/.cargo/bin:${PATH}"
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable
          fi

          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Bazelisk
        run: ./scripts/install-bazelisk.sh

      - name: Verify Bazel version
        run: |
          set -euo pipefail
          expected="$(tr -d '\r\n' < .bazelversion)"
          actual="$(bazel --version | awk '{print $NF}')"
          echo "Expected Bazel: ${expected}"
          echo "Resolved Bazel: ${actual}"
          test "${actual}" = "${expected}"

      - name: Report unavailable SRQL fixture secrets
        if: ${{ secrets.SRQL_TEST_DATABASE_URL == '' || secrets.SRQL_TEST_ADMIN_URL == '' || secrets.SRQL_TEST_DATABASE_CA_CERT == '' }}
        run: |
          {
            echo "## SRQL Fixture"
            echo
            echo "SRQL fixture secrets are unavailable in this workflow context."
            echo "Skipping fixture-dependent configuration and serviceradar_core integration tests."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Configure SRQL fixture database for tests
        if: ${{ secrets.SRQL_TEST_DATABASE_URL != '' && secrets.SRQL_TEST_ADMIN_URL != '' && secrets.SRQL_TEST_DATABASE_CA_CERT != '' }}
        env:
          SRQL_TEST_DATABASE_URL: ${{ secrets.SRQL_TEST_DATABASE_URL }}
          SRQL_TEST_ADMIN_URL: ${{ secrets.SRQL_TEST_ADMIN_URL }}
          SRQL_TEST_DATABASE_CA_CERT: ${{ secrets.SRQL_TEST_DATABASE_CA_CERT }}
        run: |
          set -euo pipefail

          if [ -z "${SRQL_TEST_DATABASE_URL:-}" ] || [ -z "${SRQL_TEST_ADMIN_URL:-}" ]; then
            echo "SRQL fixture DSNs must be configured via SRQL_TEST_DATABASE_URL and SRQL_TEST_ADMIN_URL secrets." >&2
            exit 1
          fi

          if [ -z "${SRQL_TEST_DATABASE_CA_CERT:-}" ]; then
            echo "SRQL_TEST_DATABASE_CA_CERT secret must be configured to verify SRQL fixture TLS." >&2
            exit 1
          fi

          ca_file="${RUNNER_TEMP}/srql-fixture-ca.crt"
          printf "%s" "${SRQL_TEST_DATABASE_CA_CERT}" > "${ca_file}"

          {
            echo "SRQL_TEST_DATABASE_URL=${SRQL_TEST_DATABASE_URL}"
            echo "SRQL_TEST_ADMIN_URL=${SRQL_TEST_ADMIN_URL}"
            echo "SRQL_TEST_DATABASE_CA_CERT=${SRQL_TEST_DATABASE_CA_CERT}"
            echo "PGSSLROOTCERT=${ca_file}"
            echo "CNPG_CA_FILE=${ca_file}"
            echo "SERVICERADAR_TEST_DATABASE_CA_CERT_FILE=${ca_file}"
            echo "SRQL_TEST_DATABASE_CA_CERT_FILE=${ca_file}"
          } >> "$GITHUB_ENV"

          parser="$(command -v python3 || command -v python || true)"
          if [ -z "${parser}" ]; then
            echo "python is required to parse SRQL fixture DSNs." >&2
            exit 1
          fi

          "${parser}" - <<'PY' >> "$GITHUB_ENV"
          import os
          from urllib.parse import urlparse, parse_qs

          def parse(url):
              u = urlparse(url)
              qs = parse_qs(u.query)
              return {
                  "user": u.username or "",
                  "password": u.password or "",
                  "host": u.hostname or "",
                  "port": str(u.port or 5432),
                  "sslmode": (qs.get("sslmode") or [""])[0],
              }

          db = parse(os.environ["SRQL_TEST_DATABASE_URL"])
          admin = parse(os.environ["SRQL_TEST_ADMIN_URL"])
          host = admin["host"] or db["host"]
          port = admin["port"] or db["port"]
          user = admin["user"]
          password = admin["password"]

          if not host or not user:
              raise SystemExit("SRQL_TEST_ADMIN_URL must include host and username")

          print(f"TEST_CNPG_HOST={host}")
          print(f"TEST_CNPG_PORT={port}")
          print(f"TEST_CNPG_USERNAME={user}")
          print(f"TEST_CNPG_PASSWORD={password}")
          print(f"CNPG_HOST={host}")
          print(f"CNPG_PORT={port}")

          sslmode = db["sslmode"] or "require"
          print(f"CNPG_SSL_MODE={sslmode}")
          print(f"CNPG_TLS_SERVER_NAME={host}")
          PY

      - name: Configure remote cache
        if: ${{ env.BUILDBUDDY_ORG_API_KEY != '' }}
        run: |
          umask 077
          printf 'common --remote_header=x-buildbuddy-api-key=%s\n' "${BUILDBUDDY_ORG_API_KEY}" > .bazelrc.remote

      - name: Configure Docker auth for Bazel pulls
        if: ${{ env.OCI_USERNAME != '' && env.OCI_TOKEN != '' || env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: ./buildbuddy_setup_docker_auth.sh

      - name: Test
        id: bazel_tests
        run: |
          mapfile -t bazel_targets < <(bazel query 'tests(//...) except attr("tags", "manual", tests(//...)) except set(//elixir/web-ng:precommit)')

          bazel test \
            --config=ci \
            --test_tag_filters=-manual \
            --test_output=streamed \
            --test_env=PGSSLROOTCERT \
            --test_env=PGSSLCERT \
            --test_env=PGSSLKEY \
            --test_env=SRQL_TEST_DATABASE_CA_CERT \
            "${bazel_targets[@]}"

      - name: Dump Bazel test logs
        if: ${{ failure() && steps.bazel_tests.conclusion == 'failure' }}
        run: |
          set +e

          if [ ! -d bazel-testlogs ]; then
            echo "bazel-testlogs not found"
            exit 0
          fi

          find bazel-testlogs -type f \( -name test.log -o -name test.xml \) | sort | while read -r file; do
            echo "===== ${file} ====="
            sed -n '1,400p' "${file}" || cat "${file}" || true
            echo
          done

      - name: web-ng precommit
        id: web_ng_precommit
        run: |
          bazel test \
            --config=ci \
            --test_output=streamed \
            //elixir/web-ng:precommit

      - name: Dump web-ng precommit logs
        if: ${{ failure() && steps.web_ng_precommit.conclusion == 'failure' }}
        run: |
          set +e

          if [ ! -d bazel-testlogs/elixir/web-ng ]; then
            echo "web-ng bazel-testlogs not found"
            exit 0
          fi

          find bazel-testlogs/elixir/web-ng -type f \( -name test.log -o -name test.xml \) | sort | while read -r file; do
            echo "===== ${file} ====="
            sed -n '1,400p' "${file}" || cat "${file}" || true
            echo
          done

      - name: serviceradar_core integration tests
        if: ${{ secrets.SRQL_TEST_DATABASE_URL != '' && secrets.SRQL_TEST_ADMIN_URL != '' && secrets.SRQL_TEST_DATABASE_CA_CERT != '' }}
        env:
          SRQL_TEST_DATABASE_URL: ${{ secrets.SRQL_TEST_DATABASE_URL }}
          SRQL_TEST_ADMIN_URL: ${{ secrets.SRQL_TEST_ADMIN_URL }}
          SRQL_TEST_DATABASE_CA_CERT: ${{ secrets.SRQL_TEST_DATABASE_CA_CERT }}
        run: |
          set -euo pipefail

          ca_file="${RUNNER_TEMP}/srql-fixture-ca.crt"
          printf "%s" "${SRQL_TEST_DATABASE_CA_CERT}" > "${ca_file}"

          export PGSSLROOTCERT="${ca_file}"
          export CNPG_CA_FILE="${ca_file}"
          export SERVICERADAR_TEST_DATABASE_CA_CERT_FILE="${ca_file}"
          export SRQL_TEST_DATABASE_CA_CERT_FILE="${ca_file}"

          ./scripts/test-integration.sh
