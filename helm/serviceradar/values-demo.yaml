# Demo Environment Values
# Consumed by ArgoCD via Helm `valueFiles`.

namespace: demo

topologySpread:
  enabled: true
  maxSkew: 2
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

global:
  # Demo uses an immutable ServiceRadar image tag so Kyverno can verify
  # signatures without requiring digest-pinned user-facing values.
  imageTag: "sha-217d693de66908133302bffea9a1091b03e45d87"
  imagePullPolicy: Always
  forceRolloutOnUpgrade: true

image:
  registryPullSecret: registry-carverauto-dev-cred

tools:
  enabled: true

natsCreds:
  autoGenerate: true

cnpg:
  storageClass: local-path-big
  pooler:
    enabled: true
    instances: 3
    monitoring:
      podMonitor:
        enabled: true
    parameters:
      ignore_startup_parameters: "search_path"
      max_client_conn: "2000"
      default_pool_size: "40"
      reserve_pool_size: "10"
      reserve_pool_timeout: "5"

logCollector:
  replicaCount: 3
  # Keep the shared events stream at 3 replicas in demo, but with a smaller
  # reservation so JetStream placement fits within the account budget.
  streamReplicas: 3
  streamMaxBytes: 1073741824
  tcpCollector:
    enabled: true
    replicaCount: 3
    streamReplicas: 3
  data:
    enabled: false
  probes:
    liveness:
      timeoutSeconds: 10
      failureThreshold: 6
    readiness:
      timeoutSeconds: 10
      failureThreshold: 6
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

agentGateway:
  enabled: true
  replicas: 3
  publicHostname: "demo-gw.serviceradar.cloud"
  service:
    type: LoadBalancer
    port: 50052
    externalTrafficPolicy: Local
    annotations:
      metallb.universe.tf/address-pool: k3s-pool
      external-dns.alpha.kubernetes.io/hostname: "demo-gw.serviceradar.cloud."

agent:
  enabled: true
  hostNetwork: false
  allowNetRaw: false
  pushInterval: "30s"
  statusDebounceInterval: "30s"
  statusHeartbeatInterval: "5m"
  resources:
    limits:
      memory: 4Gi
  checkersStorage:
    enabled: true
    basePath: "/var/lib/serviceradar/checkers"
    existingClaim: ""
    size: 2Gi
    storageClassName: ""

ingress:
  enabled: false
  host: demo.serviceradar.cloud
  className: nginx
  tls:
    enabled: true
    secretName: ""
    clusterIssuer: ""
gatewayApi:
  enabled: true
  mode: attach
  host: demo.serviceradar.cloud
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: serviceradar-shared-gateway
      namespace: serviceradar-system
      sectionName: https-web
  redirectParentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: serviceradar-shared-gateway
      namespace: serviceradar-system
      sectionName: http-web
  http:
    enabled: true
    redirectToHttps: true
  tls:
    enabled: true
    # Shared serviceradar edge terminates TLS with the wildcard cert in
    # serviceradar-system; demo only attaches routes.
    secretName: ""
    clusterIssuer: ""
  backendTrafficPolicy:
    enabled: true
    requestTimeout: 86400s
    requestBufferLimit: 100Mi
networkPolicy:
  enabled: true
  podSelectorMatchAll: true
  egress:
    allowDNS: true
    allowKubeAPIServer: true
    allowDefaultNamespace: true
    allowSameNamespace: true
    allowedCIDRs:
      - "10.0.0.0/8"
      - "192.168.0.0/16"
      # Allow GitHub API/web endpoints used by the repo release importer in web-ng.
      # Resolved on 2026-03-28:
      # - api.github.com -> 140.82.112.5
      # - github.com -> 140.82.113.3
      # GitHub serves these from the 140.82.112.0/20 range.
      - "140.82.112.0/20"
      # Allow GeoLite MMDB + rezmoss provider CIDR refresh from raw.githubusercontent.com
      # (resolved on 2026-02-28 to 185.199.108.133-111.133, summarized as 185.199.108.0/22).
      # Kubernetes NetworkPolicy can't allow by DNS name, so we allow the minimal known CIDR for this host.
      - "185.199.108.0/22"
      # Allow IEEE OUI refresh from standards-oui.ieee.org
      # (resolved on 2026-02-28 to 140.98.223.27).
      - "140.98.223.27/32"
      # Allow ARIN Whois-RWS ASN lookups from web-ng flow details modal.
      # whois.arin.net resolves (2026-02-28) to:
      # - 199.5.26.46
      # - 199.71.0.46
      # - 199.212.0.46
      - "199.5.26.46/32"
      - "199.71.0.46/32"
      - "199.212.0.46/32"
      # Allow RIPE Stat Whois API endpoint used for non-ARIN ASN fallback.
      # stat.ripe.net resolves (2026-02-28) to:
      # - 193.0.6.150
      # - 2001:67c:2e8:22::c100:696
      - "193.0.6.150/32"
      - "2001:67c:2e8:22::c100:696/128"
      # Allow ipinfo lite MMDB refresh from ipinfo.io. (Resolved as 34.117.59.81 on 2026-02-07.)
      # Note: this is a best-effort allowlist and may need adjustment if ipinfo changes their IPs.
      - "34.117.0.0/16"
      # ipinfo MMDB download currently redirects to dl.assets.ipinfo.io (Cloudflare).
      # Allow the observed /24s (resolved on 2026-02-07 to 104.18.22.73 and 104.18.23.73).
      # Note: Cloudflare anycast can change; if downloads fail again, re-resolve and update.
      - "104.18.22.0/24"
      - "104.18.23.0/24"
      # Allow AlienVault OTX API access for threat-intel sync/plugin checks.
      # otx.alienvault.com is served through CloudFront; Kubernetes NetworkPolicy
      # cannot allow by DNS name, so this tracks the observed CIDR from 2026-04-28.
      - "18.160.181.0/24"
  calicoLogDenied:
    enabled: true
    selector: "all()"
    order: 1000

geoipMmdb:
  enabled: true
  basePath: "/var/lib/serviceradar/geoip"
  existingClaim: ""
  size: 1Gi
  storageClassName: ""

webNg:
  replicas: 3
  database:
    poolSize: 8
    queueTargetMs: 2000
    queueIntervalMs: 2000
    timeoutMs: 120000
    poolTimeoutMs: 120000
  obanEnabled: true
  obanQueues:
    default: 1
    alerts: 1
    serviceChecks: 1
    notifications: 1
    onboarding: 1
    events: 1
    sweeps: 1
    edge: 1
    integrations: 1
    maintenance: 1
  godView:
    runtimeGraphRefreshMs: 30000
    runtimeGraphAutoRefresh: true
  firstPartyPluginImport:
    autoSyncEnabled: true
    syncReleaseLimit: 20
    syncIntervalSeconds: 3600
    cosignPublicKey: |
      -----BEGIN PUBLIC KEY-----
      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEhJcdPbybyipSl8sNHSKStAYiqhP7
      cp6jIdZ3L4AkL/WI9oFn5xqJSnwTC29cz+JN/bXzWE807+iPS/DOl3C9EQ==
      -----END PUBLIC KEY-----
    registryDockerConfigSecret: registry-carverauto-dev-cred
  gatewayAddress: "demo-gw.serviceradar.cloud:50052"
  agentReleasePublicKey: "ZY2//cpkD3oVdC6q4Cg6lN1I2M6SgmDMzL4QyQjptH8="
  extraEnv:
    # City MMDB is large; we only enable it in demo where we can allocate more memory.
    GEOLITE_CITY_ENABLED: "true"
    # Trust first-party Wasm upload signatures published by the release pipeline.
    PLUGIN_TRUSTED_UPLOAD_SIGNING_KEYS: "serviceradar-first-party-v1=L+H5fG0eEraBsWAd2aKMzK7I+AMhbnSxlOKny5/+dLo="
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "500m"
      memory: 2Gi
  devRoutes: "true"
  localMailer: "false"
  publicUrl: "https://demo.serviceradar.cloud"
  pluginStorage:
    enabled: true
    backend: "jetstream"
    basePath: "/var/lib/serviceradar/plugin-packages"
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
    downloadTtlSeconds: 86400
    jetstreamReplicas: 3

faker:
  enabled: true
  gobgp:
    enabled: false
    # Keep latest for demo iterations; pin to a digest/tag if reproducibility
    # requirements tighten.
    image:
      repository: docker.io/osrg/gobgp
      tag: latest
      pullPolicy: IfNotPresent
    binDir: /opt/gobgp
  simulation:
    totalDevices: 1000
    ipShuffle:
      enabled: true
      interval: "10m"
      percentage: 5
      warmupCycles: 2
      allowExpansion: false
      poolHeadroomPercent: 0
    bgp:
      enabled: false
      manageDaemon: false
      gobgpApiAddress: "serviceradar-gobgp:50051"
      gobgpBinary: "/opt/gobgp/gobgpd"
      gobgpCliBinary: "/opt/gobgp/gobgp"
      bmpCollectorAddress: "serviceradar-bmp-collector:11019"

gobgp:
  enabled: true
  image:
    repository: docker.io/osrg/gobgp
    tag: latest
    pullPolicy: IfNotPresent

core:
  replicas: 3
  clusterWebDnsQuery: "serviceradar-web-ng-headless.demo.svc.cluster.local"
  clusterGatewayDnsQuery: "serviceradar-agent-gateway-headless.demo.svc.cluster.local"
  database:
    poolSize: 10
  controlDatabase:
    enabled: true
    poolSize: 3
  obanQueues:
    default: 2
    maintenance: 1
    monitoring: 1
    alerts: 1
    serviceChecks: 2
    notifications: 1
    onboarding: 1
    events: 2
    sweeps: 2
    edge: 2
    integrations: 1
    natsAccounts: 1
  # MTR automation rollout profiles (copy/paste into mtrAutomation):
  # baseline_only:
  #   enabled: true
  #   baselineEnabled: true
  #   triggerEnabled: false
  #   consensusEnabled: false
  #   baselineTickMs: 60000
  #   consensusCohortRetentionMs: 300000
  # trigger_capture:
  #   enabled: true
  #   baselineEnabled: true
  #   triggerEnabled: true
  #   consensusEnabled: false
  #   baselineTickMs: 60000
  #   consensusCohortRetentionMs: 300000
  # full_consensus:
  #   enabled: true
  #   baselineEnabled: true
  #   triggerEnabled: true
  #   consensusEnabled: true
  #   baselineTickMs: 60000
  #   consensusCohortRetentionMs: 300000
  logPromotionConsumerEnabled: true
  mtrAutomation:
    enabled: true
    baselineEnabled: true
    triggerEnabled: false
    consensusEnabled: false
    baselineTickMs: 60000
    consensusCohortRetentionMs: 300000
  deviceEnrichment:
    rulesDir: "/var/lib/serviceradar/rules/device-enrichment"
    filesystemOverrides:
      # Keep enabled in demo so override mounts are consistently wired on upgrades.
      # Provide existingConfigMap/existingSecret/existingClaim when you want custom rules.
      enabled: true
  extraEnv:
    EVENT_WRITER_ENABLED: "true"
    EVENT_WRITER_NATS_CREDS_FILE: "/etc/serviceradar/creds/platform.creds"
    EVENT_WRITER_NATS_URL: "tls://serviceradar-nats:4222"
    EVENT_WRITER_NATS_TLS: "true"
    # Keep last-known topology visible in demo when external mapper agents are
    # briefly offline or being re-enrolled.
    SERVICERADAR_MAPPER_TOPOLOGY_EDGE_STALE_MINUTES: "10080"
    # City MMDB is large, but demo has headroom and it lets us enrich flows with city/region/lat/tz.
    GEOLITE_CITY_ENABLED: "true"

zenRulesBootstrap:
  # Safe to keep enabled again: the hook now skips unchanged rules in KV.
  enabled: true

dbEventWriter:
  replicaCount: 3
  cnpgMaxConnections: 4
  enableMigrations: false
  data:
    # db-event-writer is now queue-backed and stateless in demo.
    enabled: false
  kvBootstrap:
    # Disabled in demo: the post-upgrade KV seed job is not required for
    # steady-state upgrades and can leave Helm stuck in pending-upgrade.
    enabled: false

zen:
  replicaCount: 3
  streamReplicas: 3
  data:
    # zen now uses shared durable consumers instead of local singleton state.
    enabled: false

datasvc:
  replicaCount: 3
  jetstreamReplicas: 3
  # Demo stores little real KV/object data; keep reserved capacity small so the
  # rest of JetStream can also run at 3 replicas.
  bucketMaxBytes: 536870912
  objectMaxBytes: 268435456
  objectStoreBytes: 536870912
  data:
    # datasvc is safe to run stateless in demo because KV/object state lives in NATS.
    enabled: false

# Temporarily disabled client CA for initial testing - there's a circular dependency
# where CNPG needs the client CA secret, but the job that creates it
# runs post-install and needs CNPG to be running first.
# cnpg:
#   clientCASecret: serviceradar-cnpg-client-ca
#   clientCAFromCerts: true
#   requireClientCert: true

spire:
  enabled: false
  trustDomain: carverauto.dev
  clusterName: carverauto-cluster
  agent:
    hostNetwork: false
  postgres:
    enabled: false
    clusterName: cnpg
    instances: 3
    storageSize: 100Gi

prometheusRules:
  cnpg:
    enabled: true
    clusterName: cnpg
    labels:
      release: kube-prom
    backendsWaitingWarning: 5
    slowQueryLogThresholdMs: 500

observability:
  enabled: true
  prometheus:
    serviceMonitors:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
      targets:
        webNg:
          enabled: true
          path: /metrics
        core:
          enabled: true
          path: /metrics
        agentGateway:
          enabled: true
          path: /metrics
        flowCollector:
          enabled: false
          path: /metrics
    rules:
      enabled: true
      labels:
        release: kube-prom
      pgbouncer:
        clientsWaitingWarning: 1
        maxWaitSecondsWarning: 5
      core:
        scrapeDownFor: 5m
      agentGateway:
        scrapeDownFor: 5m
      webNg:
        scrapeDownFor: 5m
        restartWindow: 15m
        restartWarning: 1
  grafana:
    dashboards:
      enabled: true
      labels:
        grafana_dashboard: "1"
      annotations: {}
      folder: ServiceRadar

trapd:
  replicaCount: 3
  # trapd writes into the shared 3x events stream.
  streamReplicas: 3
  externalService:
    enabled: true
    annotations:
      metallb.universe.tf/address-pool: k3s-pool
    loadBalancerIP: "23.138.124.26"
    externalTrafficPolicy: Local

flowgger:
  externalService:
    enabled: true
    annotations:
      metallb.universe.tf/address-pool: k3s-pool
    loadBalancerIP: "23.138.124.24"
    externalTrafficPolicy: Local

flowCollector:
  enabled: true
  # IPFIX/NetFlow v9 templates are stateful per collector process. Keep the
  # external UDP ingress single-replica until collector-side exporter sharding
  # or shared template state is implemented.
  replicaCount: 1
  # flow-collector also reconciles the shared events stream.
  streamReplicas: 3
  config:
    stream_max_bytes: 1073741824
    stream_replicas: 3
  data:
    # flow collector is stateless in demo; raw flow durability is in JetStream.
    enabled: false
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/address-pool: k3s-pool
    loadBalancerIP: "23.138.124.25"
    externalTrafficPolicy: Local
    sessionAffinity: ClientIP
    sessionAffinityConfig:
      clientIP:
        timeoutSeconds: 10800
    ports:
      netflow:
        enabled: true
        port: 2055
        targetPort: 2055
        protocol: UDP
      sflow:
        enabled: true
        port: 6343
        targetPort: 6343
        protocol: UDP
      ipfix:
        enabled: false
        port: 4739
        targetPort: 4739
        protocol: UDP
      metrics:
        enabled: false
        port: 50046
        targetPort: 50046
        protocol: TCP

certs:
  regenerator:
    # Leave disabled in demo so pre-upgrade cert preservation is stable and
    # upgrades do not rotate the runtime CA unexpectedly.
    enabled: false

bmpCollector:
  enabled: true
  replicaCount: 3
  image:
    repository: registry.carverauto.dev/serviceradar/arancini
  args:
    - "--bmp-address=0.0.0.0:11019"
    - "--kafka-disable"
    - "--nats-enable"
    - "--nats-server=nats://serviceradar-nats:4222"
    - "--nats-subject=arancini.updates"
    - "--nats-tls-required"
    - "--nats-tls-ca-cert-path=/etc/serviceradar/certs/root.pem"
    - "--nats-tls-client-cert-path=/etc/serviceradar/certs/bmp-collector.pem"
    - "--nats-tls-client-key-path=/etc/serviceradar/certs/bmp-collector-key.pem"
    - "--curation-state-path=/var/lib/serviceradar/state.bin"
    - "--curation-snapshot-backend=local"
    - "-vvv"
  config:
    streamMaxBytes: 1073741824
    # Pods are HA, but the dedicated ARANCINI_CAUSAL stream still stays at a
    # single JetStream replica until that budget is sized separately.
    streamReplicas: 1
    natsTlsClientCertPath: "/etc/serviceradar/certs/bmp-collector.pem"
    natsTlsClientKeyPath: "/etc/serviceradar/certs/bmp-collector-key.pem"
  data:
    enabled: false
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/address-pool: k3s-pool
    loadBalancerIP: "23.138.124.27"
    externalTrafficPolicy: Local
nats:
  replicas: 3
