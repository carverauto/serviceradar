# Demo Environment Values
# Consumed by ArgoCD via Helm `valueFiles`.

namespace: demo

global:
  imageTag: "latest"
  imagePullPolicy: Always

image:
  registryPullSecret: ghcr-io-cred

agentGateway:
  enabled: true
  service:
    type: LoadBalancer
    port: 50052
    externalTrafficPolicy: Local
    annotations:
      metallb.universe.tf/address-pool: k3s-pool
      external-dns.alpha.kubernetes.io/hostname: "demo-gw.serviceradar.cloud."

agent:
  pushInterval: "30s"
  statusDebounceInterval: "30s"
  statusHeartbeatInterval: "5m"
  resources:
    limits:
      memory: 4Gi
  checkersStorage:
    enabled: true
    basePath: "/var/lib/serviceradar/checkers"
    existingClaim: ""
    size: 2Gi
    storageClassName: ""

ingress:
  enabled: true
  host: demo.serviceradar.cloud
  className: nginx
  tls:
    enabled: true
    # Use the wildcard cert from ingress-nginx namespace via default SSL cert.
    # Do NOT set clusterIssuer - it triggers cert-manager which hits rate limits
    # when namespaces are frequently recreated.
    secretName: ""
    clusterIssuer: ""

webNg:
  devRoutes: "true"
  localMailer: "true"
  publicUrl: "https://demo.serviceradar.cloud"
  pluginStorage:
    enabled: true
    basePath: "/var/lib/serviceradar/plugin-packages"
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
    downloadTtlSeconds: 86400

faker:
  simulation:
    totalDevices: 1000
    ipShuffle:
      enabled: true
      interval: "10m"
      percentage: 5
      warmupCycles: 2
      allowExpansion: false
      poolHeadroomPercent: 0

# Temporarily disabled client CA for initial testing - there's a circular dependency
# where CNPG needs the client CA secret, but the job that creates it
# runs post-install and needs CNPG to be running first.
# cnpg:
#   clientCASecret: serviceradar-cnpg-client-ca
#   clientCAFromCerts: true
#   requireClientCert: true

spire:
  enabled: true
  trustDomain: carverauto.dev
  clusterName: carverauto-cluster
  postgres:
    enabled: true
    clusterName: cnpg
    instances: 3
    storageSize: 100Gi

flowgger:
  externalService:
    enabled: true
    annotations:
      metallb.universe.tf/address-pool: k3s-pool

netflowCollector:
  enabled: true
  config:
    stream_max_bytes: 1073741824
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/address-pool: k3s-pool
