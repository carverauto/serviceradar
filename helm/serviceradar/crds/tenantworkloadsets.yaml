apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenantworkloadsets.workloads.serviceradar.io
spec:
  group: workloads.serviceradar.io
  scope: Namespaced
  names:
    plural: tenantworkloadsets
    singular: tenantworkloadset
    kind: TenantWorkloadSet
    shortNames:
      - tws
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - tenantId
                - tenantSlug
              properties:
                tenantId:
                  type: string
                tenantSlug:
                  type: string
                workloads:
                  type: array
                  items:
                    type: object
                    required:
                      - templateRef
                    properties:
                      templateRef:
                        type: string
                      replicas:
                        type: integer
                        format: int32
                      enabled:
                        type: boolean
