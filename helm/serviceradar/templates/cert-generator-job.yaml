apiVersion: batch/v1
kind: Job
metadata:
  name: serviceradar-cert-generator
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app: serviceradar-cert-generator
    spec:
      restartPolicy: OnFailure
      containers:
      - name: cert-generator
        image: alpine/openssl:latest
        command: ["/bin/sh"]
        args:
        - -c
        - |
          cp /scripts/generate-certs.sh /tmp/generate-certs.sh
          chmod +x /tmp/generate-certs.sh
          cd /certs
          /bin/sh /tmp/generate-certs.sh
        volumeMounts:
        - name: cert-scripts
          mountPath: /scripts
        - name: cert-data
          mountPath: /certs
        env:
        - name: CERT_DIR
          value: "/certs"
        - name: DEFAULT_PARTITION_ID
          value: {{ default "default" (default (dict) .Values.agent).partitionId | quote }}
        - name: DEFAULT_AGENT_COMPONENT_ID
          value: {{ default "k8s-agent" (default (dict) .Values.agent).agentId | quote }}
      volumes:
      - name: cert-scripts
        configMap:
          name: serviceradar-cert-scripts
          defaultMode: 0755
      - name: cert-data
        persistentVolumeClaim:
          claimName: serviceradar-cert-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: serviceradar-cert-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
