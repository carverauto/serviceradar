apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceradar-zen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serviceradar-zen
      app.kubernetes.io/part-of: serviceradar
  template:
    metadata:
      labels:
        app: serviceradar-zen
        app.kubernetes.io/part-of: serviceradar
      {{- if .Values.global.forceRolloutOnUpgrade }}
      annotations:
        serviceradar.io/release-revision: {{ .Release.Revision | quote }}
      {{- end }}
    spec:
      {{- include "serviceradar.topologySpread" . | nindent 6 }}
      {{- include "serviceradar.podSecurityContext" . | nindent 6 }}
      serviceAccountName: {{ .Values.spire.zenServiceAccount | default "serviceradar-zen" }}
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      containers:
      - name: zen
        image: registry.carverauto.dev/serviceradar/serviceradar-zen{{ include "serviceradar.imageRefSuffix" (dict "Values" .Values "service" "zen") }}
        imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
        {{- include "serviceradar.containerSecurityContext" . | nindent 8 }}
        ports:
        - containerPort: 50040
          name: grpc
        volumeMounts:
        - name: serviceradar-config
          mountPath: /etc/serviceradar
        - name: zen-rules
          mountPath: /etc/serviceradar/rules
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
        {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
        - name: nats-creds
          mountPath: /etc/serviceradar/creds
          readOnly: true
        {{- end }}
        - name: zen-data
          mountPath: /var/lib/serviceradar
        {{- if .Values.spire.enabled }}
        - name: spire-agent-socket
          mountPath: /run/spire/sockets
          readOnly: true
        {{- end }}
        env:
{{ include "serviceradar.kvEnv" . | indent 8 }}
        - name: CONFIG_PATH
          value: "/etc/serviceradar/zen.json"
        - name: NATS_URL
          value: "tls://serviceradar-nats:4222"
        - name: WAIT_FOR_NATS
          value: "false"
        - name: WAIT_FOR_KV
          value: "false"
        - name: SKIP_WAIT
          value: "true"
        - name: NO_WAIT
          value: "true"
        - name: KV_URL
          value: "serviceradar-datasvc:50057"
        - name: NATS_TLS
          value: "true"
        - name: USE_TLS
          value: "true"
        - name: RUST_LOG
          value: "info"
        {{- include "serviceradar.configSyncEnv" (dict "cfg" (default (dict) .Values.configSync.zen)) | nindent 8 }}
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          tcpSocket:
            port: 50040
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 50040
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: serviceradar-config
        configMap:
          name: serviceradar-config
      - name: zen-rules
        configMap:
          name: serviceradar-zen-rules
      - name: cert-data
        secret:
          secretName: {{ include "serviceradar.runtimeCertsSecretName" . | quote }}
      {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
      - name: nats-creds
        secret:
          secretName: serviceradar-nats-creds
      {{- end }}
      - name: zen-data
        persistentVolumeClaim:
          claimName: serviceradar-zen-data
      {{- if .Values.spire.enabled }}
      - name: spire-agent-socket
        hostPath:
          path: {{ include "serviceradar.spireSocketHostPath" . | quote }}
          type: DirectoryOrCreate
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-zen
spec:
  selector:
    app: serviceradar-zen
  ports:
  - name: grpc
    port: 50040
    targetPort: grpc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: serviceradar-zen-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.spire.zenServiceAccount | default "serviceradar-zen" }}
