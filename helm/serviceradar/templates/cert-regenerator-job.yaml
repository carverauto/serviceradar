{{- $certs := default dict .Values.certs -}}
{{- $regenerator := default dict (get $certs "regenerator") -}}
{{- if (default false (get $regenerator "enabled")) }}
{{- $certJobImage := default "registry.carverauto.dev/serviceradar/serviceradar-cnpg:18.3.0-sr2" .Values.cnpg.imageName -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: serviceradar-cert-regenerator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: serviceradar
    app.kubernetes.io/component: cert-regenerator
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: serviceradar-cert-regenerator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: serviceradar
    app.kubernetes.io/component: cert-regenerator
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: serviceradar-cert-regenerator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: serviceradar
    app.kubernetes.io/component: cert-regenerator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: serviceradar-cert-regenerator
subjects:
- kind: ServiceAccount
  name: serviceradar-cert-regenerator
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: serviceradar-cert-regenerator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: serviceradar
    app.kubernetes.io/component: cert-regenerator
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: serviceradar-cert-regenerator
        app.kubernetes.io/part-of: serviceradar
        app.kubernetes.io/component: cert-regenerator
    spec:
      restartPolicy: OnFailure
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: serviceradar-cert-regenerator
      containers:
      - name: cert-regenerator
        image: {{ $certJobImage | quote }}
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        env:
        - name: SECRET_NAME
          value: {{ include "serviceradar.runtimeCertsSecretName" . | quote }}
        - name: CERT_DIR
          value: "/tmp/certs"
        - name: FORCE_REGENERATE
          value: "true"
        - name: DEFAULT_PARTITION_ID
          value: {{ default "default" (default (dict) .Values.agent).partitionId | quote }}
        - name: DEFAULT_AGENT_COMPONENT_ID
          value: {{ default "k8s-agent" (default (dict) .Values.agent).agentId | quote }}
        - name: RUNTIME_CERT_LAYOUT_VERSION
          value: {{ default "1" (default (dict) .Values.certs).runtimeLayoutVersion | quote }}
        args:
        - |
          set -euo pipefail

          cat >/tmp/generate-certs.sh.b64 <<'EOF_SCRIPT_B64'
{{ tpl (.Files.Get "files/generate-certs.sh") . | b64enc | indent 12 }}
          EOF_SCRIPT_B64
          tr -d '[:space:]' </tmp/generate-certs.sh.b64 | base64 -d >/tmp/generate-certs.sh
          chmod +x /tmp/generate-certs.sh
          mkdir -p "${CERT_DIR}"
          bash /tmp/generate-certs.sh
          printf '%s' "${RUNTIME_CERT_LAYOUT_VERSION}" > "${CERT_DIR}/runtime-cert-layout-version"

          python3 <<'PY'
          import base64
          import json
          import os
          import ssl
          import urllib.error
          import urllib.request

          secret_name = os.environ["SECRET_NAME"]
          cert_dir = os.environ["CERT_DIR"]
          serviceaccount = "/var/run/secrets/kubernetes.io/serviceaccount"
          token = open(os.path.join(serviceaccount, "token"), encoding="utf-8").read().strip()
          namespace = open(os.path.join(serviceaccount, "namespace"), encoding="utf-8").read().strip()
          cafile = os.path.join(serviceaccount, "ca.crt")
          context = ssl.create_default_context(cafile=cafile)

          data = {}
          for root, _, files in os.walk(cert_dir):
            for entry in sorted(files):
              path = os.path.join(root, entry)
              key = os.path.basename(path)
              with open(path, "rb") as handle:
                data[key] = base64.b64encode(handle.read()).decode("ascii")

          payload = {"data": data}
          base_url = f"https://kubernetes.default.svc/api/v1/namespaces/{namespace}/secrets"
          secret_url = f"{base_url}/{secret_name}"
          headers = {
            "Authorization": f"Bearer {token}",
            "Content-Type": "application/merge-patch+json",
          }

          try:
            request = urllib.request.Request(secret_url, headers=headers, method="PATCH")
            urllib.request.urlopen(
              urllib.request.Request(
                secret_url,
                data=json.dumps(payload).encode("utf-8"),
                headers=headers,
                method="PATCH",
              ),
              context=context,
            ).read()
            print(f"Regenerated Secret {secret_name}")
          except urllib.error.HTTPError as exc:
            if exc.code != 404:
              raise
            body = {
              "apiVersion": "v1",
              "kind": "Secret",
              "metadata": {
                "name": secret_name,
                "labels": {
                  "app.kubernetes.io/part-of": "serviceradar",
                  "app.kubernetes.io/component": "runtime-certs",
                },
              },
              "type": "Opaque",
              "data": data,
            }
            create_headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
            }
            urllib.request.urlopen(
              urllib.request.Request(
                base_url,
                data=json.dumps(body).encode("utf-8"),
                headers=create_headers,
                method="POST",
              ),
              context=context,
            ).read()
            print(f"Created Secret {secret_name}")
          PY
{{- end }}
