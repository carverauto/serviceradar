{{- $agentVals := default (dict) .Values.agent -}}
{{- $agentSA := default "serviceradar-agent" $agentVals.serviceAccount -}}
{{- $agentResources := default (dict) $agentVals.resources -}}
{{- $agentStorage := default (dict) (get $agentVals "checkersStorage") -}}
{{- $agentLimits := default (dict) $agentResources.limits -}}
{{- $agentRequests := default (dict) $agentResources.requests -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceradar-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: serviceradar-agent
  template:
    metadata:
      labels:
        app: serviceradar-agent
      annotations:
        checksum/serviceradar-config: {{ include (print $.Template.BasePath "/serviceradar-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ $agentSA }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: init-checkers
          image: busybox:1.36
          command: ['sh', '-c', 'CHECKERS_DIR={{ default "/var/lib/serviceradar/checkers" $agentStorage.basePath }} && mkdir -p "${CHECKERS_DIR}" && cp /config/snmp.json "${CHECKERS_DIR}/snmp.json" && cp /config/external.json "${CHECKERS_DIR}/external.json" && cp /config/rperf-checker.json "${CHECKERS_DIR}/rperf-checker.json" && cp /config/zen-checker.json "${CHECKERS_DIR}/zen-checker.json" && cp /config/flowgger-checker.json "${CHECKERS_DIR}/flowgger-checker.json" && cp /config/trapd-checker.json "${CHECKERS_DIR}/trapd-checker.json" && cp /config/db-event-writer-checker.json "${CHECKERS_DIR}/db-event-writer-checker.json"']
          volumeMounts:
            - name: serviceradar-config
              mountPath: /config
            - name: checkers-dir
              mountPath: {{ default "/var/lib/serviceradar/checkers" $agentStorage.basePath | quote }}
      containers:
        - name: agent
          image: ghcr.io/carverauto/serviceradar-agent:{{ include "serviceradar.imageTag" (dict "Values" .Values "service" "agent") }}
          imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
          volumeMounts:
          - name: serviceradar-config
            mountPath: /etc/serviceradar
          - name: checkers-dir
            mountPath: {{ default "/var/lib/serviceradar/checkers" $agentStorage.basePath | quote }}
          - name: cert-data
            mountPath: /etc/serviceradar/certs
          - name: spire-agent-socket
            mountPath: /run/spire/sockets
            readOnly: true
          env:
{{ include "serviceradar.kvEnv" . | indent 12 }}
{{ include "serviceradar.coreEnv" . | indent 12 }}
            - name: CONFIG_PATH
              value: "/etc/serviceradar/agent.json"
            - name: LOG_LEVEL
              value: "info"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          resources:
            limits:
              cpu: {{ default "500m" $agentLimits.cpu | quote }}
              memory: {{ default "512Mi" $agentLimits.memory | quote }}
            requests:
              cpu: {{ default "200m" $agentRequests.cpu | quote }}
              memory: {{ default "256Mi" $agentRequests.memory | quote }}
      volumes:
      - name: serviceradar-config
        configMap:
          name: serviceradar-config
      - name: checkers-dir
        {{- if $agentStorage.enabled }}
        persistentVolumeClaim:
          claimName: {{ default "serviceradar-agent-checkers" $agentStorage.existingClaim | quote }}
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: cert-data
        persistentVolumeClaim:
          claimName: serviceradar-cert-data
      - name: spire-agent-socket
        hostPath:
          path: {{ include "serviceradar.spireSocketHostPath" . | quote }}
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-agent
spec:
  selector:
    app: serviceradar-agent
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $agentSA }}
  labels:
    app.kubernetes.io/part-of: serviceradar
