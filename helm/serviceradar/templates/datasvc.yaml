{{- $datasvcSA := .Values.spire.datasvcServiceAccount | default "serviceradar-datasvc" -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $datasvcSA }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceradar-datasvc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serviceradar-datasvc
  template:
    metadata:
      labels:
        app: serviceradar-datasvc
        app.kubernetes.io/part-of: serviceradar
    spec:
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      {{- include "serviceradar.topologySpread" . | nindent 6 }}
      serviceAccountName: {{ $datasvcSA }}
      {{- include "serviceradar.podSecurityContext" . | nindent 6 }}
      containers:
      - name: datasvc
        image: ghcr.io/carverauto/serviceradar-datasvc:{{ include "serviceradar.imageTag" (dict "Values" .Values "service" "datasvc") }}
        imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
        {{- include "serviceradar.containerSecurityContext" . | nindent 8 }}
        ports:
        - containerPort: 50057
          name: grpc
        volumeMounts:
        - name: serviceradar-config
          mountPath: /etc/serviceradar
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
        {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
        - name: nats-creds
          mountPath: /etc/serviceradar/creds
          readOnly: true
        {{- end }}
        - name: datasvc-data
          mountPath: /var/lib/serviceradar
        {{- if .Values.spire.enabled }}
        - name: spire-agent-socket
          mountPath: /run/spire/sockets
          readOnly: true
        {{- end }}
        env:
        - name: CONFIG_PATH
          value: "/etc/serviceradar/datasvc.json"
        - name: WAIT_FOR_NATS
          value: "true"
        - name: LOG_LEVEL
          value: "info"
        {{- if .Values.spire.enabled }}
        - name: SPIFFE_ENDPOINT_SOCKET
          value: "unix:/run/spire/sockets/agent.sock"
        {{- end }}
        - name: NATS_OPERATOR_SEED
          valueFrom:
            secretKeyRef:
              name: serviceradar-nats-creds
              key: operator.seed
              optional: true
        - name: NATS_SYSTEM_ACCOUNT_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: serviceradar-nats-creds
              key: system_account.pub
              optional: true
        - name: NATS_SYSTEM_ACCOUNT_CREDS_FILE
          value: "/etc/serviceradar/creds/system.creds"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: serviceradar-config
        configMap:
          name: serviceradar-config
      - name: cert-data
        secret:
          secretName: {{ include "serviceradar.runtimeCertsSecretName" . | quote }}
      {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
      - name: nats-creds
        secret:
          secretName: serviceradar-nats-creds
          optional: true
      {{- end }}
      - name: datasvc-data
        persistentVolumeClaim:
          claimName: serviceradar-datasvc-data
      {{- if .Values.spire.enabled }}
      - name: spire-agent-socket
        hostPath:
          path: {{ include "serviceradar.spireSocketHostPath" . | quote }}
          type: DirectoryOrCreate
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-datasvc
spec:
  selector:
    app: serviceradar-datasvc
  ports:
  - name: grpc
    port: 50057
    targetPort: grpc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: serviceradar-datasvc-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
