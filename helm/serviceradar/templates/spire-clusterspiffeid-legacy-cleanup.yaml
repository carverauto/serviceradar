{{- if .Values.spire.enabled }}
{{- $ns := default .Release.Namespace .Values.spire.namespace }}
{{- $toolsTag := include "serviceradar.imageTag" (dict "Values" .Values "service" "tools") }}
{{- $legacyNames := list
  "serviceradar-core"
  "serviceradar-web-ng"
  "serviceradar-datasvc"
  "serviceradar-agent"
  "serviceradar-otel"
  "serviceradar-zen"
  "serviceradar-db-event-writer"
  "serviceradar-rperf-checker"
  "serviceradar-flowgger"
  "serviceradar-log-collector"
  "serviceradar-trapd"
}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: serviceradar-spiffe-legacy-cleanup
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: serviceradar
    app.kubernetes.io/component: spiffe-legacy-cleanup
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-4"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: serviceradar-spiffe-legacy-cleanup
        app.kubernetes.io/part-of: serviceradar
        app.kubernetes.io/component: spiffe-legacy-cleanup
    spec:
      serviceAccountName: spire-server
      restartPolicy: OnFailure
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      containers:
      - name: spiffe-legacy-cleanup
        image: registry.carverauto.dev/serviceradar/serviceradar-tools:{{ $toolsTag }}
        imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -euo pipefail

          APISERVER="https://kubernetes.default.svc"
          SERVICEACCOUNT="/var/run/secrets/kubernetes.io/serviceaccount"
          TOKEN="$(cat "${SERVICEACCOUNT}/token")"
          NAMESPACE="$(cat "${SERVICEACCOUNT}/namespace")"
          CACERT="${SERVICEACCOUNT}/ca.crt"

          legacy_names="{{ join " " $legacyNames }}"

          echo "🔎 Checking legacy ClusterSPIFFEID resources for namespace ${NAMESPACE}"
          for name in ${legacy_names}; do
            url="${APISERVER}/apis/spire.spiffe.io/v1alpha1/clusterspiffeids/${name}"
            if ! resp="$(curl -fsS --cacert "${CACERT}" --header "Authorization: Bearer ${TOKEN}" "${url}" 2>/dev/null)"; then
              echo "ℹ️  ${name} not found"
              continue
            fi

            ns="$(echo "${resp}" | jq -r '.spec.namespaceSelector.matchLabels["kubernetes.io/metadata.name"] // ""')"
            if [ "${ns}" != "${NAMESPACE}" ]; then
              echo "ℹ️  ${name} belongs to namespace ${ns}, skipping"
              continue
            fi

            echo "🧹 Deleting legacy ClusterSPIFFEID ${name}"
            curl -fsS --cacert "${CACERT}" --header "Authorization: Bearer ${TOKEN}" \
              -X DELETE "${url}" >/dev/null
          done
{{- end }}
