{{- if .Values.flowCollector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: serviceradar-flow-collector-config
data:
  flow-collector.json: |
    {{- toJson .Values.flowCollector.config | nindent 4 }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: serviceradar-flow-collector
  labels:
    app.kubernetes.io/part-of: serviceradar
    app.kubernetes.io/name: serviceradar-flow-collector
    app.kubernetes.io/component: flow-collector
spec:
  # DaemonSet: one collector pod per schedulable node. Combined with the
  # `Service: LoadBalancer` + `externalTrafficPolicy: Local` below, this
  # gives horizontal scale without proxying — the cloud LB picks a node,
  # source IP is preserved into the pod, and AutoScopedParser scopes
  # templates per (source_ip, source_id). Cross-pod template state is
  # shared via the optional NATS KV `template_store` configured in
  # `flowCollector.config.template_store`.
  selector:
    matchLabels:
      app: serviceradar-flow-collector
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      # One pod at a time keeps flows landing somewhere during upgrades.
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: serviceradar-flow-collector
        app.kubernetes.io/part-of: serviceradar
      {{- if .Values.global.forceRolloutOnUpgrade }}
      annotations:
        serviceradar.io/release-revision: {{ .Release.Revision | quote }}
      {{- end }}
    spec:
      {{- include "serviceradar.podSecurityContext" . | nindent 6 }}
      serviceAccountName: {{ .Values.spire.flowCollectorServiceAccount | default "serviceradar-flow-collector" }}
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.flowCollector.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.flowCollector.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: flow-collector
        image: registry.carverauto.dev/serviceradar/serviceradar-flow-collector{{ include "serviceradar.imageRefSuffix" (dict "Values" .Values "service" "flowCollector") }}
        imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
        {{- include "serviceradar.bindServiceContainerSecurityContext" . | nindent 8 }}
        ports:
        {{- if .Values.flowCollector.service.ports.netflow.enabled }}
        - name: netflow
          containerPort: {{ .Values.flowCollector.service.ports.netflow.targetPort | default 2055 }}
          protocol: {{ .Values.flowCollector.service.ports.netflow.protocol | default "UDP" }}
        {{- end }}
        {{- if .Values.flowCollector.service.ports.sflow.enabled }}
        - name: sflow
          containerPort: {{ .Values.flowCollector.service.ports.sflow.targetPort | default 6343 }}
          protocol: {{ .Values.flowCollector.service.ports.sflow.protocol | default "UDP" }}
        {{- end }}
        {{- if .Values.flowCollector.service.ports.ipfix.enabled }}
        - name: ipfix
          containerPort: {{ .Values.flowCollector.service.ports.ipfix.targetPort | default 4739 }}
          protocol: {{ .Values.flowCollector.service.ports.ipfix.protocol | default "UDP" }}
        {{- end }}
        {{- if .Values.flowCollector.service.ports.metrics.enabled }}
        - name: metrics
          containerPort: {{ .Values.flowCollector.service.ports.metrics.targetPort | default 50046 }}
          protocol: {{ .Values.flowCollector.service.ports.metrics.protocol | default "TCP" }}
        {{- end }}
        args:
        - "--config"
        - "/etc/serviceradar/flow-collector.json"
        env:
        - name: RUST_LOG
          value: "info"
        {{- if and .Values.flowCollector.service.ports.metrics.enabled .Values.flowCollector.config.metrics_addr }}
        # HTTP probe against the Prometheus endpoint — also confirms the
        # async runtime is alive (a deadlocked-but-running collector
        # would pass a `pgrep` check but fail this). Only used when the
        # metrics server is actually running; otherwise probes fall back
        # to the `pgrep` exec form below.
        livenessProbe:
          httpGet:
            path: /metrics
            port: {{ .Values.flowCollector.service.ports.metrics.targetPort | default 50046 }}
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /metrics
            port: {{ .Values.flowCollector.service.ports.metrics.targetPort | default 50046 }}
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        {{- else }}
        # Metrics are disabled (either `service.ports.metrics.enabled` is
        # false or `config.metrics_addr` is unset), so the Rust binary
        # never starts the Prometheus server and an HTTP probe would
        # crashloop the pod. Fall back to a process-existence check via
        # `pgrep` (procps is installed in the runtime image). This only
        # catches process death, not async-runtime deadlocks — re-enable
        # metrics for a richer liveness signal.
        livenessProbe:
          exec:
            command: ["pgrep", "-f", "serviceradar-flow-collector"]
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["pgrep", "-f", "serviceradar-flow-collector"]
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        {{- end }}
        resources:
          {{- toYaml .Values.flowCollector.resources | nindent 10 }}
        volumeMounts:
        - name: flow-collector-config
          mountPath: /etc/serviceradar
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
        - name: nats-creds
          mountPath: /etc/serviceradar/creds
          readOnly: true
        - name: logs
          mountPath: /var/log/serviceradar
      initContainers:
      - name: wait-for-cert-files
        image: alpine:3.20
        {{- include "serviceradar.nonRootContainerSecurityContext" . | nindent 8 }}
        command: ["/bin/sh", "-ec"]
        args:
        - |
          for file in /etc/serviceradar/certs/flow-collector.pem /etc/serviceradar/certs/flow-collector-key.pem /etc/serviceradar/certs/root.pem; do
            i=0
            until [ -f "${file}" ]; do
              i=$((i+1))
              if [ "${i}" -ge 90 ]; then
                echo "Timed out waiting for ${file}" >&2
                exit 1
              fi
              sleep 2
            done
          done
        volumeMounts:
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
      - name: wait-for-nats-creds
        image: alpine:3.20
        {{- include "serviceradar.nonRootContainerSecurityContext" . | nindent 8 }}
        command: ["/bin/sh", "-ec"]
        args:
        - |
          i=0
          until [ -f /etc/serviceradar/creds/platform.creds ]; do
            i=$((i+1))
            if [ "${i}" -ge 90 ]; then
              echo "Timed out waiting for /etc/serviceradar/creds/platform.creds" >&2
              exit 1
            fi
            sleep 2
          done
        volumeMounts:
        - name: nats-creds
          mountPath: /etc/serviceradar/creds
          readOnly: true
      volumes:
      - name: flow-collector-config
        configMap:
          name: serviceradar-flow-collector-config
      - name: cert-data
        secret:
          secretName: {{ include "serviceradar.runtimeCertsSecretName" . | quote }}
      - name: nats-creds
        secret:
          secretName: serviceradar-nats-creds
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-flow-collector
  labels:
    app.kubernetes.io/part-of: serviceradar
  {{- with .Values.flowCollector.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.flowCollector.service.type | default "LoadBalancer" }}
  {{- with .Values.flowCollector.service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- with .Values.flowCollector.service.sessionAffinity }}
  sessionAffinity: {{ . }}
  {{- end }}
  {{- with .Values.flowCollector.service.sessionAffinityConfig }}
  sessionAffinityConfig:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if .Values.flowCollector.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.flowCollector.service.loadBalancerIP | quote }}
  {{- end }}
  selector:
    app: serviceradar-flow-collector
  ports:
  {{- if .Values.flowCollector.service.ports.netflow.enabled }}
  - name: netflow
    port: {{ .Values.flowCollector.service.ports.netflow.port | default 2055 }}
    targetPort: {{ .Values.flowCollector.service.ports.netflow.targetPort | default 2055 }}
    protocol: {{ .Values.flowCollector.service.ports.netflow.protocol | default "UDP" }}
  {{- end }}
  {{- if .Values.flowCollector.service.ports.sflow.enabled }}
  - name: sflow
    port: {{ .Values.flowCollector.service.ports.sflow.port | default 6343 }}
    targetPort: {{ .Values.flowCollector.service.ports.sflow.targetPort | default 6343 }}
    protocol: {{ .Values.flowCollector.service.ports.sflow.protocol | default "UDP" }}
  {{- end }}
  {{- if .Values.flowCollector.service.ports.ipfix.enabled }}
  - name: ipfix
    port: {{ .Values.flowCollector.service.ports.ipfix.port | default 4739 }}
    targetPort: {{ .Values.flowCollector.service.ports.ipfix.targetPort | default 4739 }}
    protocol: {{ .Values.flowCollector.service.ports.ipfix.protocol | default "UDP" }}
  {{- end }}
  {{- if .Values.flowCollector.service.ports.metrics.enabled }}
  - name: metrics
    port: {{ .Values.flowCollector.service.ports.metrics.port | default 50046 }}
    targetPort: {{ .Values.flowCollector.service.ports.metrics.targetPort | default 50046 }}
    protocol: {{ .Values.flowCollector.service.ports.metrics.protocol | default "TCP" }}
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.spire.flowCollectorServiceAccount | default "serviceradar-flow-collector" }}
  labels:
    app.kubernetes.io/part-of: serviceradar
{{- end }}
