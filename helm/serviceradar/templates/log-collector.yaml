{{- $logCollectorProbes := .Values.logCollector.probes | default dict -}}
{{- $logCollectorLiveness := $logCollectorProbes.liveness | default dict -}}
{{- $logCollectorReadiness := $logCollectorProbes.readiness | default dict -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: serviceradar-log-collector-config
data:
  log-collector.toml: |
    [flowgger]
    enabled = true
    config_file = "/etc/serviceradar/flowgger.toml"

    [otel]
    enabled = true
    config_file = "/etc/serviceradar/otel.toml"

    [health]
    listen_addr = "0.0.0.0:50044"

  flowgger.toml: |
    [input]
    type = "udp"
    listen = "0.0.0.0:514"
    format = "rfc3164"

    [output]
    type = "nats"
    format = "gelf"
    framing = "noop"
    partition = "default"
    nats_url = "tls://serviceradar-nats:4222"
    nats_subject = "logs.syslog"
    nats_stream = "events"
    nats_timeout = 30000
    nats_tls_ca_file = "/etc/serviceradar/certs/root.pem"
    nats_tls_cert = "/etc/serviceradar/certs/log-collector.pem"
    nats_tls_key = "/etc/serviceradar/certs/log-collector-key.pem"
    nats_tls_skip_verify = false
{{- if or .Values.natsCreds.platform .Values.natsCreds.autoGenerate }}
    nats_creds_file = "/etc/serviceradar/creds/platform.creds"
{{- end }}

    # gRPC health is handled by the log-collector unified health server.
    # Flowgger's built-in gRPC server is not needed here.

    [logging]
    level = "info"
    format = "json"

  otel.toml: |
    [server]
    bind_address = "0.0.0.0"
    port = 4317

    [nats]
    url = "tls://serviceradar-nats:4222"
    subject = "otel"
    logs_subject = "logs.otel"
    stream = "events"
    timeout_secs = 30
    max_bytes = 2147483648
    max_age_secs = 1800
{{- if or .Values.natsCreds.platform .Values.natsCreds.autoGenerate }}
    creds_file = "/etc/serviceradar/creds/platform.creds"
{{- end }}

    [nats.tls]
    cert_file = "/etc/serviceradar/certs/log-collector.pem"
    key_file = "/etc/serviceradar/certs/log-collector-key.pem"
    ca_file = "/etc/serviceradar/certs/root.pem"

    [grpc_tls]
    cert_file = "/etc/serviceradar/certs/log-collector.pem"
    key_file = "/etc/serviceradar/certs/log-collector-key.pem"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: serviceradar-log-collector-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceradar-log-collector
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serviceradar-log-collector
  template:
    metadata:
      labels:
        app: serviceradar-log-collector
        app.kubernetes.io/part-of: serviceradar
      annotations:
        {{- include "serviceradar.runtimeCertRollAnnotations" . | nindent 8 }}
      {{- if .Values.global.forceRolloutOnUpgrade }}
        serviceradar.io/release-revision: {{ .Release.Revision | quote }}
      {{- end }}
    spec:
      {{- include "serviceradar.topologySpread" . | nindent 6 }}
      {{- include "serviceradar.podSecurityContext" . | nindent 6 }}
      serviceAccountName: {{ .Values.spire.logCollectorServiceAccount | default "serviceradar-log-collector" }}
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      initContainers:
      - name: wait-for-cert-files
        image: alpine:3.20
        {{- include "serviceradar.nonRootContainerSecurityContext" . | nindent 8 }}
        command: ["/bin/sh", "-ec"]
        args:
        - |
          for file in /etc/serviceradar/certs/log-collector.pem /etc/serviceradar/certs/log-collector-key.pem /etc/serviceradar/certs/root.pem; do
            i=0
            until [ -f "${file}" ]; do
              i=$((i+1))
              if [ "${i}" -ge 90 ]; then
                echo "Timed out waiting for ${file}" >&2
                exit 1
              fi
              sleep 2
            done
          done
        volumeMounts:
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
      {{- if or .Values.natsCreds.platform .Values.natsCreds.autoGenerate }}
      - name: wait-for-nats-creds
        image: alpine:3.20
        {{- include "serviceradar.nonRootContainerSecurityContext" . | nindent 8 }}
        command: ["/bin/sh", "-ec"]
        args:
        - |
          i=0
          until [ -f /etc/serviceradar/creds/platform.creds ]; do
            i=$((i+1))
            if [ "${i}" -ge 90 ]; then
              echo "Timed out waiting for /etc/serviceradar/creds/platform.creds" >&2
              exit 1
            fi
            sleep 2
          done
        volumeMounts:
        - name: nats-creds
          mountPath: /etc/serviceradar/creds
          readOnly: true
      {{- end }}
      containers:
      - name: log-collector
        image: registry.carverauto.dev/serviceradar/serviceradar-log-collector{{ include "serviceradar.imageRefSuffix" (dict "Values" .Values "service" "logCollector") }}
        imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
        {{- include "serviceradar.bindServiceContainerSecurityContext" . | nindent 8 }}
        ports:
        - name: syslog
          containerPort: 514
          protocol: UDP
        - name: otel-grpc
          containerPort: 4317
          protocol: TCP
        - name: grpc
          containerPort: 50044
          protocol: TCP
        env:
{{ include "serviceradar.kvEnv" . | indent 8 }}
        - name: CONFIG_PATH
          value: "/etc/serviceradar/log-collector.toml"
        - name: RUST_LOG
          value: "info"
        {{- include "serviceradar.configSyncEnv" (dict "cfg" (default (dict) .Values.configSync.logCollector)) | nindent 8 }}
        livenessProbe:
          grpc:
            port: 50044
          initialDelaySeconds: {{ default 30 $logCollectorLiveness.initialDelaySeconds }}
          periodSeconds: {{ default 30 $logCollectorLiveness.periodSeconds }}
          timeoutSeconds: {{ default 5 $logCollectorLiveness.timeoutSeconds }}
          failureThreshold: {{ default 3 $logCollectorLiveness.failureThreshold }}
        readinessProbe:
          grpc:
            port: 50044
          initialDelaySeconds: {{ default 10 $logCollectorReadiness.initialDelaySeconds }}
          periodSeconds: {{ default 10 $logCollectorReadiness.periodSeconds }}
          timeoutSeconds: {{ default 5 $logCollectorReadiness.timeoutSeconds }}
          failureThreshold: {{ default 3 $logCollectorReadiness.failureThreshold }}
        resources:
          {{- toYaml .Values.logCollector.resources | nindent 10 }}
        volumeMounts:
        - name: log-collector-config
          mountPath: /etc/serviceradar
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
        {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
        - name: nats-creds
          mountPath: /etc/serviceradar/creds
          readOnly: true
        {{- end }}
        - name: log-collector-data
          mountPath: /var/lib/serviceradar
        - name: logs
          mountPath: /var/log/serviceradar
        {{- if .Values.spire.enabled }}
        - name: spire-agent-socket
          mountPath: /run/spire/sockets
          readOnly: true
        {{- end }}
      volumes:
      - name: log-collector-config
        configMap:
          name: serviceradar-log-collector-config
      - name: cert-data
        secret:
          secretName: {{ include "serviceradar.runtimeCertsSecretName" . | quote }}
      {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
      - name: nats-creds
        secret:
          secretName: serviceradar-nats-creds
      {{- end }}
      - name: log-collector-data
        persistentVolumeClaim:
          claimName: serviceradar-log-collector-data
      - name: logs
        emptyDir: {}
      {{- if .Values.spire.enabled }}
      - name: spire-agent-socket
        hostPath:
          path: {{ include "serviceradar.spireSocketHostPath" . | quote }}
          type: DirectoryOrCreate
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-log-collector
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  selector:
    app: serviceradar-log-collector
  ports:
  - name: syslog
    port: 514
    targetPort: 514
    protocol: UDP
  - name: otel-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: grpc
    port: 50044
    targetPort: 50044
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.spire.logCollectorServiceAccount | default "serviceradar-log-collector" }}
  labels:
    app.kubernetes.io/part-of: serviceradar
{{- if (default (dict) .Values.logCollector).externalService }}
{{- if .Values.logCollector.externalService.enabled }}
---
# External LoadBalancer service for syslog ingestion from outside the cluster
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-log-collector-external
  labels:
    app.kubernetes.io/part-of: serviceradar
  {{- with .Values.logCollector.externalService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.logCollector.externalService.type | default "LoadBalancer" }}
  {{- with .Values.logCollector.externalService.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- if .Values.logCollector.externalService.loadBalancerIP }}
  loadBalancerIP: {{ .Values.logCollector.externalService.loadBalancerIP }}
  {{- end }}
  selector:
    app: serviceradar-log-collector
    app.kubernetes.io/part-of: serviceradar
  ports:
  {{- if (default (dict) .Values.logCollector.externalService.ports).syslog }}
  {{- if .Values.logCollector.externalService.ports.syslog.enabled }}
  - name: syslog
    port: {{ .Values.logCollector.externalService.ports.syslog.port | default 514 }}
    targetPort: {{ .Values.logCollector.externalService.ports.syslog.targetPort | default 514 }}
    protocol: {{ .Values.logCollector.externalService.ports.syslog.protocol | default "UDP" }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
