apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceradar-faker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serviceradar-faker
  template:
    metadata:
      labels:
        app: serviceradar-faker
        app.kubernetes.io/part-of: serviceradar
    spec:
      {{- include "serviceradar.topologySpread" . | nindent 6 }}
      {{- if .Values.faker.gobgp.enabled }}
      initContainers:
      - name: gobgp-binaries
        image: {{ .Values.faker.gobgp.image.repository }}:{{ .Values.faker.gobgp.image.tag }}
        imagePullPolicy: {{ .Values.faker.gobgp.image.pullPolicy | default "IfNotPresent" }}
        command:
        - /bin/sh
        - -ec
        - |
          cp "$(command -v gobgpd)" /gobgp-bin/gobgpd
          cp "$(command -v gobgp)" /gobgp-bin/gobgp
          chmod 0755 /gobgp-bin/gobgpd /gobgp-bin/gobgp
        volumeMounts:
        - name: gobgp-bin
          mountPath: /gobgp-bin
      {{- end }}
      containers:
      - name: faker
        image: ghcr.io/carverauto/serviceradar-faker:{{ include "serviceradar.imageTag" (dict "Values" .Values "service" "faker") }}
        imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: CONFIG_SOURCE
          value: "file"
        - name: CONFIG_PATH
          value: "/etc/serviceradar/faker.json"
        - name: LOG_LEVEL
          value: "info"
        {{- if .Values.faker.gobgp.enabled }}
        - name: PATH
          value: "{{ .Values.faker.gobgp.binDir }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        {{- end }}
        volumeMounts:
        - name: faker-data
          mountPath: /var/lib/serviceradar/faker
        - name: faker-data
          mountPath: /data
        {{- if .Values.faker.gobgp.enabled }}
        - name: gobgp-bin
          mountPath: {{ .Values.faker.gobgp.binDir }}
          readOnly: true
        {{- end }}
        - name: serviceradar-config
          mountPath: /etc/serviceradar
          readOnly: true
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
        {{- if .Values.spire.enabled }}
        - name: spire-agent-socket
          mountPath: /run/spire/sockets
          readOnly: true
        {{- end }}
        readinessProbe:
          httpGet:
            path: /api/v1/search/?aql=test&length=1
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/v1/search/?aql=test&length=1
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
      volumes:
      - name: faker-data
        persistentVolumeClaim:
          claimName: serviceradar-faker-data
      - name: serviceradar-config
        configMap:
          name: serviceradar-config
      - name: cert-data
        secret:
          secretName: {{ include "serviceradar.runtimeCertsSecretName" . | quote }}
      {{- if .Values.spire.enabled }}
      - name: spire-agent-socket
        hostPath:
          path: {{ include "serviceradar.spireSocketHostPath" . | quote }}
          type: DirectoryOrCreate
      {{- end }}
      {{- if .Values.faker.gobgp.enabled }}
      - name: gobgp-bin
        emptyDir: {}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-faker
spec:
  selector:
    app: serviceradar-faker
  ports:
  - name: http
    port: 8080
    targetPort: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: serviceradar-faker-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
