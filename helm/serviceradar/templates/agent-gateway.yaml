{{- $gateway := default (dict) .Values.agentGateway -}}
{{- if $gateway.enabled -}}
{{- $gatewaySA := default "serviceradar-agent-gateway" $gateway.serviceAccountName -}}
{{- $clusterSelector := default "app.kubernetes.io/part-of=serviceradar" $gateway.kubernetesSelector -}}
{{- $clusterNodeBasename := default "serviceradar_agent_gateway" $gateway.kubernetesNodeBasename -}}
{{- $coreVals := default (dict) .Values.core -}}
{{- $webNg := default (dict) .Values.webNg -}}
{{- $coreClusterNodeBasename := default "serviceradar_core" $coreVals.kubernetesNodeBasename -}}
{{- $clusterCoreNodeBasename := default $coreClusterNodeBasename $gateway.clusterCoreNodeBasename -}}
{{- $clusterCookie := default "serviceradar_dev_cookie" $webNg.clusterCookie -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $gatewaySA }}
  labels:
    app.kubernetes.io/part-of: serviceradar
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceradar-agent-gateway
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  replicas: {{ default 1 $gateway.replicas }}
  selector:
    matchLabels:
      app: serviceradar-agent-gateway
  template:
    metadata:
      labels:
        app: serviceradar-agent-gateway
        app.kubernetes.io/part-of: serviceradar
    spec:
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      {{- include "serviceradar.topologySpread" . | nindent 6 }}
      serviceAccountName: {{ $gatewaySA }}
      containers:
      - name: agent-gateway
        image: ghcr.io/carverauto/serviceradar-agent-gateway:{{ include "serviceradar.imageTag" (dict "Values" .Values "service" "agentGateway") }}
        imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
        ports:
        - name: grpc
          containerPort: {{ default 50052 $gateway.service.port }}
          protocol: TCP
        env:
        - name: ELIXIR_ERL_OPTIONS
          value: "+fnu"
        - name: GATEWAY_PARTITION_ID
          value: {{ default "default" $gateway.partitionId | quote }}
        - name: GATEWAY_ID
          value: {{ default "gateway-platform" $gateway.gatewayId | quote }}
        - name: GATEWAY_DOMAIN
          value: {{ default "default" $gateway.domain | quote }}
        - name: GATEWAY_GRPC_PORT
          value: {{ default 50052 $gateway.service.port | quote }}
        - name: GATEWAY_CAPABILITIES
          value: {{ default "icmp,tcp,http,grpc" $gateway.capabilities | quote }}
        - name: CLUSTER_ENABLED
          value: "true"
        - name: CLUSTER_STRATEGY
          value: {{ default "dns" $gateway.clusterStrategy | quote }}
        - name: CLUSTER_DNS_QUERY
          value: {{ default (printf "serviceradar-agent-gateway-headless.%s.svc.cluster.local" .Release.Namespace) $gateway.clusterDnsQuery | quote }}
        - name: CLUSTER_NODE_BASENAME
          value: {{ $clusterNodeBasename | quote }}
        - name: CLUSTER_CORE_DNS_QUERY
          value: {{ default (printf "%s.%s.svc.cluster.local" (default "serviceradar-core-elx-headless" $gateway.clusterCoreService) .Release.Namespace) $gateway.clusterCoreDnsQuery | quote }}
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: RELEASE_NODE
          value: {{ printf "%s@$(POD_IP)" $clusterNodeBasename | quote }}
        - name: RELEASE_DISTRIBUTION
          value: "name"
        - name: RELEASE_COOKIE
          value: {{ $clusterCookie | quote }}
        - name: KUBERNETES_SELECTOR
          value: {{ $clusterSelector | quote }}
        - name: KUBERNETES_NODE_BASENAME
          value: {{ $clusterNodeBasename | quote }}
        - name: CLUSTER_CORE_SERVICE
          value: {{ default "serviceradar-core-elx-headless" $gateway.clusterCoreService | quote }}
        - name: CLUSTER_CORE_NODE_BASENAME
          value: {{ $clusterCoreNodeBasename | quote }}
        - name: GATEWAY_CERT_DIR
          value: "/etc/serviceradar/certs"
        {{- with $.Values.otelExporter }}
        {{- if .enabled }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .endpoint | quote }}
        - name: OTEL_CERT_DIR
          value: {{ default "/etc/serviceradar/certs" .certDir | quote }}
        - name: OTEL_CERT_NAME
          value: "gateway"
        - name: OTEL_SERVICE_NAME
          value: "serviceradar-agent-gateway"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: {{ default "1.0" .samplingRatio | quote }}
        {{- end }}
        {{- end }}
        volumeMounts:
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
        resources:
          limits:
            cpu: {{ default "1" $gateway.resources.limits.cpu | quote }}
            memory: {{ default "1Gi" $gateway.resources.limits.memory | quote }}
          requests:
            cpu: {{ default "200m" $gateway.resources.requests.cpu | quote }}
            memory: {{ default "512Mi" $gateway.resources.requests.memory | quote }}
        livenessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: cert-data
        secret:
          secretName: {{ include "serviceradar.runtimeCertsSecretName" . | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-agent-gateway
  labels:
    app.kubernetes.io/part-of: serviceradar
  {{- with $gateway.service.annotations }}
  {{- if ne (len .) 0 }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
spec:
  selector:
    app: serviceradar-agent-gateway
  type: {{ default "ClusterIP" $gateway.service.type }}
  {{- with $gateway.service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- if and (eq (default "ClusterIP" $gateway.service.type) "LoadBalancer") $gateway.service.loadBalancerIP }}
  loadBalancerIP: {{ $gateway.service.loadBalancerIP | quote }}
  {{- end }}
  ports:
  - name: grpc
    port: {{ default 50052 $gateway.service.port }}
    targetPort: grpc
    {{- with $gateway.service.nodePort }}
    nodePort: {{ . }}
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-agent-gateway-headless
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: serviceradar-agent-gateway
  ports:
  - name: grpc
    port: {{ default 50052 $gateway.service.port }}
    targetPort: grpc
{{- end }}
