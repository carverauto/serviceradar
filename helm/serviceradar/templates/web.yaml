{{- $cnpg := default (dict) .Values.cnpg -}}
{{- $cnpgClusterName := include "serviceradar.cnpgClusterName" . -}}
{{- $cnpgPooler := default (dict) $cnpg.pooler -}}
{{- $cnpgPoolerRoute := default (dict) $cnpgPooler.route -}}
{{- $webNg := default (dict) .Values.webNg -}}
{{- $webNgDatabase := default (dict) $webNg.database -}}
{{- $webNgObanQueues := default (dict) $webNg.obanQueues -}}
{{- $webNgGodView := default (dict) $webNg.godView -}}
{{- $webNgFirstPartyImport := default (dict) $webNg.firstPartyPluginImport -}}
{{- $runtimeGraphAutoRefresh := true -}}
{{- if hasKey $webNgGodView "runtimeGraphAutoRefresh" -}}
{{- $runtimeGraphAutoRefresh = get $webNgGodView "runtimeGraphAutoRefresh" -}}
{{- end -}}
{{- $webHost := default .Values.ingress.host $webNg.host -}}
{{- $pluginStorage := default (dict) $webNg.pluginStorage -}}
{{- $pluginStorageBackend := lower (default "file" $pluginStorage.backend) -}}
{{- $pluginStorageFileBackend := and $pluginStorage.enabled (eq $pluginStorageBackend "file") -}}
{{- $agentReleasePublicKey := default "" $webNg.agentReleasePublicKey -}}
{{- $geoipMmdb := default (dict) .Values.geoipMmdb -}}
{{- $secrets := default "serviceradar-secrets" .Values.secrets.existingSecretName -}}
{{- $trustDomain := .Values.spire.trustDomain | default "carverauto.dev" -}}
{{- $spireBundle := default "spire-bundle" .Values.spire.bundleConfigMap -}}
{{- $datasvc := default (dict) $webNg.datasvc -}}
{{- $datasvcHost := default "serviceradar-datasvc" $datasvc.host -}}
{{- $datasvcPort := default 50057 $datasvc.port -}}
{{- $datasvcSecMode := default "mtls" $datasvc.secMode -}}
{{- $datasvcSecModeLower := lower $datasvcSecMode -}}
{{- $datasvcTLS := ternary "true" "false" (ne $datasvcSecModeLower "plaintext") -}}
{{- $datasvcCertDir := default "/etc/serviceradar/certs" $datasvc.certDir -}}
{{- $datasvcCertName := default "web" $datasvc.certName -}}
{{- $datasvcServerName := default "datasvc.serviceradar" $datasvc.serverName -}}
{{- $webNgSA := default "serviceradar-web-ng" .Values.spire.webNgServiceAccount -}}
{{- $coreVals := default (dict) .Values.core -}}
{{- $deviceEnrichment := default (dict) $coreVals.deviceEnrichment -}}
{{- $deviceEnrichmentRulesDir := default "/var/lib/serviceradar/rules/device-enrichment" $deviceEnrichment.rulesDir -}}
{{- $deviceEnrichmentFsOverrides := default (dict) $deviceEnrichment.filesystemOverrides -}}
{{- $deviceEnrichmentFsEnabled := default false $deviceEnrichmentFsOverrides.enabled -}}
{{- $deviceEnrichmentFsConfigMap := default "" $deviceEnrichmentFsOverrides.existingConfigMap -}}
{{- $deviceEnrichmentFsSecret := default "" $deviceEnrichmentFsOverrides.existingSecret -}}
{{- $deviceEnrichmentFsClaim := default "" $deviceEnrichmentFsOverrides.existingClaim -}}
{{- $migrationVals := default (dict) $coreVals.migrations -}}
{{- $migrationsEnabled := default true $migrationVals.enabled -}}
{{- $coreClusterNodeBasename := default "serviceradar_core" $coreVals.kubernetesNodeBasename -}}
{{- $gatewayVals := default (dict) .Values.agentGateway -}}
{{- $gatewayServiceName := "serviceradar-agent-gateway" -}}
{{- $gatewayServicePort := default 50052 $gatewayVals.service.port -}}
{{- $gatewayAddress := "" -}}
{{- if $webNg.gatewayAddress -}}
{{- $gatewayAddress = $webNg.gatewayAddress -}}
{{- else if $webHost -}}
{{- $gatewayAddress = printf "%s:%v" $webHost $gatewayServicePort -}}
{{- else -}}
{{- $gatewayAddress = printf "%s:%v" $gatewayServiceName $gatewayServicePort -}}
{{- end -}}
{{- $natsUrl := default "tls://serviceradar-nats:4222" $webNg.natsUrl -}}
{{- $coreAddress := default (include "serviceradar.coreAddress" .) $webNg.coreAddress -}}
{{- $gatewayClusterNodeBasename := default "serviceradar_agent_gateway" $gatewayVals.kubernetesNodeBasename -}}
{{- $webClusterNodeBasename := default "serviceradar_web_ng" $webNg.kubernetesNodeBasename -}}
{{- $webClusterStrategy := default "dns" $webNg.clusterStrategy -}}
{{- $webClusterDnsQuery := default (printf "serviceradar-web-ng-headless.%s.svc.cluster.local" .Release.Namespace) $webNg.clusterDnsQuery -}}
{{- $coreClusterDnsQuery := default (printf "serviceradar-core-elx-headless.%s.svc.cluster.local" .Release.Namespace) $webNg.clusterCoreDnsQuery -}}
{{- $gatewayClusterDnsQuery := default (printf "serviceradar-agent-gateway-headless.%s.svc.cluster.local" .Release.Namespace) $webNg.clusterGatewayDnsQuery -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $webNgSA }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceradar-web-ng
spec:
  replicas: {{ default 1 $webNg.replicas }}
  selector:
    matchLabels:
      app: serviceradar-web-ng
  template:
    metadata:
      labels:
        app: serviceradar-web-ng
        app.kubernetes.io/part-of: serviceradar
      annotations:
        {{- include "serviceradar.runtimeCertRollAnnotations" . | nindent 8 }}
        checksum/db-credentials: {{ include "serviceradar.dbCredentialsChecksum" . }}
        {{- if .Values.global.forceRolloutOnUpgrade }}
        serviceradar.io/release-revision: {{ .Release.Revision | quote }}
        {{- end }}
    spec:
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      {{- include "serviceradar.topologySpread" . | nindent 6 }}
      serviceAccountName: {{ $webNgSA }}
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if or $pluginStorageFileBackend $migrationsEnabled }}
      initContainers:
      {{- if $pluginStorageFileBackend }}
      - name: init-plugin-storage
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 10001
          runAsGroup: 10001
          capabilities:
            drop: ["ALL"]
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -eu
          STORAGE_PATH={{ default "/var/lib/serviceradar/plugin-packages" $pluginStorage.basePath | quote }}
          mkdir -p "${STORAGE_PATH}/plugins"
        volumeMounts:
        - name: plugin-packages
          mountPath: {{ default "/var/lib/serviceradar/plugin-packages" $pluginStorage.basePath | quote }}
      {{- end }}
      {{- if $migrationsEnabled }}
      - name: wait-migrations
        image: registry.carverauto.dev/serviceradar/serviceradar-tools:{{ include "serviceradar.imageTag" (dict "Values" .Values "service" "tools") }}
        imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
        {{- include "serviceradar.containerSecurityContext" . | nindent 8 }}
        command: ["/bin/sh", "-c"]
        env:
        - name: CNPG_HOST
          value: {{ include "serviceradar.cnpgDirectHost" . | quote }}
        - name: CNPG_PORT
          value: {{ default 5432 $cnpg.port | quote }}
        - name: CNPG_DATABASE
          value: {{ default "serviceradar" $cnpg.database | quote }}
        - name: CNPG_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ default "serviceradar-db-credentials" $cnpg.credentialsSecret | quote }}
              key: username
        - name: CNPG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ default "serviceradar-db-credentials" $cnpg.credentialsSecret | quote }}
              key: password
        - name: CNPG_SSL_MODE
          value: {{ default "verify-full" $cnpg.sslmode | quote }}
        - name: CNPG_CA_FILE
          value: {{ default "/etc/serviceradar/cnpg/ca.crt" $cnpg.caFile | quote }}
        {{- if $cnpg.requireClientCert }}
        - name: CNPG_CERT_FILE
          value: {{ printf "%s/%s" (default "/etc/serviceradar/certs" $cnpg.certDir) (default "cnpg-client.pem" $cnpg.clientCertName) | quote }}
        - name: CNPG_KEY_FILE
          value: {{ printf "%s/%s" (default "/etc/serviceradar/certs" $cnpg.certDir) (default "cnpg-client-key.pem" $cnpg.clientKeyName) | quote }}
        {{- end }}
        args:
        - |
          set -eu
          export PGPASSWORD="${CNPG_PASSWORD}"
          export PGSSLMODE="${CNPG_SSL_MODE:-disable}"
          if [ -n "${CNPG_CA_FILE:-}" ]; then
            export PGSSLROOTCERT="${CNPG_CA_FILE}"
          fi
          if [ -n "${CNPG_CERT_FILE:-}" ] && [ -n "${CNPG_KEY_FILE:-}" ]; then
            export PGSSLCERT="${CNPG_CERT_FILE}"
            export PGSSLKEY="${CNPG_KEY_FILE}"
          fi
          echo "Waiting for platform schema migrations..."
          for i in $(seq 1 120); do
            if psql -h "${CNPG_HOST}" -U "${CNPG_USERNAME}" -d "${CNPG_DATABASE}" -c "SELECT 1 FROM platform.schema_migrations LIMIT 1" >/dev/null 2>&1; then
              echo "Migrations detected."
              exit 0
            fi
            echo "Waiting for migrations... ($i/120)"
            sleep 2
          done
          echo "Timed out waiting for migrations." >&2
          exit 1
        volumeMounts:
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
        - name: {{ $cnpgClusterName }}-ca
          mountPath: /etc/serviceradar/cnpg
          readOnly: true
      {{- end }}
      {{- end }}
      containers:
      - name: web-ng
        image: registry.carverauto.dev/serviceradar/serviceradar-web-ng:{{ include "serviceradar.imageTag" (dict "Values" .Values "service" "webNg") }}
        imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
        {{- include "serviceradar.containerSecurityContext" . | nindent 8 }}
        ports:
        - containerPort: 4000
          name: http
        env:
        - name: PORT
          value: "4000"
        - name: ELIXIR_ERL_OPTIONS
          value: "+fnu"
        - name: PHX_SERVER
          value: "true"
        - name: PHX_HOST
          value: {{ default "serviceradar-web-ng" $webHost | quote }}
        - name: PHX_CHECK_ORIGIN
          value: {{ default "false" $webNg.checkOrigin | quote }}
        - name: SERVICERADAR_GOD_VIEW_ENABLED
          value: {{ default "true" $webNg.godViewEnabled | quote }}
        - name: SERVICERADAR_DEV_ROUTES
          value: {{ default "false" $webNg.devRoutes | quote }}
        - name: SERVICERADAR_LOCAL_MAILER
          value: {{ default "false" $webNg.localMailer | quote }}
        {{- if $agentReleasePublicKey }}
        - name: SERVICERADAR_AGENT_RELEASE_PUBLIC_KEY
          value: {{ $agentReleasePublicKey | quote }}
        {{- end }}
        - name: SERVICERADAR_ADMIN_EMAIL
          value: "root@localhost"
        - name: SERVICERADAR_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: admin-password
        - name: SERVICERADAR_GATEWAY_ADDR
          value: {{ $gatewayAddress | quote }}
        - name: NATS_URL
          value: {{ $natsUrl | quote }}
        {{- if or .Values.natsCreds.platform .Values.natsCreds.autoGenerate }}
        - name: NATS_ENABLED
          value: "true"
        - name: NATS_TLS
          value: "true"
        - name: NATS_SERVER_NAME
          value: {{ default "serviceradar-nats" $webNg.natsServerName | quote }}
        - name: NATS_CREDS_FILE
          value: "/etc/serviceradar/creds/platform.creds"
        {{- end }}
        - name: CORE_ADDRESS
          value: {{ $coreAddress | quote }}
        - name: CLUSTER_ENABLED
          value: {{ default "true" $webNg.clusterEnabled | quote }}
        - name: CLUSTER_STRATEGY
          value: {{ $webClusterStrategy | quote }}
        - name: CLUSTER_DNS_QUERY
          value: {{ $webClusterDnsQuery | quote }}
        - name: CLUSTER_NODE_BASENAME
          value: {{ $webClusterNodeBasename | quote }}
        - name: CLUSTER_CORE_DNS_QUERY
          value: {{ $coreClusterDnsQuery | quote }}
        - name: CLUSTER_CORE_NODE_BASENAME
          value: {{ $coreClusterNodeBasename | quote }}
        - name: CLUSTER_GATEWAY_DNS_QUERY
          value: {{ $gatewayClusterDnsQuery | quote }}
        - name: CLUSTER_GATEWAY_NODE_BASENAME
          value: {{ $gatewayClusterNodeBasename | quote }}
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: RELEASE_NODE
          value: {{ printf "%s@$(POD_IP)" $webClusterNodeBasename | quote }}
        - name: RELEASE_DISTRIBUTION
          value: "name"
        - name: RELEASE_COOKIE
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: cluster-cookie
        - name: SERVICERADAR_ONBOARDING_TOKEN_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: edge-onboarding-key
        - name: SERVICERADAR_EDGE_CRYPTO_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: web-ng-secret-key-base
        - name: DATASVC_ENABLED
          value: "true"
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: web-ng-secret-key-base
        - name: POOL_SIZE
          value: {{ default 10 $webNgDatabase.poolSize | quote }}
        - name: DATABASE_QUEUE_TARGET_MS
          value: {{ default 2000 $webNgDatabase.queueTargetMs | quote }}
        - name: DATABASE_QUEUE_INTERVAL_MS
          value: {{ default 2000 $webNgDatabase.queueIntervalMs | quote }}
        - name: DATABASE_TIMEOUT_MS
          value: {{ default 120000 $webNgDatabase.timeoutMs | quote }}
        - name: DATABASE_POOL_TIMEOUT_MS
          value: {{ default 120000 $webNgDatabase.poolTimeoutMs | quote }}
        - name: SERVICERADAR_WEB_NG_OBAN_ENABLED
          value: {{ default true $webNg.obanEnabled | quote }}
        - name: WEB_NG_OBAN_QUEUE_DEFAULT
          value: {{ default 2 $webNgObanQueues.default | quote }}
        - name: WEB_NG_OBAN_QUEUE_ALERTS
          value: {{ default 1 $webNgObanQueues.alerts | quote }}
        - name: WEB_NG_OBAN_QUEUE_SERVICE_CHECKS
          value: {{ default 1 $webNgObanQueues.serviceChecks | quote }}
        - name: WEB_NG_OBAN_QUEUE_NOTIFICATIONS
          value: {{ default 1 $webNgObanQueues.notifications | quote }}
        - name: WEB_NG_OBAN_QUEUE_ONBOARDING
          value: {{ default 1 $webNgObanQueues.onboarding | quote }}
        - name: WEB_NG_OBAN_QUEUE_EVENTS
          value: {{ default 1 $webNgObanQueues.events | quote }}
        - name: WEB_NG_OBAN_QUEUE_SWEEPS
          value: {{ default 1 $webNgObanQueues.sweeps | quote }}
        - name: WEB_NG_OBAN_QUEUE_EDGE
          value: {{ default 1 $webNgObanQueues.edge | quote }}
        - name: WEB_NG_OBAN_QUEUE_INTEGRATIONS
          value: {{ default 1 $webNgObanQueues.integrations | quote }}
        - name: WEB_NG_OBAN_QUEUE_MAINTENANCE
          value: {{ default 0 $webNgObanQueues.maintenance | quote }}
        - name: SERVICERADAR_GOD_VIEW_RUNTIME_GRAPH_REFRESH_MS
          value: {{ default 30000 $webNgGodView.runtimeGraphRefreshMs | quote }}
        - name: SERVICERADAR_GOD_VIEW_RUNTIME_GRAPH_AUTO_REFRESH
          value: {{ $runtimeGraphAutoRefresh | quote }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_REPO_URL
          value: {{ default "https://code.carverauto.dev/carverauto/serviceradar" $webNgFirstPartyImport.repoUrl | quote }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_INDEX_ASSET
          value: {{ default "serviceradar-wasm-plugin-index.json" $webNgFirstPartyImport.indexAssetName | quote }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_AUTO_SYNC
          value: {{ default false $webNgFirstPartyImport.autoSyncEnabled | quote }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_SYNC_LIMIT
          value: {{ default 10 $webNgFirstPartyImport.syncReleaseLimit | quote }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_SYNC_INTERVAL_SECONDS
          value: {{ default 3600 $webNgFirstPartyImport.syncIntervalSeconds | quote }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_COSIGN_BINARY
          value: {{ default "/usr/local/bin/cosign" $webNgFirstPartyImport.cosignBinary | quote }}
        {{- if $webNgFirstPartyImport.cosignPublicKey }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_COSIGN_PUBLIC_KEY
          value: {{ $webNgFirstPartyImport.cosignPublicKey | quote }}
        {{- end }}
        {{- if $webNgFirstPartyImport.cosignPublicKeyFile }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_COSIGN_PUBLIC_KEY_FILE
          value: {{ $webNgFirstPartyImport.cosignPublicKeyFile | quote }}
        {{- end }}
        {{- if $webNgFirstPartyImport.registryDockerConfigSecret }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_REGISTRY_DOCKER_CONFIG_JSON
          valueFrom:
            secretKeyRef:
              name: {{ $webNgFirstPartyImport.registryDockerConfigSecret | quote }}
              key: {{ default ".dockerconfigjson" $webNgFirstPartyImport.registryDockerConfigSecretKey | quote }}
        {{- else if $webNgFirstPartyImport.registryDockerConfigJson }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_REGISTRY_DOCKER_CONFIG_JSON
          value: {{ $webNgFirstPartyImport.registryDockerConfigJson | quote }}
        {{- end }}
        {{- if $webNgFirstPartyImport.registryDockerConfigFile }}
        - name: SERVICERADAR_FIRST_PARTY_PLUGIN_REGISTRY_DOCKER_CONFIG_FILE
          value: {{ $webNgFirstPartyImport.registryDockerConfigFile | quote }}
        {{- end }}
        {{- if $pluginStorage.enabled }}
        - name: PLUGIN_STORAGE_BACKEND
          value: {{ $pluginStorageBackend | quote }}
        {{- if $pluginStorageFileBackend }}
        - name: PLUGIN_STORAGE_PATH
          value: {{ default "/var/lib/serviceradar/plugin-packages" $pluginStorage.basePath | quote }}
        {{- end }}
        - name: PLUGIN_STORAGE_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: plugin-storage-signing-secret
        {{- if $pluginStorage.jetstreamReplicas }}
        - name: PLUGIN_STORAGE_JS_REPLICAS
          value: {{ $pluginStorage.jetstreamReplicas | quote }}
        {{- end }}
        {{- end }}
        - name: SERVICERADAR_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: api-key
        - name: CLOAK_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: cloak-key
        {{- if $geoipMmdb.enabled }}
        - name: GEOLITE_MMDB_DIR
          value: {{ default "/var/lib/serviceradar/geoip" $geoipMmdb.basePath | quote }}
        {{- end }}
        {{- with $.Values.otelExporter }}
        {{- if .enabled }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .endpoint | quote }}
        - name: OTEL_CERT_DIR
          value: {{ default "/etc/serviceradar/certs" .certDir | quote }}
        - name: OTEL_CERT_NAME
          value: "web"
        - name: OTEL_SERVICE_NAME
          value: "serviceradar-web-ng"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: {{ default "1.0" .samplingRatio | quote }}
        {{- end }}
        {{- end }}
        {{- with .Values.webNg.extraEnv }}
        {{- range $name, $value := . }}
        - name: {{ $name | quote }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        - name: DEVICE_ENRICHMENT_RULES_DIR
          value: {{ $deviceEnrichmentRulesDir | quote }}
        - name: CNPG_HOST
          value: {{ include "serviceradar.cnpgWorkloadHost" (dict "root" . "workload" "webNg") | quote }}
        - name: CNPG_PORT
          value: {{ default 5432 $cnpg.port | quote }}
        {{- if and (default false $cnpgPooler.enabled) (default false (get $cnpgPoolerRoute "webNg")) }}
        - name: CNPG_TLS_SERVER_NAME
          value: {{ include "serviceradar.cnpgDirectHost" . | quote }}
        - name: DATABASE_PREPARE
          value: "unnamed"
        - name: WEB_NG_OBAN_NOTIFIER
          value: "pg"
        {{- end }}
        - name: CNPG_DATABASE
          value: {{ default "serviceradar" $cnpg.database | quote }}
        - name: CNPG_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ default "serviceradar-db-credentials" $cnpg.credentialsSecret | quote }}
              key: username
        - name: CNPG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ default "serviceradar-db-credentials" $cnpg.credentialsSecret | quote }}
              key: password
        - name: CNPG_SSL_MODE
          value: {{ default "verify-full" $cnpg.sslmode | quote }}
        - name: CNPG_CA_FILE
          value: {{ default "/etc/serviceradar/cnpg/ca.crt" $cnpg.caFile | quote }}
        {{- if $cnpg.requireClientCert }}
        - name: CNPG_CERT_FILE
          value: {{ printf "%s/%s" (default "/etc/serviceradar/certs" $cnpg.certDir) (default "cnpg-client.pem" $cnpg.clientCertName) | quote }}
        - name: CNPG_KEY_FILE
          value: {{ printf "%s/%s" (default "/etc/serviceradar/certs" $cnpg.certDir) (default "cnpg-client-key.pem" $cnpg.clientKeyName) | quote }}
        {{- end }}
        - name: DATASVC_ADDRESS
          value: {{ printf "%s:%v" $datasvcHost $datasvcPort | quote }}
        - name: DATASVC_HOST
          value: {{ $datasvcHost | quote }}
        - name: DATASVC_PORT
          value: {{ $datasvcPort | quote }}
        - name: DATASVC_SEC_MODE
          value: {{ $datasvcSecMode | quote }}
        - name: DATASVC_SSL
          value: {{ $datasvcTLS | quote }}
        - name: DATASVC_CERT_DIR
          value: {{ $datasvcCertDir | quote }}
        - name: DATASVC_CERT_NAME
          value: {{ $datasvcCertName | quote }}
        - name: DATASVC_SERVER_NAME
          value: {{ $datasvcServerName | quote }}
        {{- if eq $datasvcSecModeLower "spiffe" }}
        - name: SPIFFE_TRUST_DOMAIN
          value: {{ $trustDomain | quote }}
        - name: SPIFFE_MODE
          value: {{ default "filesystem" .Values.spiffe.mode | quote }}
        - name: SPIFFE_CERT_DIR
          value: {{ $datasvcCertDir | quote }}
        - name: SPIFFE_WORKLOAD_API_SOCKET
          value: "unix:///run/spire/sockets/agent.sock"
        - name: SPIFFE_TRUST_BUNDLE_PATH
          value: "/run/spire/bundle/bundle.crt"
        {{- end }}
        volumeMounts:
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
        {{- if or .Values.natsCreds.platform .Values.natsCreds.autoGenerate }}
        - name: nats-creds
          mountPath: /etc/serviceradar/creds
          readOnly: true
        {{- end }}
        - name: {{ $cnpgClusterName }}-ca
          mountPath: /etc/serviceradar/cnpg
          readOnly: true
        {{- if $pluginStorageFileBackend }}
        - name: plugin-packages
          mountPath: {{ default "/var/lib/serviceradar/plugin-packages" $pluginStorage.basePath | quote }}
        {{- end }}
        {{- if $geoipMmdb.enabled }}
        - name: geoip-mmdb
          mountPath: {{ default "/var/lib/serviceradar/geoip" $geoipMmdb.basePath | quote }}
        {{- end }}
        {{- if $deviceEnrichmentFsEnabled }}
        - name: device-enrichment-rules
          mountPath: {{ $deviceEnrichmentRulesDir | quote }}
        {{- end }}
        {{- if eq $datasvcSecModeLower "spiffe" }}
        - name: spire-agent-socket
          mountPath: /run/spire/sockets
          readOnly: true
        - name: spire-bundle
          mountPath: /run/spire/bundle
          readOnly: true
        {{- end }}
        resources:
          {{- toYaml (default (dict) .Values.webNg.resources) | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health/live
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: cert-data
        secret:
          secretName: {{ include "serviceradar.runtimeCertsSecretName" . | quote }}
      {{- if or .Values.natsCreds.platform .Values.natsCreds.autoGenerate }}
      - name: nats-creds
        secret:
          secretName: serviceradar-nats-creds
      {{- end }}
      - name: {{ $cnpgClusterName }}-ca
        secret:
          secretName: {{ $cnpgClusterName }}-ca
      {{- if $pluginStorageFileBackend }}
      - name: plugin-packages
        persistentVolumeClaim:
          claimName: {{ default "serviceradar-web-ng-plugins" $pluginStorage.existingClaim | quote }}
      {{- end }}
      {{- if $geoipMmdb.enabled }}
      - name: geoip-mmdb
        persistentVolumeClaim:
          claimName: {{ default "serviceradar-geoip-mmdb" $geoipMmdb.existingClaim | quote }}
      {{- end }}
      {{- if $deviceEnrichmentFsEnabled }}
      - name: device-enrichment-rules
        {{- if $deviceEnrichmentFsConfigMap }}
        configMap:
          name: {{ $deviceEnrichmentFsConfigMap | quote }}
        {{- else if $deviceEnrichmentFsSecret }}
        secret:
          secretName: {{ $deviceEnrichmentFsSecret | quote }}
        {{- else if $deviceEnrichmentFsClaim }}
        persistentVolumeClaim:
          claimName: {{ $deviceEnrichmentFsClaim | quote }}
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- end }}
      {{- if eq $datasvcSecModeLower "spiffe" }}
      - name: spire-agent-socket
        hostPath:
          path: {{ include "serviceradar.spireSocketHostPath" . | quote }}
          type: DirectoryOrCreate
      - name: spire-bundle
        configMap:
          name: {{ $spireBundle | quote }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-web-ng
  labels:
    app.kubernetes.io/part-of: serviceradar
    app.kubernetes.io/name: serviceradar-web-ng
    app.kubernetes.io/component: web-ng
spec:
  selector:
    app: serviceradar-web-ng
  ports:
  - name: http
    port: 4000
    targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-web-ng-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: serviceradar-web-ng
  ports:
  - name: http
    port: 4000
    targetPort: http
