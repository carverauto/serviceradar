{{- $pg := default (dict) .Values.spire.postgres }}
{{- $cnpg := default (dict) .Values.cnpg }}
{{- $cnpgClusterName := default "cnpg" $pg.clusterName }}
{{- if $cnpg.requireClientCert }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: serviceradar-cnpg-client-ca-secret
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      labels:
        app: serviceradar-cnpg-client-ca-secret
    spec:
      restartPolicy: OnFailure
      serviceAccountName: serviceradar-cert-secret-creator
      containers:
      - name: create-secret
        image: bitnami/kubectl:latest
        command: ["/bin/sh"]
        args:
        - -c
        - |
          # Wait for cert-generator to complete
          echo "Waiting for cnpg-ca.pem to exist..."
          while [ ! -f /certs/cnpg-ca.pem ]; do
            sleep 2
          done
          echo "Found cnpg-ca.pem, creating secret..."

          # Create or update the secret with the CNPG client CA
          kubectl create secret generic serviceradar-cnpg-client-ca \
            --from-file=ca.crt=/certs/cnpg-ca.pem \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Secret serviceradar-cnpg-client-ca created/updated"
        volumeMounts:
        - name: cert-data
          mountPath: /certs
          readOnly: true
      volumes:
      - name: cert-data
        persistentVolumeClaim:
          claimName: serviceradar-cert-data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: serviceradar-cert-secret-creator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: serviceradar-cert-secret-creator
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: serviceradar-cert-secret-creator
subjects:
- kind: ServiceAccount
  name: serviceradar-cert-secret-creator
roleRef:
  kind: Role
  name: serviceradar-cert-secret-creator
  apiGroup: rbac.authorization.k8s.io
{{- end }}
