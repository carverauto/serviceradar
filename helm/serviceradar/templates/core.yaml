{{- $trustDomain := .Values.spire.trustDomain | default "carverauto.dev" -}}
{{- $spireNamespace := default .Release.Namespace .Values.spire.namespace -}}
{{- $spireBundle := default "spire-bundle" .Values.spire.bundleConfigMap -}}
{{- $coreSA := .Values.spire.coreServiceAccount | default "serviceradar-core" -}}
{{- $cnpg := default (dict) .Values.cnpg -}}
{{- $cnpgClusterName := include "serviceradar.cnpgClusterName" . -}}
{{- $cnpgPooler := default (dict) $cnpg.pooler -}}
{{- $cnpgPoolerRoute := default (dict) $cnpgPooler.route -}}
{{- $coreVals := default (dict) .Values.core -}}
{{- $migrationVals := default (dict) $coreVals.migrations -}}
{{- $migrationsEnabled := default true $migrationVals.enabled -}}
{{- $webNg := default (dict) .Values.webNg -}}
{{- $pluginStorage := default (dict) $webNg.pluginStorage -}}
{{- $geoipMmdb := default (dict) .Values.geoipMmdb -}}
{{- $webNgPublicUrl := default "" $webNg.publicUrl -}}
{{- $coreClusterSelector := default "app=serviceradar-core" $coreVals.kubernetesSelector -}}
{{- $coreClusterNodeBasename := default "serviceradar_core" $coreVals.kubernetesNodeBasename -}}
{{- $database := default (dict) $coreVals.database -}}
{{- $controlDatabase := default (dict) $coreVals.controlDatabase -}}
{{- $obanQueues := default (dict) $coreVals.obanQueues -}}
{{- $syncIngestor := default (dict) $coreVals.syncIngestor -}}
{{- $mtrAutomation := default (dict) $coreVals.mtrAutomation -}}
{{- $deviceEnrichment := default (dict) $coreVals.deviceEnrichment -}}
{{- $deviceEnrichmentRulesDir := default "/var/lib/serviceradar/rules/device-enrichment" $deviceEnrichment.rulesDir -}}
{{- $deviceEnrichmentFsOverrides := default (dict) $deviceEnrichment.filesystemOverrides -}}
{{- $deviceEnrichmentFsEnabled := default false $deviceEnrichmentFsOverrides.enabled -}}
{{- $deviceEnrichmentFsConfigMap := default "" $deviceEnrichmentFsOverrides.existingConfigMap -}}
{{- $deviceEnrichmentFsSecret := default "" $deviceEnrichmentFsOverrides.existingSecret -}}
{{- $deviceEnrichmentFsClaim := default "" $deviceEnrichmentFsOverrides.existingClaim -}}
{{- $secrets := default "serviceradar-secrets" .Values.secrets.existingSecretName -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $coreSA }}
  labels:
    app.kubernetes.io/part-of: serviceradar
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceradar-core
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  replicas: {{ default 1 $coreVals.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: serviceradar-core
  template:
    metadata:
      labels:
        app: serviceradar-core
        app.kubernetes.io/part-of: serviceradar
      annotations:
        {{- include "serviceradar.runtimeCertRollAnnotations" . | nindent 8 }}
        checksum/db-credentials: {{ include "serviceradar.dbCredentialsChecksum" . }}
        {{- if .Values.global.forceRolloutOnUpgrade }}
        serviceradar.io/release-revision: {{ .Release.Revision | quote }}
        {{- end }}
    spec:
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      {{- include "serviceradar.topologySpread" . | nindent 6 }}
      serviceAccountName: {{ $coreSA }}
      {{- include "serviceradar.podSecurityContext" . | nindent 6 }}
      containers:
      - name: core-elx
        image: registry.carverauto.dev/serviceradar/serviceradar-core-elx:{{ include "serviceradar.imageTag" (dict "Values" .Values "service" "core") }}
        imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
        {{- include "serviceradar.containerSecurityContext" . | nindent 8 }}
        ports:
        - name: epmd
          containerPort: 4369
        - name: dist
          containerPort: 9100
        - name: metrics
          containerPort: 9090
        env:
        - name: LANG
          value: "C.UTF-8"
        - name: LC_ALL
          value: "C.UTF-8"
        - name: CLUSTER_ENABLED
          value: "true"
        - name: CLUSTER_STRATEGY
          value: {{ default "dns" $coreVals.clusterStrategy | quote }}
        - name: CLUSTER_DNS_QUERY
          value: {{ printf "serviceradar-core-elx-headless.%s.svc.cluster.local" .Release.Namespace | quote }}
        - name: CLUSTER_NODE_BASENAME
          value: {{ $coreClusterNodeBasename | quote }}
        - name: CLUSTER_WEB_DNS_QUERY
          value: {{ default (printf "serviceradar-web-ng-headless.%s.svc.cluster.local" .Release.Namespace) $coreVals.clusterWebDnsQuery | quote }}
        - name: CLUSTER_WEB_NODE_BASENAME
          value: {{ default "serviceradar_web_ng" $coreVals.clusterWebNodeBasename | quote }}
        - name: CLUSTER_GATEWAY_DNS_QUERY
          value: {{ default (printf "serviceradar-agent-gateway-headless.%s.svc.cluster.local" .Release.Namespace) $coreVals.clusterGatewayDnsQuery | quote }}
        - name: CLUSTER_GATEWAY_NODE_BASENAME
          value: {{ default "serviceradar_agent_gateway" $coreVals.clusterGatewayNodeBasename | quote }}
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: KUBERNETES_SELECTOR
          value: {{ $coreClusterSelector | quote }}
        - name: KUBERNETES_NODE_BASENAME
          value: {{ $coreClusterNodeBasename | quote }}
        - name: CLUSTER_WEB_SERVICE
          value: {{ default "serviceradar-web-ng-headless" $coreVals.clusterWebService | quote }}
        - name: CLUSTER_GATEWAY_SERVICE
          value: {{ default "serviceradar-agent-gateway-headless" $coreVals.clusterGatewayService | quote }}
        - name: RELEASE_NODE
          value: "serviceradar_core@$(POD_IP)"
        - name: RELEASE_DISTRIBUTION
          value: "name"
        - name: RELEASE_COOKIE
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: cluster-cookie
        - name: EDGE_ONBOARDING_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: edge-onboarding-key
        - name: ELIXIR_ERL_OPTIONS
          value: "+fnu"
        {{- if .Values.spire.enabled }}
        - name: SPIFFE_TRUST_DOMAIN
          value: {{ $trustDomain | quote }}
        - name: SPIFFE_MODE
          value: {{ default "filesystem" .Values.spiffe.mode | quote }}
        - name: SPIFFE_CERT_DIR
          value: "/etc/serviceradar/certs"
        - name: SPIFFE_WORKLOAD_API_SOCKET
          value: "unix:///run/spire/sockets/agent.sock"
        - name: SPIFFE_TRUST_BUNDLE_PATH
          value: "/run/spire/bundle/bundle.crt"
        {{- end }}
        - name: SERVICERADAR_CLUSTER_COORDINATOR
          value: "true"
        - name: SERVICERADAR_CORE_RUN_MIGRATIONS
          value: "false"
        - name: SERVICERADAR_CORE_OBAN_ENABLED
          value: "true"
        - name: SERVICERADAR_ASH_OBAN_SCHEDULER_ENABLED
          value: {{ default true $coreVals.ashObanSchedulerEnabled | quote }}
        - name: SERVICERADAR_CORE_REPO_ENABLED
          value: "true"
        - name: SERVICERADAR_CORE_REGISTRIES_ENABLED
          value: "true"
        - name: SERVICERADAR_CORE_VAULT_ENABLED
          value: "true"
        - name: SERVICERADAR_LOCAL_MAILER
          value: "false"
        - name: POOL_SIZE
          value: {{ default 40 $database.poolSize | quote }}
        - name: DATABASE_QUEUE_TARGET_MS
          value: {{ default 2000 $database.queueTargetMs | quote }}
        - name: DATABASE_QUEUE_INTERVAL_MS
          value: {{ default 2000 $database.queueIntervalMs | quote }}
        - name: DATABASE_TIMEOUT_MS
          value: {{ default 120000 $database.timeoutMs | quote }}
        - name: DATABASE_POOL_TIMEOUT_MS
          value: {{ default 120000 $database.poolTimeoutMs | quote }}
        - name: CONTROL_REPO_ENABLED
          value: {{ default true $controlDatabase.enabled | quote }}
        - name: CONTROL_REPO_POOL_SIZE
          value: {{ default 5 $controlDatabase.poolSize | quote }}
        - name: CONTROL_DATABASE_QUEUE_TARGET_MS
          value: {{ default 2000 $controlDatabase.queueTargetMs | quote }}
        - name: CONTROL_DATABASE_QUEUE_INTERVAL_MS
          value: {{ default 2000 $controlDatabase.queueIntervalMs | quote }}
        - name: CONTROL_DATABASE_TIMEOUT_MS
          value: {{ default 120000 $controlDatabase.timeoutMs | quote }}
        - name: CONTROL_DATABASE_POOL_TIMEOUT_MS
          value: {{ default 120000 $controlDatabase.poolTimeoutMs | quote }}
        - name: OBAN_QUEUE_DEFAULT
          value: {{ default 10 $obanQueues.default | quote }}
        - name: OBAN_QUEUE_MAINTENANCE
          value: {{ default 5 $obanQueues.maintenance | quote }}
        - name: OBAN_QUEUE_MONITORING
          value: {{ default 5 $obanQueues.monitoring | quote }}
        - name: OBAN_QUEUE_ALERTS
          value: {{ default 5 $obanQueues.alerts | quote }}
        - name: OBAN_QUEUE_SERVICE_CHECKS
          value: {{ default 10 $obanQueues.serviceChecks | quote }}
        - name: OBAN_QUEUE_NOTIFICATIONS
          value: {{ default 5 $obanQueues.notifications | quote }}
        - name: OBAN_QUEUE_ONBOARDING
          value: {{ default 3 $obanQueues.onboarding | quote }}
        - name: OBAN_QUEUE_EVENTS
          value: {{ default 10 $obanQueues.events | quote }}
        - name: OBAN_QUEUE_SWEEPS
          value: {{ default 20 $obanQueues.sweeps | quote }}
        - name: OBAN_QUEUE_EDGE
          value: {{ default 10 $obanQueues.edge | quote }}
        - name: OBAN_QUEUE_INTEGRATIONS
          value: {{ default 5 $obanQueues.integrations | quote }}
        - name: OBAN_QUEUE_NATS_ACCOUNTS
          value: {{ default 3 $obanQueues.natsAccounts | quote }}
        - name: SYNC_INGESTOR_BATCH_CONCURRENCY
          value: {{ default 2 $syncIngestor.batchConcurrency | quote }}
        - name: SYNC_INGESTOR_COALESCE_MS
          value: {{ default 250 $syncIngestor.coalesceMs | quote }}
        - name: SYNC_INGESTOR_MAX_INFLIGHT
          value: {{ default 2 $syncIngestor.maxInflight | quote }}
        - name: SYNC_INGESTOR_QUEUE_MAX_CHUNKS
          value: {{ default 10 $syncIngestor.queueMaxChunks | quote }}
        - name: PLUGIN_STORAGE_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: plugin-storage-signing-secret
        {{- if $webNgPublicUrl }}
        - name: PLUGIN_STORAGE_PUBLIC_URL
          value: {{ $webNgPublicUrl | quote }}
        {{- end }}
        {{- if $pluginStorage.downloadTtlSeconds }}
        - name: PLUGIN_STORAGE_DOWNLOAD_TTL_SECONDS
          value: {{ $pluginStorage.downloadTtlSeconds | quote }}
        {{- end }}
        - name: SYNC_INGESTOR_ASYNC
          value: {{ default true $syncIngestor.async | quote }}
        - name: DEVICE_ENRICHMENT_RULES_DIR
          value: {{ $deviceEnrichmentRulesDir | quote }}
        - name: CNPG_HOST
          value: {{ include "serviceradar.cnpgWorkloadHost" (dict "root" . "workload" "core") | quote }}
        - name: CNPG_PORT
          value: {{ default 5432 $cnpg.port | quote }}
        {{- if and (default false $cnpgPooler.enabled) (default false (get $cnpgPoolerRoute "core")) }}
        - name: CNPG_TLS_SERVER_NAME
          value: {{ include "serviceradar.cnpgDirectHost" . | quote }}
        - name: DATABASE_PREPARE
          value: "unnamed"
        - name: OBAN_NOTIFIER
          value: "pg"
        {{- end }}
        - name: CNPG_DATABASE
          value: {{ default "serviceradar" $cnpg.database | quote }}
        - name: CNPG_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ default "serviceradar-db-credentials" $cnpg.credentialsSecret | quote }}
              key: username
        - name: CNPG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ default "serviceradar-db-credentials" $cnpg.credentialsSecret | quote }}
              key: password
        - name: CNPG_SSL_MODE
          value: {{ default "verify-full" $cnpg.sslmode | quote }}
        - name: CNPG_CA_FILE
          value: {{ default "/etc/serviceradar/cnpg/ca.crt" $cnpg.caFile | quote }}
        {{- if $cnpg.requireClientCert }}
        - name: CNPG_CERT_FILE
          value: {{ printf "%s/%s" (default "/etc/serviceradar/certs" $cnpg.certDir) (default "cnpg-client.pem" $cnpg.clientCertName) | quote }}
        - name: CNPG_KEY_FILE
          value: {{ printf "%s/%s" (default "/etc/serviceradar/certs" $cnpg.certDir) (default "cnpg-client-key.pem" $cnpg.clientKeyName) | quote }}
        {{- end }}
        - name: DATASVC_HOST
          value: "serviceradar-datasvc"
        - name: DATASVC_PORT
          value: "50057"
        - name: DATASVC_SEC_MODE
          value: {{ default "spiffe" .Values.kv.secMode | quote }}
        - name: DATASVC_SSL
          value: "true"
        - name: DATASVC_CERT_DIR
          value: "/etc/serviceradar/certs"
        - name: DATASVC_CERT_NAME
          value: "core"
        - name: NATS_ENABLED
          value: "true"
        - name: NATS_URL
          value: "tls://serviceradar-nats:4222"
        - name: NATS_TLS
          value: "true"
        - name: NATS_SERVER_NAME
          value: "serviceradar-nats"
        {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
        - name: NATS_CREDS_FILE
          value: "/etc/serviceradar/creds/platform.creds"
        {{- end }}
        - name: LOG_PROMOTION_CONSUMER_ENABLED
          value: {{ default false $coreVals.logPromotionConsumerEnabled | quote }}
        - name: MTR_AUTOMATION_ENABLED
          value: {{ default false $mtrAutomation.enabled | quote }}
        - name: MTR_AUTOMATION_BASELINE_ENABLED
          value: {{ default false $mtrAutomation.baselineEnabled | quote }}
        - name: MTR_AUTOMATION_TRIGGER_ENABLED
          value: {{ default false $mtrAutomation.triggerEnabled | quote }}
        - name: MTR_AUTOMATION_CONSENSUS_ENABLED
          value: {{ default false $mtrAutomation.consensusEnabled | quote }}
        - name: MTR_BASELINE_TICK_MS
          value: {{ default 60000 $mtrAutomation.baselineTickMs | quote }}
        - name: MTR_CONSENSUS_COHORT_RETENTION_MS
          value: {{ default 300000 $mtrAutomation.consensusCohortRetentionMs | quote }}
        - name: CLOAK_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $secrets | quote }}
              key: cloak-key
        {{- if $geoipMmdb.enabled }}
        - name: GEOLITE_MMDB_DIR
          value: {{ default "/var/lib/serviceradar/geoip" $geoipMmdb.basePath | quote }}
        {{- end }}
        {{- with .Values.otelExporter }}
        {{- if .enabled }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .endpoint | quote }}
        - name: OTEL_CERT_DIR
          value: {{ default "/etc/serviceradar/certs" .certDir | quote }}
        - name: OTEL_CERT_NAME
          value: "core"
        - name: OTEL_SERVICE_NAME
          value: "serviceradar-core-elx"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: {{ default "1.0" .samplingRatio | quote }}
        {{- end }}
        {{- end }}
        {{- with $coreVals.extraEnv }}
        {{- range $name, $value := . }}
        - name: {{ $name | quote }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        volumeMounts:
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
        - name: {{ $cnpgClusterName }}-ca
          mountPath: /etc/serviceradar/cnpg
          readOnly: true
        {{- if .Values.spire.enabled }}
        - name: spire-agent-socket
          mountPath: /run/spire/sockets
          readOnly: true
        - name: spire-bundle
          mountPath: /run/spire/bundle
          readOnly: true
        {{- end }}
        {{- if $geoipMmdb.enabled }}
        - name: geoip-mmdb
          mountPath: {{ default "/var/lib/serviceradar/geoip" $geoipMmdb.basePath | quote }}
        {{- end }}
        {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
        - name: nats-creds
          mountPath: /etc/serviceradar/creds
          readOnly: true
        {{- end }}
        {{- if $deviceEnrichmentFsEnabled }}
        - name: device-enrichment-rules
          mountPath: {{ $deviceEnrichmentRulesDir | quote }}
          readOnly: true
        {{- end }}
        resources:
          limits:
            cpu: "4"
            memory: "4Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          exec:
            command:
              - /app/bin/serviceradar_core_elx
              - pid
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
              - /app/bin/serviceradar_core_elx
              - pid
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: cert-data
        secret:
          secretName: {{ include "serviceradar.runtimeCertsSecretName" . | quote }}
      - name: {{ $cnpgClusterName }}-ca
        secret:
          secretName: {{ $cnpgClusterName }}-ca
      {{- if .Values.spire.enabled }}
      - name: spire-agent-socket
        hostPath:
          path: {{ include "serviceradar.spireSocketHostPath" . | quote }}
          type: DirectoryOrCreate
      - name: spire-bundle
        configMap:
          name: {{ $spireBundle | quote }}
      {{- end }}
      {{- if $geoipMmdb.enabled }}
      - name: geoip-mmdb
        persistentVolumeClaim:
          claimName: {{ default "serviceradar-geoip-mmdb" $geoipMmdb.existingClaim | quote }}
      {{- end }}
      {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
      - name: nats-creds
        secret:
          secretName: serviceradar-nats-creds
          optional: true
      {{- end }}
      {{- if $deviceEnrichmentFsEnabled }}
      - name: device-enrichment-rules
        {{- if $deviceEnrichmentFsConfigMap }}
        configMap:
          name: {{ $deviceEnrichmentFsConfigMap | quote }}
        {{- else if $deviceEnrichmentFsSecret }}
        secret:
          secretName: {{ $deviceEnrichmentFsSecret | quote }}
        {{- else if $deviceEnrichmentFsClaim }}
        persistentVolumeClaim:
          claimName: {{ $deviceEnrichmentFsClaim | quote }}
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-core
  labels:
    app.kubernetes.io/part-of: serviceradar
    app.kubernetes.io/name: serviceradar-core
    app.kubernetes.io/component: core
spec:
  selector:
    app: serviceradar-core
  ports:
  - name: http
    port: 8090
    targetPort: 8090
  - name: grpc
    port: 50052
    targetPort: 50052
  - name: metrics
    port: 9090
    targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-core-elx-headless
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: serviceradar-core
  ports:
  - name: epmd
    port: 4369
    targetPort: 4369
