{{- if and .Values.spire.enabled .Values.spire.postgres.enabled }}
{{- $ns := default .Release.Namespace .Values.spire.namespace }}
{{- $pg := .Values.spire.postgres }}
{{- $existingSpire := (lookup "v1" "Secret" $ns ($pg.secretName | default "spire-db-credentials")) }}
{{- $existingSuper := (lookup "v1" "Secret" $ns "cnpg-superuser") }}
{{- $spireUser := default "spire" $pg.username }}
{{- $spirePass := default "" $pg.password }}
{{- if and $existingSpire $existingSpire.data.password }}
  {{- $spirePass = (b64dec $existingSpire.data.password) }}
{{- end }}
{{- if eq $spirePass "" }}
  {{- $spirePass = randAlphaNum 32 }}
{{- end }}
{{- $superPass := default "" $pg.password }}
{{- if and $existingSuper $existingSuper.data.password }}
  {{- $superPass = (b64dec $existingSuper.data.password) }}
{{- end }}
{{- if eq $superPass "" }}
  {{- $superPass = randAlphaNum 32 }}
{{- end }}
{{- $cnpg := default (dict) .Values.cnpg }}
{{- $clientCASecret := default "" $cnpg.clientCASecret }}
{{- if and (not $clientCASecret) $cnpg.requireClientCert }}
  {{- $clientCASecret = "serviceradar-cnpg-client-ca" }}
{{- end }}
{{- $existingAppCreds := (lookup "v1" "Secret" $ns "serviceradar-db-credentials") }}
{{- $appUser := default "serviceradar" $cnpg.username }}
{{- $appPass := default "" $cnpg.password }}
{{- if and $existingAppCreds $existingAppCreds.data.password }}
  {{- $appPass = (b64dec $existingAppCreds.data.password) }}
{{- end }}
{{- if eq $appPass "" }}
  {{- $appPass = randAlphaNum 32 }}
{{- end }}
{{- $defaultExtensionsSQL := list
      "CREATE EXTENSION IF NOT EXISTS timescaledb;"
      "CREATE EXTENSION IF NOT EXISTS age;"
      "CREATE EXTENSION IF NOT EXISTS postgis;"
      "CREATE EXTENSION IF NOT EXISTS vector;"
      (printf "GRANT USAGE ON SCHEMA ag_catalog TO \"%s\";" $appUser)
      (printf "GRANT ALL ON ALL TABLES IN SCHEMA ag_catalog TO \"%s\";" $appUser)
      (printf "GRANT ALL ON ALL SEQUENCES IN SCHEMA ag_catalog TO \"%s\";" $appUser)
      (printf "GRANT EXECUTE ON ALL FUNCTIONS IN SCHEMA ag_catalog TO \"%s\";" $appUser)
  -}}
{{- $imageName := $pg.imageName }}
{{- if not $imageName }}
  {{- $imageRepo := default "registry.carverauto.dev/serviceradar/serviceradar-cnpg" $pg.image }}
  {{- $imageTag := default "latest" $pg.imageTag }}
  {{- $imageName = printf "%s:%s" $imageRepo $imageTag }}
{{- end }}
{{- $sharedPreload := $pg.sharedPreloadLibraries }}
{{- if not $sharedPreload }}
  {{- $sharedPreload = list "timescaledb" "age" }}
{{- else if kindIs "string" $sharedPreload }}
  {{- $trimmed := list }}
  {{- range $item := splitList "," $sharedPreload }}
    {{- if $item }}
      {{- $trimmed = append $trimmed (trim $item) }}
    {{- end }}
  {{- end }}
  {{- $sharedPreload = $trimmed }}
{{- end }}
{{- $extensionsSQL := $pg.extensionsSQL }}
{{- if not $extensionsSQL }}
  {{- $extensionsSQL = $defaultExtensionsSQL }}
{{- end }}
{{- $postgresqlParameters := $pg.postgresqlParameters }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pg.secretName }}
  namespace: {{ $ns }}
  annotations:
    "helm.sh/resource-policy": "keep"
type: Opaque
stringData:
  username: {{ $spireUser }}
  password: {{ $spirePass | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-superuser
  namespace: {{ $ns }}
  annotations:
    "helm.sh/resource-policy": "keep"
type: Opaque
stringData:
  password: {{ $superPass | quote }}
  username: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: serviceradar-db-credentials
  namespace: {{ $ns }}
  annotations:
    "helm.sh/resource-policy": "keep"
type: Opaque
stringData:
  username: {{ $appUser | quote }}
  password: {{ $appPass | quote }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ default "cnpg" $pg.clusterName }}
  namespace: {{ $ns }}
  annotations:
    # CRITICAL: Prevent Helm/ArgoCD from deleting this cluster during upgrades.
    # Changing clusterName without this would cause data loss!
    "helm.sh/resource-policy": "keep"
spec:
  imageName: {{ $imageName }}
  instances: {{ default 3 $pg.instances }}
  {{- if $pg.imagePullSecrets }}
  imagePullSecrets:
    {{- range $secret := $pg.imagePullSecrets }}
    {{- if kindIs "string" $secret }}
    - name: {{ $secret }}
    {{- else }}
    - name: {{ $secret.name }}
    {{- end }}
    {{- end }}
  {{- end }}
  storage:
    size: {{ default "100Gi" $pg.storageSize }}
    {{- if $pg.storageClass }}
    storageClass: {{ $pg.storageClass }}
    {{- end }}
  bootstrap:
    initdb:
      database: {{ default "spire" $pg.database }}
      owner: {{ default "spire" $pg.username }}
      secret:
        name: {{ $pg.secretName }}
      {{- if $extensionsSQL }}
      postInitApplicationSQL:
        {{- range $stmt := $extensionsSQL }}
        - {{ $stmt | quote }}
        {{- end }}
      {{- end }}
  postgresql:
    {{- if $postgresqlParameters }}
    parameters:
      {{- range $k, $v := $postgresqlParameters }}
      {{ $k | quote }}: {{ $v | quote }}
      {{- end }}
    {{- end }}
    {{- if $sharedPreload }}
    shared_preload_libraries:
      {{- range $lib := $sharedPreload }}
      - {{ $lib | quote }}
      {{- end }}
    {{- end }}
    {{- if $cnpg.requireClientCert }}
    pg_hba:
      - "hostnossl all all all reject"
      - "hostssl all all all scram-sha-256 clientcert=verify-ca"
    {{- else }}
    # Allow SSL connections with password auth (no client cert required)
    pg_hba:
      - "hostnossl all all all reject"
      - "hostssl all all all scram-sha-256"
    {{- end }}
  {{- if $clientCASecret }}
  certificates:
    clientCASecret: {{ $clientCASecret | quote }}
  {{- end }}
  managed:
    roles:
      - name: {{ default "spire" $pg.username }}
        ensure: present
        login: true
        passwordSecret:
          name: {{ $pg.secretName }}
      - name: serviceradar
        ensure: present
        login: true
        passwordSecret:
          name: serviceradar-db-credentials
  monitoring:
    enablePodMonitor: true
  enableSuperuserAccess: true
  failoverDelay: 0
{{- end }}
