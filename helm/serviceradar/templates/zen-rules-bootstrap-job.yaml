{{- if .Values.zenRulesBootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "serviceradar-zen-rules-bootstrap-%s" (include "serviceradar.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    app: serviceradar-zen-rules-bootstrap
    app.kubernetes.io/part-of: serviceradar
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  activeDeadlineSeconds: 180
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: serviceradar-zen-rules-bootstrap
    spec:
      restartPolicy: OnFailure
      {{- include "serviceradar.podSecurityContext" . | nindent 6 }}
      serviceAccountName: {{ .Values.spire.zenServiceAccount | default "serviceradar-zen" }}
      {{- include "serviceradar.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-nats
          image: registry.carverauto.dev/serviceradar/serviceradar-tools:{{ include "serviceradar.imageTag" (dict "Values" .Values "service" "tools") }}
          imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
          {{- include "serviceradar.nonRootContainerSecurityContext" . | nindent 10 }}
          command: ["/usr/local/bin/wait-for-port"]
          args:
            - "--host"
            - "serviceradar-nats"
            - "--port"
            - "4222"
            - "--attempts"
            - "30"
            - "--interval"
            - "2s"
          resources:
            limits:
              cpu: "100m"
              memory: "64Mi"
            requests:
              cpu: "50m"
              memory: "32Mi"
      containers:
        - name: zen-rules-bootstrap
          image: registry.carverauto.dev/serviceradar/serviceradar-tools{{ include "serviceradar.imageRefSuffix" (dict "Values" .Values "service" "tools") }}
          imagePullPolicy: {{ include "serviceradar.imagePullPolicy" . }}
          {{- include "serviceradar.nonRootContainerSecurityContext" . | nindent 10 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              RULES_DIR="/etc/serviceradar/rules"
              CONFIG_PATH="/etc/serviceradar/zen.json"
              FORCE_REINSTALL="{{ .Values.zenRulesBootstrap.forceReinstall }}"
              DEFAULT_KV_BUCKET="{{ .Values.kv.bucket | default "serviceradar-datasvc" }}"
              DEFAULT_NATS_URL="tls://serviceradar-nats:4222"
              export HOME="/tmp"
              export XDG_CONFIG_HOME="/tmp/.config"
              mkdir -p "${XDG_CONFIG_HOME}/nats/context"
              unset NATS_CONTEXT

              echo "Starting Zen rules bootstrap..."
              echo "Force reinstall: ${FORCE_REINSTALL}"

              json_string() {
                local key="$1"
                sed -n "s/.*\"${key}\":[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" "$CONFIG_PATH" | head -n 1
              }

              nats_kv() {
                if [ -f /etc/serviceradar/creds/platform.creds ]; then
                  /usr/local/bin/nats \
                    --server "${NATS_URL}" \
                    --creds /etc/serviceradar/creds/platform.creds \
                    --tlscert /etc/serviceradar/certs/zen.pem \
                    --tlskey /etc/serviceradar/certs/zen-key.pem \
                    --tlsca /etc/serviceradar/certs/root.pem \
                    kv "$@"
                else
                  /usr/local/bin/nats \
                    --server "${NATS_URL}" \
                    --tlscert /etc/serviceradar/certs/zen.pem \
                    --tlskey /etc/serviceradar/certs/zen-key.pem \
                    --tlsca /etc/serviceradar/certs/root.pem \
                    kv "$@"
                fi
              }

              AGENT_ID="$(json_string agent_id)"
              STREAM_NAME="$(json_string stream_name)"
              KV_BUCKET="$(json_string kv_bucket)"
              NATS_URL="$(json_string nats_url)"

              [ -n "${AGENT_ID}" ] || AGENT_ID="default-agent"
              [ -n "${STREAM_NAME}" ] || STREAM_NAME="events"
              [ -n "${KV_BUCKET}" ] || KV_BUCKET="${DEFAULT_KV_BUCKET}"
              [ -n "${NATS_URL}" ] || NATS_URL="${DEFAULT_NATS_URL}"

              if grep -Eq '"discover_rules_from_kv"[[:space:]]*:[[:space:]]*true' "${CONFIG_PATH}" 2>/dev/null; then
                echo "KV rule discovery enabled; skipping bundled Zen rules bootstrap"
                exit 0
              fi

              install_rule() {
                local file="$1"
                local subject="$2"
                local key="$3"

                if [ ! -f "$file" ]; then
                  echo "Warning: Rule file $file not found, skipping"
                  return 0
                fi

                local attempt=1
                local max_attempts=6
                local delay=2
                local store_key="agents/${AGENT_ID}/${STREAM_NAME}/${subject}/${key}.json"

                if [ "${FORCE_REINSTALL}" != "true" ]; then
                  local existing
                  existing="$(mktemp)"
                  if nats_kv get "${KV_BUCKET}" "${store_key}" --raw >"${existing}" 2>/dev/null; then
                    if cmp -s "${file}" "${existing}"; then
                      echo "✓ Rule $key already current, skipping"
                      rm -f "${existing}"
                      return 0
                    fi
                  fi
                  rm -f "${existing}"
                fi

                while [ "$attempt" -le "$max_attempts" ]; do
                  echo "Installing rule: $key for subject: $subject (attempt ${attempt}/${max_attempts})"
                  if nats_kv put "${KV_BUCKET}" "${store_key}" <"${file}"; then
                    echo "✓ Rule $key installed successfully"
                    return 0
                  fi

                  echo "✗ Failed to install rule $key (attempt ${attempt})"
                  attempt=$((attempt + 1))
                  if [ "$attempt" -le "$max_attempts" ]; then
                    echo "Retrying in ${delay}s..."
                    sleep "$delay"
                    delay=$((delay * 2))
                    if [ "$delay" -gt 30 ]; then
                      delay=30
                    fi
                  fi
                done

                return 1
              }

              # Install default rules
              # Rule: strip_full_message -> logs.syslog
              install_rule "${RULES_DIR}/strip_full_message.json" "logs.syslog" "strip_full_message"

              # Rule: cef_severity -> logs.syslog
              install_rule "${RULES_DIR}/cef_severity.json" "logs.syslog" "cef_severity"

              # Rule: snmp_severity -> logs.snmp
              install_rule "${RULES_DIR}/snmp_severity.json" "logs.snmp" "snmp_severity"

              # Rule: passthrough -> logs.otel
              install_rule "${RULES_DIR}/passthrough.json" "logs.otel" "passthrough"

              echo "✅ Zen rules bootstrap completed successfully"
          env:
            - name: CONFIG_PATH
              value: "/etc/serviceradar/zen.json"
            - name: NATS_URL
              value: "tls://serviceradar-nats:4222"
            - name: KV_URL
              value: "serviceradar-datasvc:50057"
            - name: NATS_TLS
              value: "true"
            - name: USE_TLS
              value: "true"
            - name: RUST_LOG
              value: "info"
          {{- include "serviceradar.kvEnv" . | nindent 12 }}
          volumeMounts:
            - name: zen-rules
              mountPath: /etc/serviceradar/rules
              readOnly: true
            - name: serviceradar-config
              mountPath: /etc/serviceradar
            - name: cert-data
              mountPath: /etc/serviceradar/certs
              readOnly: true
            {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
            - name: nats-creds
              mountPath: /etc/serviceradar/creds
              readOnly: true
            {{- end }}
            {{- if .Values.spire.enabled }}
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
            {{- end }}
          resources:
            limits:
              cpu: "200m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: zen-rules
          configMap:
            name: serviceradar-zen-rules
        - name: serviceradar-config
          configMap:
            name: serviceradar-config
        - name: cert-data
          secret:
            secretName: {{ include "serviceradar.runtimeCertsSecretName" . | quote }}
        {{- if or .Values.natsCreds.platform .Values.natsCreds.system .Values.natsCreds.autoGenerate }}
        - name: nats-creds
          secret:
            secretName: serviceradar-nats-creds
        {{- end }}
        {{- if .Values.spire.enabled }}
        - name: spire-agent-socket
          hostPath:
            path: {{ include "serviceradar.spireSocketHostPath" . | quote }}
            type: DirectoryOrCreate
        {{- end }}
{{- end }}
