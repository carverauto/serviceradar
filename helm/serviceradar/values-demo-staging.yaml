# Demo-Staging Environment Values
# Consumed by ArgoCD via Helm `valueFiles`.

namespace: demo-staging

global:
  imageTag: "sha-dc0513544a7b5edd5eec17e07bbb416fc39ffd73"
  imagePullPolicy: Always

image:
  registryPullSecret: registry-carverauto-dev-cred

bmpCollector:
  image:
    repository: registry.carverauto.dev/serviceradar/arancini
    tag: "sha-ff77da50bee57bda07036888c757ea8c8359d7e7"

agentGateway:
  enabled: true

agent:
  pushInterval: "30s"
  statusDebounceInterval: "30s"
  statusHeartbeatInterval: "5m"
  checkersStorage:
    enabled: true
    basePath: "/var/lib/serviceradar/checkers"
    existingClaim: ""
    size: 2Gi
    storageClassName: ""

ingress:
  enabled: true
  host: staging.serviceradar.cloud
  className: nginx
  tls:
    enabled: true
    secretName: serviceradar-staging-tls
    clusterIssuer: carverauto-issuer

webNg:
  devRoutes: "true"
  localMailer: "true"
  publicUrl: "https://staging.serviceradar.cloud"
  pluginStorage:
    enabled: true
    basePath: "/var/lib/serviceradar/plugin-packages/data"
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
    downloadTtlSeconds: 86400

faker:
  simulation:
    totalDevices: 1000
    ipShuffle:
      enabled: true
      interval: "10m"
      percentage: 5
      warmupCycles: 2
      allowExpansion: false
      poolHeadroomPercent: 0

core:
  # MTR automation rollout profiles (copy/paste into mtrAutomation):
  # baseline_only:
  #   enabled: true
  #   baselineEnabled: true
  #   triggerEnabled: false
  #   consensusEnabled: false
  #   baselineTickMs: 60000
  #   consensusCohortRetentionMs: 300000
  # trigger_capture:
  #   enabled: true
  #   baselineEnabled: true
  #   triggerEnabled: true
  #   consensusEnabled: false
  #   baselineTickMs: 60000
  #   consensusCohortRetentionMs: 300000
  # full_consensus:
  #   enabled: true
  #   baselineEnabled: true
  #   triggerEnabled: true
  #   consensusEnabled: true
  #   baselineTickMs: 60000
  #   consensusCohortRetentionMs: 300000
  mtrAutomation:
    enabled: true
    baselineEnabled: true
    triggerEnabled: true
    consensusEnabled: true
    baselineTickMs: 60000
    consensusCohortRetentionMs: 300000

# Temporarily disabled client CA for initial testing - there's a circular dependency
# where CNPG needs the client CA secret, but the job that creates it
# runs post-install and needs CNPG to be running first.
# cnpg:
#   clientCASecret: serviceradar-cnpg-client-ca
#   clientCAFromCerts: true
#   requireClientCert: true

spire:
  enabled: true
  trustDomain: carverauto.dev
  clusterName: carverauto-cluster
  postgres:
    enabled: true
    clusterName: cnpg-staging
    instances: 3
    storageSize: 10Gi

trapd:
  externalService:
    enabled: true
    annotations:
      metallb.universe.tf/address-pool: k3s-pool

flowgger:
  externalService:
    enabled: true
    annotations:
      metallb.universe.tf/address-pool: k3s-pool
