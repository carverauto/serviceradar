gobgp:
  enabled: false
  image:
    repository: docker.io/osrg/gobgp
    tag: latest
    pullPolicy: IfNotPresent
  api:
    host: "0.0.0.0"
    port: 50051
  bgp:
    localAsn: 401642
    routerId: "204.209.51.59"
  bmp:
    address: "serviceradar-bmp-collector"
    port: 11019
  # By default we reuse faker BGP peers to keep topology aligned.
  peers: []
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  service:
    type: ClusterIP
    annotations: {}
coreClient:
  address: "" # auto-derived to serviceradar-core.<namespace>.svc.cluster.local:50052
  secMode: mtls
  trustDomain: ""
  serverSPIFFEID: ""
  workloadSocket: unix:/run/spire/sockets/agent.sock
  certDir: /etc/serviceradar/certs
cnpg:
  enabled: true
  clusterName: cnpg
  instances: 3
  storageClass: local-path
  storageSize: 100Gi
  imageName: ghcr.io/carverauto/serviceradar-cnpg:18.3.0-sr2
  sharedPreloadLibraries:
    - timescaledb
    - age
    - pg_stat_statements
  postgresqlParameters:
    log_min_duration_statement: "500ms"
    log_lock_waits: "on"
    deadlock_timeout: "1s"
    pg_stat_statements.max: "10000"
    pg_stat_statements.track: "all"
    pg_stat_statements.track_planning: "on"
    track_io_timing: "on"
  extensionsSQL:
    - CREATE EXTENSION IF NOT EXISTS timescaledb;
    - CREATE EXTENSION IF NOT EXISTS age;
    - CREATE EXTENSION IF NOT EXISTS postgis;
    - CREATE EXTENSION IF NOT EXISTS vector;
    - CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
  superuserSecret: cnpg-superuser
  superuserUsername: postgres
  superuserPassword: ""
  host: ""
  port: 5432
  database: serviceradar
  username: serviceradar
  password: ""
  # Schema for application data. The app user's search_path is set to this schema.
  # For OSS single-deployment mode, use "platform" (default).
  # The schema is created automatically during bootstrap.
  schema: platform
  runtimeParams:
    # search_path is set automatically based on cnpg.schema
    search_path: ""
  credentialsSecret: serviceradar-db-credentials
  # Helm reuses existing secrets and does not rotate CNPG credentials on upgrade.
  # Delete/recreate cnpg-superuser or serviceradar-db-credentials to rotate.
  sslmode: verify-full
  certDir: /etc/serviceradar/certs
  caFile: /etc/serviceradar/cnpg/ca.crt
  clientCertName: cnpg-client.pem
  clientKeyName: cnpg-client-key.pem
  clientCASecret: ""
  clientCAFromCerts: false
  requireClientCert: false

# Shared storage for GeoLite2 MMDB files used by GeoIP/ASN enrichment.
# This must be mounted wherever enrichment jobs run (core) and anywhere that
# might need local lookups (web-ng). Enrichment should never do external API calls
# at query time.
geoipMmdb:
  enabled: true
  basePath: "/var/lib/serviceradar/geoip"
  existingClaim: ""
  size: 1Gi
  storageClassName: ""
webNg:
  host: ""
  publicUrl: ""
  godViewEnabled: "true"
  checkOrigin: "false"
  devRoutes: "false"
  localMailer: "false"
  # Extra environment variables for the web-ng pod.
  extraEnv: {}
  # Resource requests/limits for web-ng.
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "200m"
      memory: "512Mi"
  gatewayAddress: ""
  natsUrl: ""
  coreAddress: ""
  clusterEnabled: "true"
  clusterStrategy: "dns"
  clusterDnsQuery: ""
  clusterCoreDnsQuery: ""
  clusterGatewayDnsQuery: ""
  clusterCookie: "serviceradar_dev_cookie"
  kubernetesNodeBasename: "serviceradar_web_ng"
  datasvc:
    host: "serviceradar-datasvc"
    port: 50057
    secMode: "mtls"
    certDir: "/etc/serviceradar/certs"
    certName: "web"
    serverName: "datasvc.serviceradar"
  pluginStorage:
    enabled: true
    basePath: "/var/lib/serviceradar/plugin-packages"
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
    downloadTtlSeconds: 86400
agent:
  enabled: true
  agentId: "k8s-agent"
  hostNetwork: true
  gatewayAddress: ""
  partitionId: "default"
  pushInterval: "30s"
  statusDebounceInterval: "30s"
  statusHeartbeatInterval: "5m"
  checkersStorage:
    enabled: true
    basePath: "/var/lib/serviceradar/checkers"
    existingClaim: ""
    size: 2Gi
    storageClassName: ""
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
agentGateway:
  enabled: true
  replicas: 1
  gatewayId: "gateway-platform"
  partitionId: "default"
  domain: "default"
  capabilities: "icmp,tcp,http,grpc"
  clusterStrategy: "dns"
  clusterCoreService: "serviceradar-core-elx-headless"
  clusterCoreNodeBasename: "serviceradar_core"
  kubernetesSelector: "app.kubernetes.io/part-of=serviceradar"
  kubernetesNodeBasename: "serviceradar_agent_gateway"
  service:
    port: 50052
    type: LoadBalancer
    nodePort: null
    loadBalancerIP: ""
    externalTrafficPolicy: Cluster
    annotations: {}
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "200m"
      memory: "512Mi"
dbEventWriter:
  # Enable database migrations on startup (creates otel_traces, logs, etc. tables)
  enableMigrations: true
  # Use on-disk config to avoid storing DB secrets in KV; passwords come from the secret env vars.
  configSource: file
  kvBootstrap:
    enabled: true
logCollector:
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # External service configuration for syslog/NetFlow ingestion from outside the cluster.
  # When enabled, creates a LoadBalancer service separate from the internal ClusterIP.
  externalService:
    enabled: false
    # Service type: LoadBalancer, NodePort, or ClusterIP
    type: LoadBalancer
    # Only advertise from nodes with local endpoints (required for Calico BGP)
    externalTrafficPolicy: Cluster
    # Annotations for load balancer configuration (MetalLB, cloud providers, etc.)
    # Example for MetalLB: metallb.universe.tf/address-pool: k3s-pool
    # Example for AWS NLB: service.beta.kubernetes.io/aws-load-balancer-type: nlb
    annotations: {}
    # Optional static IP for the load balancer (if supported by provider)
    loadBalancerIP: ""
    # Port configuration for external access
    ports:
      syslog:
        enabled: true
        port: 514          # External port
        targetPort: 514    # Container port
        protocol: UDP
      netflow:
        enabled: false
        port: 2055
        targetPort: 2055
        protocol: UDP
trapd:
  # External service configuration for SNMP trap ingestion from outside the cluster.
  # When enabled, creates a LoadBalancer service separate from the internal ClusterIP.
  externalService:
    enabled: false
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations: {}
    loadBalancerIP: ""
    ports:
      snmp:
        enabled: true
        port: 162
        targetPort: 162
        protocol: UDP
flowCollector:
  enabled: false
  config:
    nats_url: "tls://serviceradar-nats:4222"
    nats_creds_file: "/etc/serviceradar/creds/platform.creds"
    stream_name: "events"
    channel_size: 10000
    batch_size: 100
    publish_timeout_ms: 5000
    listeners:
      - protocol: "sflow"
        listen_addr: "0.0.0.0:6343"
        subject: "flows.raw.sflow"
      - protocol: "netflow"
        listen_addr: "0.0.0.0:2055"
        subject: "flows.raw.netflow"
    security:
      mode: "mtls"
      cert_dir: "/etc/serviceradar/certs"
      tls:
        cert_file: "flow-collector.pem"
        key_file: "flow-collector-key.pem"
        ca_file: "ca.crt"
  data:
    enabled: true
    existingClaim: ""
    size: 1Gi
    storageClassName: ""
  service:
    type: ClusterIP
    annotations: {}
    loadBalancerIP: ""
    externalTrafficPolicy: Cluster
    ports:
      netflow:
        enabled: true
        port: 2055
        targetPort: 2055
        protocol: UDP
      sflow:
        enabled: true
        port: 6343
        targetPort: 6343
        protocol: UDP
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
bmpCollector:
  enabled: false
  image:
    repository: ghcr.io/carverauto/arancini
    tag: "v0.7.2"
    pullPolicy: IfNotPresent
  args:
    - "--bmp-address=0.0.0.0:11019"
    - "--kafka-disable"
    - "--nats-enable"
    - "--nats-server=nats://serviceradar-nats:4222"
    - "--nats-subject=arancini.updates"
    - "--nats-tls-required"
    - "--nats-tls-ca-cert-path=/etc/serviceradar/certs/root.pem"
    - "--nats-tls-client-cert-path=/etc/serviceradar/certs/bmp-collector.pem"
    - "--nats-tls-client-key-path=/etc/serviceradar/certs/bmp-collector-key.pem"
    - "--curation-state-path=/var/lib/serviceradar/state.bin"
  data:
    enabled: true
    existingClaim: ""
    size: 1Gi
    storageClassName: ""
  service:
    type: ClusterIP
    annotations: {}
    loadBalancerIP: ""
    externalTrafficPolicy: Cluster
    ports:
      bmp:
        enabled: true
        port: 11019
        targetPort: 11019
        protocol: TCP
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
configSync:
  logCollector:
    enabled: true
    seed: true
    watch: false
    kvKey: ""
    role: ""
    extraArgs: ""
    extraEnv: {}
  trapd:
    enabled: true
    seed: true
    watch: false
    kvKey: ""
    role: ""
    extraArgs: ""
    extraEnv: {}
  zen:
    enabled: true
    seed: true
    watch: false
    kvKey: ""
    role: ""
    extraArgs: ""
    extraEnv: {}
spire:
  enabled: false
  namespace: ""
  serverSelector: app=spire-server
  trustDomain: carverauto.dev
  clusterName: carverauto-cluster
  agentServiceAccount: spire-agent
  coreServiceAccount: serviceradar-core
  webNgServiceAccount: serviceradar-web-ng
  datasvcServiceAccount: serviceradar-datasvc
  serviceradarAgentServiceAccount: serviceradar-agent
  socketHostPath: ""
  joinTokenTTL: 15m
  logCollectorServiceAccount: serviceradar-log-collector
  # Deprecated: otel and flowgger are now merged into logCollector
  otelServiceAccount: serviceradar-otel
  zenServiceAccount: serviceradar-zen
  dbEventWriterServiceAccount: serviceradar-db-event-writer
  rperfCheckerServiceAccount: serviceradar-rperf-checker
  flowggerServiceAccount: serviceradar-flowgger
  trapdServiceAccount: serviceradar-trapd
  flowCollectorServiceAccount: serviceradar-flow-collector
  bmpCollectorServiceAccount: serviceradar-bmp-collector
  bundleConfigMap: spire-bundle
  server:
    image: ghcr.io/spiffe/spire-server:1.11.2
    logLevel: DEBUG
    adminIDs: []
    initConfigImage: busybox
    serviceName: spire-server
    serviceType: LoadBalancer
    dataPVC:
      size: 1Gi
      storageClass: ""
  agent:
    image: ghcr.io/spiffe/spire-agent:1.11.2
    logLevel: DEBUG
    waitForImage: cgr.dev/chainguard/wait-for-it
    hostNetwork: true
  tokenAudience: spire-server
  additionalAgentNamespaces: []
  postgres:
    enabled: true
    clusterName: cnpg
    database: spire
    instances: 3
    storageClass: local-path
    storageSize: 100Gi
    secretName: spire-db-credentials
    username: spire
    password: ""
    # If blank, Helm generates a random password and stores it in spire-db-credentials.
    # Existing secrets are reused; delete the secret to rotate.
    image: ghcr.io/carverauto/serviceradar-cnpg
    imageTag: ""
    imageName: ghcr.io/carverauto/serviceradar-cnpg:18.3.0-sr2
    imagePullSecrets: []
    sharedPreloadLibraries:
      - timescaledb
      - age
      - pg_stat_statements
    postgresqlParameters:
      log_min_duration_statement: "500ms"
      log_lock_waits: "on"
      deadlock_timeout: "1s"
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: "all"
      pg_stat_statements.track_planning: "on"
      track_io_timing: "on"
    extensionsSQL:
      - CREATE EXTENSION IF NOT EXISTS timescaledb;
      - CREATE EXTENSION IF NOT EXISTS age;
      - CREATE EXTENSION IF NOT EXISTS postgis;
      - CREATE EXTENSION IF NOT EXISTS vector;
      - CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
  controllerManager:
    enabled: true
    image: ghcr.io/spiffe/spire-controller-manager
