namespace: demo

# Pod topology spread constraints.
# When enabled, the scheduler distributes serviceradar pods across nodes.
topologySpread:
  enabled: false
  # maxSkew: 2
  # topologyKey: kubernetes.io/hostname
  # whenUnsatisfiable: ScheduleAnyway

# Global settings that apply across all services
global:
  # Override all ServiceRadar image tags at once. Defaults to "latest" so
  # published charts track the latest image tags without manual updates.
  imageTag: "latest"
  # Image pull policy: IfNotPresent (default), Always (for staging/mutable tags), Never
  imagePullPolicy: IfNotPresent

image:
  registryPullSecret: ghcr-io-cred
  tags:
    # Default tag for ServiceRadar images. Use global.imageTag to override all at once.
    appTag: &appTag "latest"
    core: *appTag
    webNg: *appTag
    nats: "2.12.2-alpine"
    datasvc: *appTag
    agent: *appTag
    agentGateway: *appTag
    dbEventWriter: *appTag
    logCollector: *appTag
    # Deprecated: otel and flowgger are now merged into logCollector
    otel: *appTag
    trapd: *appTag
    flowgger: *appTag
    flowCollector: *appTag
    bmpCollector: *appTag
    zen: *appTag
    rperfClient: *appTag
    faker: *appTag
    rperfChecker: *appTag
    tools: *appTag

tools:
  enabled: true
kv:
  enabled: true
  configSource: file
  bucket: serviceradar-datasvc
  address: serviceradar-datasvc:50057
  secMode: mtls
  trustDomain: ""
  serverSPIFFEID: ""
  workloadSocket: unix:/run/spire/sockets/agent.sock
  certDir: /etc/serviceradar/certs
natsCreds:
  # Inline NATS .creds files for platform/system accounts.
  # When set, these are stored in the serviceradar-nats-creds Secret.
  autoGenerate: true
  platform: ""
  system: ""
  operator: ""
nats:
  persistence:
    size: 30Gi
certs:
  runtimeSecretName: serviceradar-runtime-certs
  regenerator:
    # Disable by default to avoid unexpected cert rotation.
    enabled: false
checkerTemplates:
  # KV-backed checker template seeding is deprecated; leave disabled.
  enabled: false
zenRulesBootstrap:
  # Bootstrap zen rules into NATS KV on install/upgrade.
  # This ensures zen can load rules immediately after deployment.
  enabled: true
  # Force reinstall rules even if they already exist in KV.
  # Use this to recover from corrupted rules.
  forceReinstall: false
# OpenTelemetry exporter configuration for Elixir services (core-elx, web-ng, agent-gateway).
# Points to the OTEL collector deployed in the same namespace.
otelExporter:
  enabled: true
  # OTLP/gRPC endpoint (uses the unified log-collector service)
  endpoint: "https://serviceradar-log-collector:4317"
  # TLS certificate directory (SPIFFE-issued certs)
  certDir: "/etc/serviceradar/certs"
  # Trace sampling ratio (0.0 - 1.0). 1.0 = sample everything.
  samplingRatio: "1.0"

prometheusRules:
  cnpg:
    enabled: false
    clusterName: cnpg
    backendsWaitingWarning: 5
    slowQueryLogThresholdMs: 500

core:
  # KV watch/reload is no longer supported for service configuration.
  configWatchEnabled: false
  clusterStrategy: "dns"
  kubernetesSelector: "app=serviceradar-core"
  kubernetesNodeBasename: "serviceradar_core"
  ashObanSchedulerEnabled: true
  logPromotionConsumerEnabled: true
  mtrAutomation:
    enabled: false
    baselineEnabled: false
    triggerEnabled: false
    consensusEnabled: false
    baselineTickMs: 60000
    consensusCohortRetentionMs: 300000
  # Extra environment variables for the core-elx pod.
  extraEnv: {}
  database:
    poolSize: 40
    queueTargetMs: 2000
    queueIntervalMs: 2000
    timeoutMs: 120000
    poolTimeoutMs: 120000
  syncIngestor:
    batchConcurrency: 2
    coalesceMs: 250
    maxInflight: 2
    queueMaxChunks: 10
    async: true
  deviceEnrichment:
    rulesDir: "/var/lib/serviceradar/rules/device-enrichment"
    filesystemOverrides:
      enabled: false
      existingConfigMap: ""
      existingSecret: ""
      existingClaim: ""
  migrations:
    enabled: true
    markerPath: /var/lib/serviceradar/migrations/complete
  # Stale device reaper settings - controls cleanup of IP-only "ghost" devices
  reaper:
    # How often to run the reaper job
    interval: "1h"
    # How long a device without strong identity (IP-only) must be unseen before deletion
    ttl: "24h"
  identity:
    enabled: true
    # Enable promotion so sightings are turned into devices automatically.
    sightingsOnlyMode: true
    promotion:
      enabled: false
      shadowMode: false
      minPersistence: "1h"
      requireHostname: true
      requireFingerprint: false
    fingerprinting:
      enabled: false
      portBudget: 32
      timeout: "2s"
    reaper:
      interval: "1m"
      profiles:
        default:
          ttl: "24h"
        dynamic:
          ttl: "6h"
        guest:
          ttl: "1h"
        static:
          ttl: "72h"
          allowIPAsID: false
    drift:
      baselineDevices: 50000
      tolerancePercent: 2
      pauseOnDrift: true
      alertOnDrift: true
faker:
  enabled: false
  gobgp:
    # When enabled, an initContainer copies gobgpd/gobgp binaries into a shared volume
    # mounted into the faker container.
    enabled: false
    image:
      repository: docker.io/osrg/gobgp
      tag: latest
      pullPolicy: IfNotPresent
    binDir: /opt/gobgp
  simulation:
    totalDevices: 50000
    ipShuffle:
      enabled: true
      interval: "10m"
      percentage: 5
      warmupCycles: 2
      allowExpansion: false
      poolHeadroomPercent: 0
    bgp:
      enabled: false
      seed: 40164200
      publishInterval: "15s"
      outageInterval: "2m"
      outageDurationMin: "20s"
      outageDurationMax: "45s"
      manageDaemon: true
      gobgpApiAddress: "127.0.0.1:50051"
      gobgpBinary: "gobgpd"
      gobgpCliBinary: "gobgp"
      bmpCollectorAddress: "serviceradar-bmp-collector:11019"
      routerId: "204.209.51.59"
      maxPrefixesPerTick: 3
      localAsn: 401642
      advertisedPrefixes:
        - "23.138.124.0/24"
