# flowgger.toml for Docker deployment (used by log-collector)

[input]
type = "udp"
listen = "0.0.0.0:514"
format = "rfc3164"
rfc3164_timezone = "local"

[output]
type = "nats"
format = "gelf"
framing = "noop" # NATS output handles its own framing
# Partition for overlapping IP spaces
partition = "default"

# NATS JetStream specific settings (Docker deployment)
nats_url = "tls://nats:4222"
nats_subject = "logs.syslog"
nats_stream = "events" # Optional: defaults to "events"
nats_timeout = 30000 # Optional: ACK timeout in ms, defaults to 30000
nats_tls_ca_file = "/etc/serviceradar/certs/root.pem"
nats_creds_file = "/etc/serviceradar/creds/platform.creds"
nats_tls_cert = "/etc/serviceradar/certs/log-collector.pem"
nats_tls_key = "/etc/serviceradar/certs/log-collector-key.pem"

# gRPC health is handled by the log-collector unified health server.

[logging]
level = "info"
format = "json"
