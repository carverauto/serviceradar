id: hello-wasm
name: Hello Wasm
version: 0.1.0
description: TinyGo hello-world plugin for ServiceRadar
schema_version: 1
entrypoint: run_check
runtime: wasi-preview1
outputs: serviceradar.plugin_result.v1
capabilities:
  - get_config
  - log
  - submit_result
permissions: {}
resources:
