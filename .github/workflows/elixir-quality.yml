name: Elixir Quality
permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    branches: [main]
    paths:
      - 'elixir/**'
      - '.github/workflows/elixir-quality.yml'
      - '.tool-versions'
      - 'scripts/elixir_quality.sh'
  pull_request:
    branches: [main]
    paths:
      - 'elixir/**'
      - '.github/workflows/elixir-quality.yml'
      - '.tool-versions'
      - 'scripts/elixir_quality.sh'

jobs:
  quality:
    name: Elixir Quality (${{ matrix.name }})
    runs-on: arc-runner-set
    strategy:
      fail-fast: false
      matrix:
        include:
          # Temporary waiver: `mix dialyzer` currently crashes in this legacy fork
          # before analysis starts because the Dialyxir task cannot resolve
          # `Dialyxir.Output` under this project boot path.
          - name: connection
            project: elixir/connection
            phoenix: false
            credo: true
            dialyzer: false
            warnings_as_errors: true
          - name: datasvc
            project: elixir/datasvc
            phoenix: false
            credo: true
            dialyzer: true
            warnings_as_errors: true
          - name: elixir_uuid
            project: elixir/elixir_uuid
            phoenix: false
            credo: true
            dialyzer: true
            warnings_as_errors: true
          - name: serviceradar_agent_gateway
            project: elixir/serviceradar_agent_gateway
            phoenix: false
            credo: true
            dialyzer: true
            warnings_as_errors: true
          - name: serviceradar_core
            project: elixir/serviceradar_core
            phoenix: false
            credo: true
            dialyzer: true
            warnings_as_errors: true
          - name: serviceradar_core_elx
            project: elixir/serviceradar_core_elx
            phoenix: false
            credo: true
            dialyzer: true
            warnings_as_errors: true
          - name: serviceradar_srql
            project: elixir/serviceradar_srql
            phoenix: false
            credo: true
            dialyzer: true
            warnings_as_errors: true
          - name: web-ng
            project: elixir/web-ng
            phoenix: true
            credo: true
            dialyzer: true
            warnings_as_errors: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28.3'
          elixir-version: '1.19.4'

      - name: Cache Elixir dependencies and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.hex
            ~/.mix
            ${{ matrix.project }}/deps
            ${{ matrix.project }}/_build
          key: ${{ runner.os }}-elixir-quality-${{ matrix.name }}-${{ hashFiles(format('{0}/mix.exs', matrix.project), format('{0}/mix.lock', matrix.project), format('{0}/.formatter.exs', matrix.project), format('{0}/.credo.exs', matrix.project), format('{0}/.sobelow-conf', matrix.project), 'elixir/.credo.base.exs', 'elixir/.credo.ex_dna.exs', 'elixir/.credo.ex_slop.exs', '.tool-versions', 'scripts/elixir_quality.sh') }}
          restore-keys: |
            ${{ runner.os }}-elixir-quality-${{ matrix.name }}-

      - name: Run Elixir quality contract
        run: |
          args=(--project "${{ matrix.project }}")
          if [[ "${{ matrix.phoenix }}" == "true" ]]; then
            args+=(--phoenix)
          fi
          if [[ "${{ matrix.warnings_as_errors }}" != "true" ]]; then
            args+=(--skip-warnings-as-errors)
          fi
          if [[ "${{ matrix.credo }}" != "true" ]]; then
            args+=(--skip-credo)
          fi
          if [[ "${{ matrix.dialyzer }}" != "true" ]]; then
            args+=(--skip-dialyzer)
          fi
          ./scripts/elixir_quality.sh "${args[@]}"
