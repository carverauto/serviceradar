name: Derive Agent Release Public Key

on:
  workflow_dispatch:

jobs:
  derive-public-key:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    env:
      SERVICERADAR_AGENT_RELEASE_PRIVATE_KEY: ${{ secrets.SERVICERADAR_AGENT_RELEASE_PRIVATE_KEY }}
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Derive public key from release private key
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/derive_release_pub.go <<'EOF'
          package main

          import (
            "crypto/ed25519"
            "encoding/base64"
            "encoding/hex"
            "fmt"
            "os"
            "strings"
          )

          func decode(s string) ([]byte, error) {
            s = strings.TrimSpace(s)
            if b, err := hex.DecodeString(s); err == nil {
              return b, nil
            }
            for _, enc := range []*base64.Encoding{
              base64.StdEncoding,
              base64.RawStdEncoding,
              base64.URLEncoding,
              base64.RawURLEncoding,
            } {
              if b, err := enc.DecodeString(s); err == nil {
                return b, nil
              }
            }
            return nil, fmt.Errorf("could not decode release private key")
          }

          func main() {
            secret := strings.TrimSpace(os.Getenv("SERVICERADAR_AGENT_RELEASE_PRIVATE_KEY"))
            if secret == "" {
              panic("SERVICERADAR_AGENT_RELEASE_PRIVATE_KEY is not configured in the release environment")
            }

            keyBytes, err := decode(secret)
            if err != nil {
              panic(err)
            }

            var privateKey ed25519.PrivateKey
            switch len(keyBytes) {
            case ed25519.SeedSize:
              privateKey = ed25519.NewKeyFromSeed(keyBytes)
            case ed25519.PrivateKeySize:
              privateKey = ed25519.PrivateKey(keyBytes)
            default:
              panic(fmt.Sprintf("unexpected private key length: %d", len(keyBytes)))
            }

            publicKey := privateKey.Public().(ed25519.PublicKey)
            fmt.Printf("SERVICERADAR_AGENT_RELEASE_PUBLIC_KEY=%s\n", base64.StdEncoding.EncodeToString(publicKey))
          }
          EOF

          go run /tmp/derive_release_pub.go
