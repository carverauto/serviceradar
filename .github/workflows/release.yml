name: Publish Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (defaults to the event tag or VERSION file)."
        required: false
        type: string
      dry_run:
        description: "Run publish_packages in --dry_run mode."
        required: false
        type: boolean
        default: false
      append_notes:
        description: "Append notes when updating an existing release."
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        type: boolean
        default: false
      draft:
        description: "Create the GitHub release as a draft."
        required: false
        type: boolean
        default: false
      overwrite_assets:
        description: "Replace assets on the release when filenames match."
        required: false
        type: boolean
        default: true
      allow_local_fallback:
        description: "Allow local Bazel fallback if remote execution fails."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: arc-runner-set
    environment: release
    env:
      BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OCI_REGISTRY: registry.carverauto.dev
      OCI_PROJECT: serviceradar
      OCI_CHART_REPOSITORY: serviceradar/charts
      OCI_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
      OCI_TOKEN: ${{ secrets.HARBOR_ROBOT_SECRET }}
      ALLOW_LOCAL_FALLBACK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_local_fallback || 'false' }}
      BAZELISK_HOME: ${{ github.workspace }}/.cache/bazelisk
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Bazel artifacts
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BAZELISK_HOME }}
            third_party/bazel-repo-cache
            third_party/bazel-disk-cache
            third_party/distdir
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Ensure rpmbuild available for rules_pkg toolchain
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm rpm2cpio
          if ! command -v rpmbuild >/dev/null 2>&1; then
            echo "rpmbuild not found after install" >&2
            exit 1
          fi
          rpmbuild --version

      - name: Refresh Bazel externals after rpm install
        run: |
          # Force the rules_pkg rpmbuild toolchain to re-detect the system rpmbuild binary.
          if command -v bazel >/dev/null 2>&1; then
            bazel clean --expunge
          else
            echo "bazel not yet installed; skipping clean (Bazelisk step will follow)" >&2
          fi

      - name: Configure BuildBuddy remote cache
        if: ${{ env.BUILDBUDDY_ORG_API_KEY != '' }}
        run: |
          umask 077
          cat <<'EOF' | sed 's/^ *//' > .bazelrc.remote
            build --bes_results_url=https://carverauto.buildbuddy.io/invocation/
            build --bes_backend=grpcs://carverauto.buildbuddy.io
            build --remote_cache=grpcs://carverauto.buildbuddy.io
            build --remote_executor=grpcs://carverauto.buildbuddy.io
            build --remote_timeout=10m
            build --remote_download_minimal
            build --remote_upload_local_results
            build --jobs=100
            build --strategy=ExpandTemplate=local
            build --strategy=NpmPackageExtract=local
            build --strategy=CopyDirectory=local
          EOF
          printf 'common --remote_header=x-buildbuddy-api-key=%s\n' "${BUILDBUDDY_ORG_API_KEY}" >> .bazelrc.remote

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Verify Bazel version
        run: |
          set -euo pipefail
          expected="$(tr -d '\r\n' < .bazelversion)"
          actual="$(bazel --version | awk '{print $NF}')"
          echo "Expected Bazel: ${expected}"
          echo "Resolved Bazel: ${actual}"
          test "${actual}" = "${expected}"

      - name: Resolve release metadata
        id: release
        env:
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
          INPUT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          INPUT_APPEND_NOTES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.append_notes || 'false' }}
          INPUT_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || 'false' }}
          INPUT_DRAFT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft || 'false' }}
          INPUT_OVERWRITE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.overwrite_assets || 'true' }}
        run: |
          set -euo pipefail

          tag="$INPUT_TAG"
          if [[ -z "$tag" && "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          fi
          if [[ -z "$tag" ]]; then
            tag="$(< VERSION)"
          fi
          if [[ -z "$tag" ]]; then
            echo "Unable to determine release tag" >&2
            exit 1
          fi

          version="${tag#v}"
          file_version="$(< VERSION)"
          file_version="${file_version%%[$'\r\n']*}"
          if [[ -n "$file_version" && "$file_version" != "$version" ]]; then
            echo "VERSION file ($file_version) does not match release tag ($version)" >&2
            exit 1
          fi

          # Auto-detect pre-release from version pattern
          is_prerelease="${INPUT_PRERELEASE}"
          if [[ "$version" =~ -pre[0-9]*$ ]] || \
             [[ "$version" =~ -rc[0-9]*$ ]] || \
             [[ "$version" =~ -alpha[0-9]*$ ]] || \
             [[ "$version" =~ -beta[0-9]*$ ]]; then
            is_prerelease="true"
            echo "Auto-detected pre-release version: $version"
          fi

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "dry_run=${INPUT_DRY_RUN}"
            echo "append_notes=${INPUT_APPEND_NOTES}"
            echo "prerelease=${is_prerelease}"
            echo "draft=${INPUT_DRAFT}"
            echo "overwrite_assets=${INPUT_OVERWRITE}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes from CHANGELOG
        id: notes
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          notes_file="${RUNNER_TEMP}/release-notes.md"
          if scripts/extract-changelog.py "$VERSION" --output "$notes_file"; then
            echo "Using changelog entry for version $VERSION" >&2
          else
            echo "CHANGELOG entry not found for $VERSION, falling back to autogenerated notes" >&2
            {
              printf '# ServiceRadar %s\n\n' "$VERSION"
              printf 'Automated release generated by GitHub Actions.\n'
            } > "$notes_file"
          fi
          echo "path=${notes_file}" >> "$GITHUB_OUTPUT"
          echo "---- release notes preview ----"
          cat "$notes_file"
          echo "--------------------------------"

      - name: Authenticate Docker for OCI registry
        run: |
          set -euo pipefail
          login_registry() {
            local user="${1:-}"
            local token="${2:-}"
            if [[ -z "${user}" || -z "${token}" ]]; then
              return 1
            fi
            echo "${token}" | docker login "${OCI_REGISTRY}" -u "${user}" --password-stdin
          }

          if [[ -z "${OCI_USERNAME:-}" || -z "${OCI_TOKEN:-}" ]]; then
            echo "Missing Harbor robot credentials. Set HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET." >&2
            exit 1
          fi

          login_registry "${OCI_USERNAME}" "${OCI_TOKEN}"

          export OCI_DOCKER_AUTH=""
          unset OCI_DOCKER_AUTH || true
          {
            echo "OCI_USERNAME=${OCI_USERNAME}"
            echo "OCI_TOKEN=${OCI_TOKEN}"
            echo "OCI_DOCKER_AUTH="
          } >> "${GITHUB_ENV}"

          chmod +x ./buildbuddy_setup_docker_auth.sh
          ./buildbuddy_setup_docker_auth.sh

      - name: Publish container images
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          extra_args=()
          if [[ -n "${RELEASE_TAG}" ]]; then
            extra_args+=(-- --tag "${RELEASE_TAG}")
          fi

          if ! bazel run --config=remote_push --stamp //:push "${extra_args[@]}"; then
            if [[ "${ALLOW_LOCAL_FALLBACK:-false}" == "true" ]]; then
              echo "Remote bazel run failed; retrying locally without remote executor/cache" >&2
              bazel run \
                --remote_executor= \
                --remote_cache= \
                --noremote_accept_cached \
                --noremote_upload_local_results \
                --jobs=8 \
                --stamp \
                //:push \
                "${extra_args[@]}"
            else
              echo "Remote bazel run failed; local fallback disabled." >&2
              exit 1
            fi
          fi

          if ! command -v cosign >/dev/null 2>&1; then
            COSIGN_VERSION=v3.0.2
            sudo curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o /usr/local/bin/cosign
            sudo chmod +x /usr/local/bin/cosign
          fi

          COSIGN_KEYLESS=true ./scripts/sign-oci-publish.sh

          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq skopeo >/dev/null 2>&1
          fi

          verify_tags=(latest "sha-${GITHUB_SHA}")
          if [[ -n "${RELEASE_TAG}" ]]; then
            verify_tags+=("${RELEASE_TAG}")
          fi
          ./scripts/verify-ghcr-publish.sh "${verify_tags[@]}"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.4

      - name: Publish Helm chart to OCI registry
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          login_registry() {
            local user="${1:-}"
            local token="${2:-}"
            if [[ -z "${user}" || -z "${token}" ]]; then
              return 1
            fi
            echo "${token}" | helm registry login "${OCI_REGISTRY}" -u "${user}" --password-stdin
          }

          if [[ -z "${OCI_USERNAME:-}" || -z "${OCI_TOKEN:-}" ]]; then
            echo "Missing Harbor robot credentials. Set HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET." >&2
            exit 1
          fi

          login_registry "${OCI_USERNAME}" "${OCI_TOKEN}"

          # Package and push chart
          helm package helm/serviceradar
          helm push "serviceradar-${VERSION}.tgz" "oci://${OCI_REGISTRY}/${OCI_CHART_REPOSITORY}"

          # Cleanup
          rm -f "serviceradar-${VERSION}.tgz"

          echo "Published Helm chart: oci://${OCI_REGISTRY}/${OCI_CHART_REPOSITORY}/serviceradar:${VERSION}"

      - name: Publish release packages and agent manifest assets
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          NOTES_FILE: ${{ steps.notes.outputs.path }}
          DRY_RUN: ${{ steps.release.outputs.dry_run }}
          APPEND_NOTES: ${{ steps.release.outputs.append_notes }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
          DRAFT: ${{ steps.release.outputs.draft }}
          OVERWRITE_ASSETS: ${{ steps.release.outputs.overwrite_assets }}
          SERVICERADAR_AGENT_RELEASE_PRIVATE_KEY: ${{ secrets.SERVICERADAR_AGENT_RELEASE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "$RELEASE_TAG" ]]; then
            echo "Release tag is empty" >&2
            exit 1
          fi

          declare -a args
          args+=("--tag" "$RELEASE_TAG")
          if [[ -n "$NOTES_FILE" ]]; then
            args+=("--notes_file" "$NOTES_FILE")
          fi
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=("--dry_run")
          fi
          if [[ "$APPEND_NOTES" == "true" ]]; then
            args+=("--append_notes")
          fi
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=("--prerelease")
          fi
          # Always create/update the release as a draft so assets can be uploaded
          # even when immutable releases are enforced. We'll publish afterward
          # if the workflow input did not request a draft.
          args+=("--draft")
          if [[ "$OVERWRITE_ASSETS" != "true" ]]; then
            args+=("--overwrite_assets=${OVERWRITE_ASSETS}")
          fi

          run_remote() {
            bazel run \
              --config=remote \
              --platforms=//build/platforms:linux_pkg_local \
              --stamp \
              //build/release:publish_packages \
              -- "${args[@]}"
          }

          run_local() {
            bazel run \
              --config=no_remote \
              --host_platform=@local_config_platform//:host \
              --platforms=//build/platforms:linux_pkg_local \
              --stamp \
              //build/release:publish_packages \
              -- "${args[@]}"
          }

          if ! run_remote; then
            if [[ "${ALLOW_LOCAL_FALLBACK:-false}" == "true" ]]; then
              echo "Remote packaging failed; retrying locally without remote executor/cache" >&2
              run_local
            else
              echo "Remote packaging failed; local fallback disabled." >&2
              exit 1
            fi
          fi

      - name: Finalize GitHub release
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          DRAFT: ${{ steps.release.outputs.draft }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${DRAFT}" == "true" ]]; then
            echo "Release left as draft per workflow input."
            exit 0
          fi

          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          release_json=$(curl -sSf -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GITHUB_TOKEN}" "$api_url" || true)
          release_id=$(echo "$release_json" | jq -r '.id // empty')
          if [[ -z "${release_id}" ]]; then
            releases_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100"
            release_id=$(curl -sSf -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GITHUB_TOKEN}" "$releases_url" \
              | jq -r --arg tag "${RELEASE_TAG}" '.[] | select(.tag_name == $tag) | .id' \
              | head -n1)
          fi
          if [[ -z "${release_id}" ]]; then
            echo "Unable to resolve release id for ${RELEASE_TAG}" >&2
            exit 1
          fi

          curl -sSf -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -d '{"draft": false}' >/dev/null
          echo "Published release ${RELEASE_TAG}"

      - name: Verify uploaded release assets via API
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRE_MAC_PKG: ${{ env.REQUIRE_MAC_PKG }}
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          response=$(curl -sSf -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GITHUB_TOKEN}" "$api_url")
          printf 'Release asset summary for %s:\n' "$RELEASE_TAG"
          echo "$response" | jq '.assets[]? | {name, size, download_count}'
          deb_count=$(echo "$response" | jq '[.assets[]? | select(.name | endswith(".deb"))] | length')
          rpm_count=$(echo "$response" | jq '[.assets[]? | select(.name | endswith(".rpm"))] | length')
          pkg_count=$(echo "$response" | jq '[.assets[]? | select(.name | endswith(".pkg"))] | length')
          agent_runtime_count=$(echo "$response" | jq --arg asset "serviceradar-agent_${VERSION}_linux_amd64.tar.gz" '[.assets[]? | select(.name == $asset)] | length')
          agent_manifest_count=$(echo "$response" | jq '[.assets[]? | select(.name == "serviceradar-agent-release-manifest.json")] | length')
          agent_manifest_sig_count=$(echo "$response" | jq '[.assets[]? | select(.name == "serviceradar-agent-release-manifest.sig")] | length')
          if (( deb_count == 0 )); then
            echo "No .deb assets detected for ${RELEASE_TAG}" >&2
            exit 1
          fi
          if (( rpm_count == 0 )); then
            echo "No .rpm assets detected for ${RELEASE_TAG}" >&2
            exit 1
          fi
          if (( agent_runtime_count == 0 )); then
            echo "No managed agent runtime asset detected for ${RELEASE_TAG}" >&2
            exit 1
          fi
          if (( agent_manifest_count == 0 )); then
            echo "No agent release manifest asset detected for ${RELEASE_TAG}" >&2
            exit 1
          fi
          if (( agent_manifest_sig_count == 0 )); then
            echo "No agent release manifest signature asset detected for ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ "${REQUIRE_MAC_PKG:-false}" == "true" ]] && (( pkg_count == 0 )); then
            echo "No .pkg assets detected for ${RELEASE_TAG}" >&2
            exit 1
          fi
          echo "Validated presence of ${deb_count} .deb, ${rpm_count} .rpm, ${pkg_count} .pkg, ${agent_runtime_count} runtime archive, ${agent_manifest_count} manifest, and ${agent_manifest_sig_count} signature assets."
