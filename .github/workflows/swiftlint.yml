name: swiftlint
on: [push, pull_request]
permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  swiftlint:
    name: swiftlint
    runs-on: arc-runner-set
    env:
      SWIFTLINT_VERSION: "0.63.2"
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install swiftlint
        run: |
          set -euo pipefail
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64) ASSET="swiftlint_linux_amd64.zip" ;;
            aarch64|arm64) ASSET="swiftlint_linux_arm64.zip" ;;
            *) echo "Unsupported architecture: ${ARCH}" >&2; exit 1 ;;
          esac
          curl -fsSL -o /tmp/swiftlint.zip "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/${ASSET}"
          unzip -q /tmp/swiftlint.zip -d /tmp/swiftlint-bin
          install -m 0755 /tmp/swiftlint-bin/swiftlint /usr/local/bin/swiftlint
          swiftlint version
      - name: swiftlint
        run: swiftlint lint --config .swiftlint.yml
