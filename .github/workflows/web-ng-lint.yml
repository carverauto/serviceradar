name: Web-NG Lint
permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    branches: [ main ]
    paths:
      - 'elixir/web-ng/**'
      - '.github/workflows/web-ng-lint.yml'
      - '.tool-versions'
  pull_request:
    branches: [ main ]
    paths:
      - 'elixir/web-ng/**'
      - '.github/workflows/web-ng-lint.yml'
      - '.tool-versions'

jobs:
  credo:
    name: Credo
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: elixir/web-ng

    steps:
      - uses: actions/checkout@v6

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28.3'
          elixir-version: '1.19.4'

      - name: Install dependencies
        run: mix deps.get

      - name: Run Credo
        run: mix credo --all

  assets_js:
    name: Assets JS (Bun)
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: elixir/web-ng/assets

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install assets dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Run Vitest
        run: bun run test
