name: clang-tidy

on:
  push:
    branches:
      - main
    paths:
      - 'go/pkg/cpufreq/**'
      - 'Makefile'
      - '.bazelrc'
      - 'MODULE.bazel'
      - 'MODULE.bazel.lock'
      - '.github/workflows/clang-tidy.yml'
  pull_request:
    paths:
      - 'go/pkg/cpufreq/**'
      - 'Makefile'
      - '.bazelrc'
      - 'MODULE.bazel'
      - 'MODULE.bazel.lock'
      - '.github/workflows/clang-tidy.yml'

jobs:
  cpufreq-clang-tidy:
    runs-on: macos-14
    permissions:
      contents: read
    env:
      BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
      BAZELISK_HOME: ${{ github.workspace }}/.cache/bazelisk
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Bazel artifacts
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BAZELISK_HOME }}
            third_party/bazel-repo-cache
            third_party/bazel-disk-cache
            third_party/distdir
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Verify Bazel version
        run: |
          set -euo pipefail
          expected="$(tr -d '\r\n' < .bazelversion)"
          actual="$(bazel --version | awk '{print $NF}')"
          echo "Expected Bazel: ${expected}"
          echo "Resolved Bazel: ${actual}"
          test "${actual}" = "${expected}"

      - name: Configure remote cache
        if: ${{ env.BUILDBUDDY_ORG_API_KEY != '' }}
        run: |
          umask 077
          printf 'common --remote_header=x-buildbuddy-api-key=%s\n' "${BUILDBUDDY_ORG_API_KEY}" > .bazelrc.remote

      - name: Run clang-tidy via Bazel
        run: bazel build --config=clang-tidy //go/pkg/cpufreq:hostfreq_darwin_cc
