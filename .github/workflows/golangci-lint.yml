name: lint
on: [push, pull_request]
permissions:
  contents: read
  pull-requests: read
  checks: write
jobs:
  lint:
    name: lint
    runs-on: arc-runner-set
    # Removed the invalid job-level env block here
    steps:
      # Added a step to inject GOCACHE into the job's environment
      - name: Set GOCACHE
        run: echo "GOCACHE=${{ runner.temp }}/go-build" >> $GITHUB_ENV

      - name: checkout
        uses: actions/checkout@v6
        
      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          
      - name: go toolchain info
        run: |
          go version
          go env GOMOD GOCACHE GOTOOLCHAIN
          
      - name: Install golangci-lint
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.9.0

      - name: golangci-lint
        run: make lint-go
          
      - name: go mod tidy check
        uses: katexochen/go-tidy-check@v2
