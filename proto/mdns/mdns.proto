syntax = "proto3";
package mdnspb;
option go_package = "github.com/carverauto/serviceradar/proto/mdns;mdnspb";

message MdnsRecord {

  enum RecordType {
    UNKNOWN = 0;
    A = 1;
    AAAA = 2;
    PTR = 3;
  }
  RecordType record_type = 1;

  uint64 time_received_ns = 2;

  // IP of the broadcasting device
  bytes source_ip = 3;

  // The hostname (e.g., "mydevice.local")
  string hostname = 4;

  // IP bytes for A/AAAA, empty for PTR
  bytes resolved_addr = 5;

  // Human-readable resolved address
  string resolved_addr_str = 6;

  // DNS TTL in seconds
  uint32 dns_ttl = 7;

  // Full DNS name from the answer record
  string dns_name = 8;

  // Whether this was a response vs query
  bool is_response = 9;
}
