[package]
name = "serviceradar-mdns-collector"
version = "0.1.0"
edition = "2024"

[dependencies]
simple-dns = "0.9"
socket2 = { version = "0.5", features = ["all"] }
prost = "0.13"
async-nats = "0.42"
tokio = { version = "1.45", features = ["rt-multi-thread", "macros", "net", "sync", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
anyhow = "1"
clap = { version = "4", features = ["derive"] }

[build-dependencies]
tonic-build = "0.12"

[[bin]]
name = "serviceradar-mdns-collector"
path = "src/main.rs"
