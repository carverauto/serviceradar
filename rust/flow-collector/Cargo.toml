[package]
name = "serviceradar-flow-collector"
version = "0.1.0"
edition = "2024"

[dependencies]
flowparser-sflow = "0.3.0"
netflow_parser = { version = "1.0.0", features = ["parse_unknown_fields"] }
prost = "0.14"
async-nats = "0.42"
tokio = { version = "1.45", features = ["rt-multi-thread", "macros", "net", "sync", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
rustls = "0.23"

[build-dependencies]
tonic-build = "0.12"

[[bin]]
name = "serviceradar-flow-collector"
path = "src/main.rs"
