[package]
name = "serviceradar-bmp-collector"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
async-nats = "0.42"
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.45", features = ["rt-multi-thread", "macros", "io-std", "io-util", "time"] }

[[bin]]
name = "serviceradar-bmp-collector"
path = "src/main.rs"
