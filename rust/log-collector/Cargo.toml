[package]
name = "serviceradar-log-collector"
version = "0.1.0"
edition = "2024"
description = "Unified log collector for ServiceRadar — syslog/GELF (via Flowgger) and OpenTelemetry gRPC"

[[bin]]
name = "serviceradar-log-collector"
path = "src/main.rs"

[features]
default = ["syslog", "otel"]
syslog = ["flowgger/syslog", "flowgger/tls", "flowgger/gelf", "flowgger/nats-output"]
otel = ["dep:otel"]

[dependencies]
# Library crates for the two collectors
flowgger = { package = "serviceradar-flowgger", path = "../flowgger", default-features = false }
otel = { path = "../otel", optional = true }

# gRPC health check
tonic = { workspace = true }
tonic-health = { workspace = true }

# Shared
config-bootstrap = { path = "../config-bootstrap" }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
anyhow = "1"
log = "0.4"
env_logger = "0.11"
clap = { version = "4", features = ["derive"] }
rustls = "0.23"
