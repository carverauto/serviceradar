# ServiceRadar Flow Collector Service (NetFlow/IPFIX + sFlow)
#
# Deployment model: DaemonSet behind a `Service: LoadBalancer` with
# `externalTrafficPolicy: Local`. One pod runs on every schedulable node;
# the cloud L4 LB distributes UDP flow datagrams across nodes and source
# IP is preserved into the pod (kube-proxy skips SNAT under `Local`).
#
# Per-pod template caches are shared via a NATS JetStream KV bucket
# (`flow_templates`) so a flow record routed to a pod that hasn't seen
# the corresponding template can read it through from NATS rather than
# dropping the record. AutoScopedParser inside netflow_parser scopes
# templates per (source_ip, source_id) so exporters with the same
# template ID do not collide in the shared bucket.
apiVersion: v1
kind: ConfigMap
metadata:
  name: serviceradar-flow-collector-config
data:
  flow-collector.json: |
    {
      "nats_url": "tls://serviceradar-nats:4222",
      "nats_creds_file": "/etc/serviceradar/creds/platform.creds",
      "stream_name": "events",
      "channel_size": 10000,
      "batch_size": 100,
      "publish_timeout_ms": 5000,
      "security": {
        "mode": "mtls",
        "cert_dir": "/etc/serviceradar/certs",
        "tls": {
          "cert_file": "flow-collector.pem",
          "key_file": "flow-collector-key.pem",
          "ca_file": "ca.crt"
        }
      },
      "metrics_addr": "0.0.0.0:50046",
      "template_store": {
        "kv_bucket": "flow_templates",
        "kv_history": 1,
        "kv_ttl_secs": 0
      },
      "listeners": [
        {
          "protocol": "netflow",
          "listen_addr": "0.0.0.0:2055",
          "subject": "flows.raw.netflow",
          "buffer_size": 65536,
          "max_templates": 2000,
          "max_template_fields": 10000
        },
        {
          "protocol": "netflow",
          "listen_addr": "0.0.0.0:4739",
          "subject": "flows.raw.netflow",
          "buffer_size": 65536,
          "max_templates": 2000,
          "max_template_fields": 10000
        },
        {
          "protocol": "sflow",
          "listen_addr": "0.0.0.0:6343",
          "subject": "flows.raw.sflow"
        }
      ]
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: serviceradar-flow-collector
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  selector:
    matchLabels:
      app: serviceradar-flow-collector
      app.kubernetes.io/part-of: serviceradar
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      # One pod at a time so flows keep landing somewhere during upgrades.
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: serviceradar-flow-collector
        app.kubernetes.io/part-of: serviceradar
    spec:
      serviceAccountName: serviceradar-flow-collector
      imagePullSecrets:
      - name: registry-carverauto-dev-cred
      containers:
      - name: flow-collector
        image: registry.carverauto.dev/serviceradar/serviceradar-flow-collector:latest
        imagePullPolicy: Always
        ports:
        - name: netflow
          containerPort: 2055
          protocol: UDP
        - name: sflow
          containerPort: 6343
          protocol: UDP
        - name: ipfix
          containerPort: 4739
          protocol: UDP
        - name: metrics
          containerPort: 50046
          protocol: TCP
        args:
        - "--config"
        - "/etc/serviceradar/flow-collector.json"
        env:
        - name: RUST_LOG
          value: "info"
        # HTTP probe against the Prometheus endpoint — also confirms the
        # async runtime is alive (a deadlocked-but-running collector
        # would pass a `pgrep` check but fail this).
        livenessProbe:
          httpGet:
            path: /metrics
            port: 50046
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /metrics
            port: 50046
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          capabilities:
            add:
            - NET_BIND_SERVICE
        volumeMounts:
        - name: flow-collector-config
          mountPath: /etc/serviceradar
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
        - name: nats-creds
          mountPath: /etc/serviceradar/creds
          readOnly: true
        - name: logs
          mountPath: /var/log/serviceradar
      volumes:
      - name: flow-collector-config
        configMap:
          name: serviceradar-flow-collector-config
      - name: cert-data
        secret:
          secretName: serviceradar-runtime-certs
      - name: nats-creds
        secret:
          secretName: serviceradar-nats-creds
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-flow-collector
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  selector:
    app: serviceradar-flow-collector
  # Preserves the exporter's source IP through the LB → kube-proxy → pod
  # path. AutoScopedParser depends on this for per-source template scoping.
  externalTrafficPolicy: Local
  ports:
  - name: netflow
    port: 2055
    targetPort: 2055
    protocol: UDP
  - name: sflow
    port: 6343
    targetPort: 6343
    protocol: UDP
  - name: ipfix
    port: 4739
    targetPort: 4739
    protocol: UDP
  - name: metrics
    port: 50046
    targetPort: 50046
    protocol: TCP
  type: LoadBalancer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: serviceradar-flow-collector
  labels:
    app.kubernetes.io/part-of: serviceradar
