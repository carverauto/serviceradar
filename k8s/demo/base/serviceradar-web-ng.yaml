apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceradar-web-ng
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serviceradar-web-ng
      app.kubernetes.io/part-of: serviceradar
  template:
    metadata:
      labels:
        app: serviceradar-web-ng
        app.kubernetes.io/part-of: serviceradar
    spec:
      imagePullSecrets:
        - name: registry-carverauto-dev-cred
      containers:
        - name: web-ng
          image: registry.carverauto.dev/serviceradar/serviceradar-web-ng:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              value: "4000"
            - name: PHX_SERVER
              value: "true"
            - name: PHX_HOST
              value: "serviceradar-web-ng"
            - name: PHX_CHECK_ORIGIN
              value: "false"
            - name: SERVICERADAR_DEV_ROUTES
              value: "true"
            - name: SERVICERADAR_LOCAL_MAILER
              value: "true"
            - name: SERVICERADAR_ADMIN_EMAIL
              value: "root@localhost"
            - name: SERVICERADAR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: serviceradar-secrets
                  key: admin-password
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: serviceradar-secrets
                  key: web-ng-secret-key-base
            - name: CLOAK_KEY
              valueFrom:
                secretKeyRef:
                  name: serviceradar-secrets
                  key: cloak-key
            - name: PLUGIN_STORAGE_BACKEND
              value: "filesystem"
            - name: PLUGIN_STORAGE_PATH
              value: "/var/lib/serviceradar/plugin-packages/data"
            - name: PLUGIN_STORAGE_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: serviceradar-secrets
                  key: plugin-storage-signing-secret
            - name: CNPG_HOST
              value: "cnpg-rw.$(SERVICERADAR_NAMESPACE).svc"
            - name: CNPG_PORT
              value: "5432"
            - name: CNPG_DATABASE
              value: "telemetry"
            - name: CNPG_USERNAME
              value: "postgres"
            - name: CNPG_SSL_MODE
              value: "verify-full"
            - name: CNPG_CERT_DIR
              value: "/etc/serviceradar/cnpg"
            - name: CNPG_CA_FILE
              value: "/etc/serviceradar/cnpg/ca.crt"
            - name: CNPG_CERT_FILE
              value: "/etc/serviceradar/certs/web.pem"
            - name: CNPG_KEY_FILE
              value: "/etc/serviceradar/certs/web-key.pem"
            - name: CNPG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cnpg-superuser
                  key: password
          volumeMounts:
            - name: cert-data
              mountPath: /etc/serviceradar/certs
              readOnly: true
            - name: cnpg-ca
              mountPath: /etc/serviceradar/cnpg
              readOnly: true
            - name: plugin-packages
              mountPath: /var/lib/serviceradar/plugin-packages
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "200m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: cert-data
          secret:
            secretName: serviceradar-runtime-certs
        - name: cnpg-ca
          secret:
            secretName: cnpg-ca
        - name: plugin-packages
          persistentVolumeClaim:
            claimName: serviceradar-plugin-packages
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-web-ng
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  selector:
    app: serviceradar-web-ng
    app.kubernetes.io/part-of: serviceradar
  ports:
    - name: http
      port: 4000
      targetPort: http
