apiVersion: v1
kind: ServiceAccount
metadata:
  name: serviceradar-trivy-sidecar
  labels:
    app.kubernetes.io/part-of: serviceradar
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: serviceradar-trivy-sidecar
  labels:
    app.kubernetes.io/part-of: serviceradar
rules:
- apiGroups: ["aquasecurity.github.io"]
  resources:
  - vulnerabilityreports
  - configauditreports
  - exposedsecretreports
  - rbacassessmentreports
  - infraassessmentreports
  - clustervulnerabilityreports
  - clusterconfigauditreports
  - clusterexposedsecretreports
  - clusterrbacassessmentreports
  - clusterinfraassessmentreports
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
  - pods
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: serviceradar-trivy-sidecar
  labels:
    app.kubernetes.io/part-of: serviceradar
subjects:
- kind: ServiceAccount
  name: serviceradar-trivy-sidecar
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: serviceradar-trivy-sidecar
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceradar-trivy-sidecar
  labels:
    app: serviceradar-trivy-sidecar
    app.kubernetes.io/part-of: serviceradar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serviceradar-trivy-sidecar
      app.kubernetes.io/part-of: serviceradar
  template:
    metadata:
      labels:
        app: serviceradar-trivy-sidecar
        app.kubernetes.io/part-of: serviceradar
    spec:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
      serviceAccountName: serviceradar-trivy-sidecar
      imagePullSecrets:
      - name: registry-carverauto-dev-cred
      containers:
      - name: trivy-sidecar
        image: registry.carverauto.dev/serviceradar/serviceradar-trivy-sidecar:sha-4582835936b4-v7
        imagePullPolicy: Always
        env:
        - name: CLUSTER_ID
          value: demo
        - name: NATS_HOSTPORT
          value: tls://serviceradar-nats:4222
        - name: NATS_SUBJECT_PREFIX
          value: trivy.report
        - name: NATS_STREAM
          value: trivy_reports
        - name: NATS_CREDSFILE
          value: /etc/serviceradar/creds/platform.creds
        - name: NATS_CACERTFILE
          value: /etc/serviceradar/certs/ca.crt
        - name: NATS_CERTFILE
          value: /etc/serviceradar/certs/trivy-sidecar.pem
        - name: NATS_KEYFILE
          value: /etc/serviceradar/certs/trivy-sidecar-key.pem
        - name: NATS_SERVER_NAME
          value: serviceradar-nats
        - name: TRIVY_METRICS_ADDR
          value: :9108
        - name: TRIVY_PUBLISH_MAX_RETRIES
          value: "5"
        - name: TRIVY_PUBLISH_TIMEOUT
          value: 5s
        - name: TRIVY_PUBLISH_RETRY_DELAY
          value: 500ms
        - name: TRIVY_INFORMER_RESYNC
          value: 5m
        - name: TRIVY_REPORT_GROUP_VERSION
          value: aquasecurity.github.io/v1alpha1
        ports:
        - name: metrics
          containerPort: 9108
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: nats-creds
          mountPath: /etc/serviceradar/creds
          readOnly: true
        - name: cert-data
          mountPath: /etc/serviceradar/certs
          readOnly: true
      volumes:
      - name: nats-creds
        secret:
          secretName: serviceradar-nats-creds
      - name: cert-data
        secret:
          secretName: serviceradar-runtime-certs
---
apiVersion: v1
kind: Service
metadata:
  name: serviceradar-trivy-sidecar
  labels:
    app.kubernetes.io/part-of: serviceradar
spec:
  selector:
    app: serviceradar-trivy-sidecar
  ports:
  - name: metrics
    port: 9108
    targetPort: metrics
    protocol: TCP
