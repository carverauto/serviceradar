apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg
  namespace: demo
spec:
  instances: 3
  imageName: ghcr.io/carverauto/serviceradar-cnpg:18.3.0-sr2@sha256:a78b3afd204e4805f562649d74f2f2e391d8fb32d74ddf0a757d5360e583130a
  imagePullSecrets:
    - name: ghcr-io-cred

  storage:
    size: 100Gi
    storageClass: local-path

  bootstrap:
    initdb:
      database: spire
      owner: spire
      secret:
        name: spire-db-credentials
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS timescaledb;
        - CREATE EXTENSION IF NOT EXISTS age;
        - CREATE EXTENSION IF NOT EXISTS postgis;
        - CREATE EXTENSION IF NOT EXISTS vector;
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements;

  postgresql:
    parameters:
      log_min_duration_statement: "500ms"
      log_lock_waits: "on"
      deadlock_timeout: "1s"
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: "all"
      pg_stat_statements.track_planning: "on"
      track_io_timing: "on"
    shared_preload_libraries:
      - timescaledb
      - age
      - pg_stat_statements
    pg_hba:
      - "hostnossl all all all reject"
      - "hostssl all all all scram-sha-256 clientcert=verify-ca"

  certificates:
    clientCASecret: serviceradar-cnpg-client-ca

  managed:
    roles:
      - name: spire
        ensure: present
        login: true
        passwordSecret:
          name: spire-db-credentials

  monitoring:
    enablePodMonitor: true
