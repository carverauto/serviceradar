# ServiceRadar Zen Rules Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: serviceradar-zen-rules
data:
  cef_severity.json: |
    {
      "nodes": [
        { "id": "inputNode", "type": "inputNode", "name": "Request", "position": {"x": 80, "y": 150} },
        {
          "id": "cefTable",
          "type": "decisionTableNode",
          "name": "CEF Severity",
          "position": {"x": 300, "y": 150},
          "content": {
            "hitPolicy": "first",
            "inputs": [ {"field": "short_message", "id": "fld_msg", "name": "Short", "type": "expression"} ],
            "outputs": [ {"field": "severity", "id": "fld_sev", "name": "Severity", "type": "expression"} ],
            "rules": [
              {"_id": "r0", "fld_msg": "contains(short_message, '|0|') or contains(short_message, '|1|') or contains(short_message, '|2|') or contains(short_message, '|3|')", "fld_sev": "'Low'"},
              {"_id": "r1", "fld_msg": "contains(short_message, '|4|') or contains(short_message, '|5|') or contains(short_message, '|6|')", "fld_sev": "'Medium'"},
              {"_id": "r2", "fld_msg": "contains(short_message, '|7|') or contains(short_message, '|8|')", "fld_sev": "'High'"},
              {"_id": "r3", "fld_msg": "contains(short_message, '|9|') or contains(short_message, '|10|')", "fld_sev": "'Very High'"},
              {"_id": "r4", "fld_msg": "", "fld_sev": "'Unknown'"}
            ]
          }
        },
        { "id": "outputNode", "type": "outputNode", "name": "Response", "position": {"x": 560, "y": 150} }
      ],
      "edges": [
        {"id": "e1", "sourceId": "inputNode", "targetId": "cefTable", "type": "edge"},
        {"id": "e2", "sourceId": "cefTable", "targetId": "outputNode", "type": "edge"},
        {"id": "e3", "sourceId": "inputNode", "targetId": "outputNode", "type": "edge"}
      ]
    }
  strip_full_message.json: |
    {
      "nodes": [
        { "id": "inputNode", "type": "inputNode", "name": "Request", "position": { "x": 80, "y": 150 } },
        {
          "id": "stripFullMessage",
          "type": "expressionNode",
          "name": "Strip Full Message",
          "position": { "x": 300, "y": 150 },
          "content": {
            "expressions": [
              { "id": "expr1", "key": "full_message", "value": "null" }
            ]
          }
        },
        { "id": "outputNode", "type": "outputNode", "name": "Response", "position": { "x": 560, "y": 150 } }
      ],
      "edges": [
        { "id": "e1", "sourceId": "inputNode", "targetId": "stripFullMessage", "type": "edge" },
        { "id": "e2", "sourceId": "stripFullMessage", "targetId": "outputNode", "type": "edge" },
        { "id": "e3", "sourceId": "inputNode", "targetId": "outputNode", "type": "edge" }
      ]
    }
  snmp_severity.json: |
    {
      "nodes": [
        { "id": "inputNode", "type": "inputNode", "name": "Request", "position": { "x": 80, "y": 150 } },
        {
          "id": "setSeverity",
          "type": "expressionNode",
          "name": "Set SNMP Severity",
          "position": { "x": 300, "y": 150 },
          "content": {
            "expressions": [
              { "id": "expr1", "key": "severity", "value": "severity ?? 'Unknown'" },
              { "id": "expr2", "key": "source", "value": "'snmp'" },
              { "id": "expr3", "key": "service_name", "value": "'snmp'" },
              { "id": "expr4", "key": "body", "value": "(body == 'logs.snmp.processed' or body == '') ? (len(varbinds ?? []) > 0 ? (extract(varbinds[0].value ?? '', '^[^:]+: (.*)$')[1] ?? varbinds[0].value ?? body) : body) : body" }
            ]
          }
        },
        { "id": "outputNode", "type": "outputNode", "name": "Response", "position": { "x": 560, "y": 150 } }
      ],
      "edges": [
        { "id": "e1", "sourceId": "inputNode", "targetId": "setSeverity", "type": "edge" },
        { "id": "e2", "sourceId": "setSeverity", "targetId": "outputNode", "type": "edge" },
        { "id": "e3", "sourceId": "inputNode", "targetId": "outputNode", "type": "edge" }
      ]
    }
  passthrough.json: |
    {
      "nodes": [
        {
          "id": "inputNode",
          "type": "inputNode",
          "name": "Request",
          "position": { "x": 80, "y": 150 }
        },
        {
          "id": "outputNode",
          "type": "outputNode",
          "name": "Response",
          "position": { "x": 300, "y": 150 }
        }
      ],
      "edges": [
        {
          "id": "edge_1",
          "sourceId": "inputNode",
          "targetId": "outputNode",
          "type": "edge"
        }
      ]
    }
  netflow_to_ocsf.json: |
    {
      "nodes": [
        {
          "id": "inputNode",
          "type": "inputNode",
          "name": "Flow Input",
          "position": { "x": 80, "y": 150 }
        },
        {
          "id": "transformToOCSF",
          "type": "expressionNode",
          "name": "Transform to OCSF Network Activity",
          "position": { "x": 300, "y": 150 },
          "content": {
            "expressions": [
              {
                "id": "class_uid",
                "key": "class_uid",
                "value": "4001"
              },
              {
                "id": "category_uid",
                "key": "category_uid",
                "value": "4"
              },
              {
                "id": "activity_id",
                "key": "activity_id",
                "value": "6"
              },
              {
                "id": "type_uid",
                "key": "type_uid",
                "value": "400106"
              },
              {
                "id": "severity_id",
                "key": "severity_id",
                "value": "1"
              },
              {
                "id": "time",
                "key": "time",
                "value": "time_flow_end_ns > 0 ? time_flow_end_ns / 1000000 : time_received_ns / 1000000"
              },
              {
                "id": "start_time",
                "key": "start_time",
                "value": "time_flow_start_ns > 0 ? time_flow_start_ns / 1000000 : null"
              },
              {
                "id": "end_time",
                "key": "end_time",
                "value": "time_flow_end_ns > 0 ? time_flow_end_ns / 1000000 : null"
              },
              {
                "id": "src_endpoint",
                "key": "src_endpoint",
                "value": "{ ip: src_addr, port: src_port, autonomous_system: src_as > 0 ? { number: src_as } : null, interface_uid: in_if > 0 ? string(in_if) : null }"
              },
              {
                "id": "dst_endpoint",
                "key": "dst_endpoint",
                "value": "{ ip: dst_addr, port: dst_port, autonomous_system: dst_as > 0 ? { number: dst_as } : null, interface_uid: out_if > 0 ? string(out_if) : null }"
              },
              {
                "id": "connection_info",
                "key": "connection_info",
                "value": "{ protocol_num: proto, protocol_name: proto == 1 ? 'ICMP' : proto == 6 ? 'TCP' : proto == 17 ? 'UDP' : proto == 47 ? 'GRE' : proto == 50 ? 'ESP' : proto == 58 ? 'ICMPv6' : 'Unknown', tcp_flags: tcp_flags, direction_id: 0, boundary_id: 0 }"
              },
              {
                "id": "traffic",
                "key": "traffic",
                "value": "{ bytes: bytes, packets: packets, bytes_in: bytes, bytes_out: 0 }"
              },
              {
                "id": "network_endpoint",
                "key": "network_endpoint",
                "value": "{ ip: next_hop }"
              },
              {
                "id": "observables",
                "key": "observables",
                "value": "[{ name: 'sampler_address', type_id: 2, value: sampler_address }]"
              },
              {
                "id": "cloud",
                "key": "cloud",
                "value": "{ provider: 'on_prem' }"
              },
              {
                "id": "metadata",
                "key": "metadata",
                "value": "{ product: { name: 'ServiceRadar', vendor_name: 'Carver Automation', version: '1.0.0' }, version: '1.7.0', original_time: string(time_received_ns) }"
              },
              {
                "id": "unmapped",
                "key": "unmapped",
                "value": "{ flow_type: flow_type, sampling_rate: sampling_rate, ip_tos: ip_tos, vlan_id: vlan_id, observation_domain_id: observation_domain_id, sequence_num: sequence_num, src_vlan: src_vlan, dst_vlan: dst_vlan, src_mac: src_mac, dst_mac: dst_mac, forwarding_status: forwarding_status, icmp_type: icmp_type, icmp_code: icmp_code, ipv6_flow_label: ipv6_flow_label, fragment_id: fragment_id, fragment_offset: fragment_offset, src_net: src_net, dst_net: dst_net, bgp_next_hop: bgp_next_hop, bgp_communities: bgp_communities, as_path: as_path, mpls_label: mpls_label, mpls_ttl: mpls_ttl, etype: etype, ip_ttl: ip_ttl, ip_flags: ip_flags, next_hop_as: next_hop_as }"
              },
              {
                "id": "osint",
                "key": "osint",
                "value": "[]"
              }
            ]
          }
        },
        {
          "id": "outputNode",
          "type": "outputNode",
          "name": "OCSF Output",
          "position": { "x": 560, "y": 150 }
        }
      ],
      "edges": [
        {
          "id": "e1",
          "sourceId": "inputNode",
          "targetId": "transformToOCSF",
          "type": "edge"
        },
        {
          "id": "e2",
          "sourceId": "transformToOCSF",
          "targetId": "outputNode",
          "type": "edge"
        }
      ]
    }
