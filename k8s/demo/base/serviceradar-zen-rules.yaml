# ServiceRadar Zen Rules Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: serviceradar-zen-rules
data:
  cef_severity.json: |
    {
      "nodes": [
        { "id": "inputNode", "type": "inputNode", "name": "Request", "position": {"x": 80, "y": 150} },
        {
          "id": "setCefSeverity",
          "type": "expressionNode",
          "name": "Set CEF Severity",
          "position": {"x": 300, "y": 150},
          "content": {
            "expressions": [
              {
                "id": "expr1",
                "key": "severity",
                "value": "contains((short_message ?? body ?? ''), '|9|') or contains((short_message ?? body ?? ''), '|10|') ? 'Very High' : contains((short_message ?? body ?? ''), '|7|') or contains((short_message ?? body ?? ''), '|8|') ? 'High' : contains((short_message ?? body ?? ''), '|4|') or contains((short_message ?? body ?? ''), '|5|') or contains((short_message ?? body ?? ''), '|6|') ? 'Medium' : contains((short_message ?? body ?? ''), '|0|') or contains((short_message ?? body ?? ''), '|1|') or contains((short_message ?? body ?? ''), '|2|') or contains((short_message ?? body ?? ''), '|3|') ? 'Low' : severity ?? 'Unknown'"
              }
            ]
          }
        },
        { "id": "outputNode", "type": "outputNode", "name": "Response", "position": {"x": 560, "y": 150} }
      ],
      "edges": [
        {"id": "e1", "sourceId": "inputNode", "targetId": "setCefSeverity", "type": "edge"},
        {"id": "e2", "sourceId": "setCefSeverity", "targetId": "outputNode", "type": "edge"}
      ]
    }
  strip_full_message.json: |
    {
      "nodes": [
        { "id": "inputNode", "type": "inputNode", "name": "Request", "position": { "x": 80, "y": 150 } },
        {
          "id": "stripFullMessage",
          "type": "expressionNode",
          "name": "Strip Full Message",
          "position": { "x": 300, "y": 150 },
          "content": {
            "expressions": [
              { "id": "expr1", "key": "full_message", "value": "null" }
            ]
          }
        },
        { "id": "outputNode", "type": "outputNode", "name": "Response", "position": { "x": 560, "y": 150 } }
      ],
      "edges": [
        { "id": "e1", "sourceId": "inputNode", "targetId": "stripFullMessage", "type": "edge" },
        { "id": "e2", "sourceId": "stripFullMessage", "targetId": "outputNode", "type": "edge" },
        { "id": "e3", "sourceId": "inputNode", "targetId": "outputNode", "type": "edge" }
      ]
    }
  snmp_severity.json: |
    {
      "nodes": [
        { "id": "inputNode", "type": "inputNode", "name": "Request", "position": { "x": 80, "y": 150 } },
        {
          "id": "setSeverity",
          "type": "expressionNode",
          "name": "Set SNMP Severity",
          "position": { "x": 300, "y": 150 },
          "content": {
            "expressions": [
              { "id": "expr1", "key": "severity", "value": "severity ?? 'Unknown'" },
              { "id": "expr2", "key": "source", "value": "'snmp'" },
              { "id": "expr3", "key": "service_name", "value": "'snmp'" },
              { "id": "expr4", "key": "body", "value": "(body == 'logs.snmp.processed' or body == '') ? (len(varbinds ?? []) > 0 ? (extract(varbinds[0].value ?? '', '^[^:]+: (.*)$')[1] ?? varbinds[0].value ?? body) : body) : body" }
            ]
          }
        },
        { "id": "outputNode", "type": "outputNode", "name": "Response", "position": { "x": 560, "y": 150 } }
      ],
      "edges": [
        { "id": "e1", "sourceId": "inputNode", "targetId": "setSeverity", "type": "edge" },
        { "id": "e2", "sourceId": "setSeverity", "targetId": "outputNode", "type": "edge" },
        { "id": "e3", "sourceId": "inputNode", "targetId": "outputNode", "type": "edge" }
      ]
    }
  falco_normalize.json: |
    {
      "nodes": [
        { "id": "inputNode", "type": "inputNode", "name": "Request", "position": { "x": 80, "y": 150 } },
        {
          "id": "normalizeFalco",
          "type": "expressionNode",
          "name": "Normalize Falco Log",
          "position": { "x": 300, "y": 150 },
          "content": {
            "expressions": [
              { "id": "expr1", "key": "source", "value": "\"falco\"" },
              { "id": "expr2", "key": "service_name", "value": "\"falco\"" },
              { "id": "expr3", "key": "body", "value": "output ?? body ?? message ?? \"\"" },
              { "id": "expr4", "key": "event_name", "value": "rule ?? event_name ?? \"Falco Event\"" },
              { "id": "expr5", "key": "severity_text", "value": "priority ?? severity_text ?? severity ?? \"INFO\"" },
              { "id": "expr6", "key": "severity", "value": "priority ?? severity ?? severity_text ?? \"INFO\"" }
            ]
          }
        },
        { "id": "outputNode", "type": "outputNode", "name": "Response", "position": { "x": 560, "y": 150 } }
      ],
      "edges": [
        { "id": "e1", "sourceId": "inputNode", "targetId": "normalizeFalco", "type": "edge" },
        { "id": "e2", "sourceId": "normalizeFalco", "targetId": "outputNode", "type": "edge" }
      ]
    }
  passthrough.json: |
    {
      "nodes": [
        {
          "id": "inputNode",
          "type": "inputNode",
          "name": "Request",
          "position": { "x": 80, "y": 150 }
        },
        {
          "id": "outputNode",
          "type": "outputNode",
          "name": "Response",
          "position": { "x": 300, "y": 150 }
        }
      ],
      "edges": [
        {
          "id": "edge_1",
          "sourceId": "inputNode",
          "targetId": "outputNode",
          "type": "edge"
        }
      ]
    }
