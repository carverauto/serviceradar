apiVersion: v1
kind: ConfigMap
metadata:
  name: serviceradar-zen-config
data:
  zen.json: |
    {
      "nats_url": "tls://serviceradar-nats:4222",
      "stream_name": "events",
      "consumer_name": "zen-consumer",
      "subjects": [
        "*.logs.syslog",
        "*.logs.snmp",
        "*.logs.otel",
        "*.logs.internal.>",
        "*.otel.metrics.raw"
      ],
      "discover_rules_from_kv": true,
      "decision_groups": [
        {
          "name": "syslog",
          "subjects": ["*.logs.syslog"],
          "rules": [],
          "format": "json"
        },
        {
          "name": "snmp",
          "subjects": ["*.logs.snmp"],
          "rules": [],
          "format": "json"
        },
        {
          "name": "otel_logs",
          "subjects": ["*.logs.otel"],
          "rules": [],
          "format": "protobuf"
        },
        {
          "name": "otel_metrics_raw",
          "subjects": ["*.otel.metrics.raw"],
          "rules": [],
          "format": "otel_metrics"
        },
        {
          "name": "internal_logs",
          "subjects": ["*.logs.internal.>"],
          "rules": [],
          "format": "json"
        }
      ],
      "agent_id": "default-agent",
      "kv_bucket": "serviceradar-datasvc",
      "listen_addr": "0.0.0.0:50040",
      "result_subject_suffix": ".processed",
      "security": {
        "cert_file": "/etc/serviceradar/certs/zen.pem",
        "key_file": "/etc/serviceradar/certs/zen-key.pem",
        "ca_file": "/etc/serviceradar/certs/root.pem"
      },
      "grpc_security": {
        "cert_file": "/etc/serviceradar/certs/zen.pem",
        "key_file": "/etc/serviceradar/certs/zen-key.pem",
        "ca_file": "/etc/serviceradar/certs/root.pem"
      }
    }
