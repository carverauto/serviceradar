apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fulcio-route
  namespace: sigstore-system
  annotations:
    external-dns.alpha.kubernetes.io/hostname: fulcio.serviceradar.cloud
spec:
  hostnames:
    - fulcio.serviceradar.cloud
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: serviceradar-shared-gateway
      namespace: serviceradar-system
      sectionName: https-web
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: fulcio-server
          namespace: sigstore-system
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
---
