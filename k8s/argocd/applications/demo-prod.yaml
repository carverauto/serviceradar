apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: serviceradar-demo-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # OCI Helm chart from ghcr.io
    repoURL: ghcr.io/carverauto/charts
    chart: serviceradar
    targetRevision: "1.0.76"
    helm:
      releaseName: serviceradar
      # IMPORTANT: values-demo.yaml contains environment-specific overrides
      # including the CNPG cluster name. Never change clusterName without
      # migrating data first!
      valueFiles:
        - values-demo.yaml
      parameters:
        - name: global.imageTag
          value: "v1.0.76"

  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /status
    # Ignore CNPG cluster spec changes to prevent accidental data loss
    - group: postgresql.cnpg.io
      kind: Cluster
      jsonPointers:
        - /spec/instances
        - /spec/storage/size
  syncPolicy:
    automated:
      # CAUTION: prune=true will delete resources removed from git.
      # CNPG clusters are protected via ignoreDifferences above.
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
      # Prevent deletion of CNPG clusters during sync
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
