apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: serviceradar-demo-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://git.carverauto.dev/carverauto/serviceradar.git
    targetRevision: codex/topology-bootstrap-and-layout-simplification
    path: helm/serviceradar
    helm:
      releaseName: serviceradar
      # IMPORTANT: values-demo.yaml contains environment-specific overrides
      # including the CNPG cluster name. Never change clusterName without
      # migrating data first!
      valueFiles:
        - values-demo.yaml
      parameters:
        - name: global.imageTag
          value: sha-2bc15899038739c32584ecba82b2abc91370f849

  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /status
    # Ignore CNPG cluster spec changes to prevent accidental data loss
    - group: postgresql.cnpg.io
      kind: Cluster
      jsonPointers:
        - /spec/instances
        - /spec/storage/size
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
      # Prevent deletion of CNPG clusters during sync
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
