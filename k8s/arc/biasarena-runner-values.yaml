# Dedicated ARC runner scale set for the biasarena repository.
githubConfigUrl: https://github.com/carverauto/biasarena
githubConfigSecret: arc-runner-set-gha-rs-github-secret

runnerScaleSetName: biasarena-runner-set

minRunners: 1
maxRunners: 2

controllerServiceAccount:
  namespace: arc-systems
  name: arc-gha-rs-controller

template:
  spec:
    containers:
      - name: runner
        image: ghcr.io/carverauto/arc-runner@sha256:cd933c5c1e917d0e3ad96b81eb02f8dc9ce8ba9043eab7611c457dacf370f26f
        command:
          - /home/runner/run.sh
        args:
          - --jitconfig
          - $(ACTIONS_RUNNER_INPUT_JITCONFIG)
          - --once
        env:
          - name: ACTIONS_RUNNER_LABELS
            value: self-hosted,Linux,X64,biasarena-runner-set
