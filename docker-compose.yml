services:
  cert-generator:
    image: alpine:3.20
    container_name: serviceradar-cert-generator-mtls
    environment:
      # Optional extra SAN entries for `cnpg.pem` so clients can connect using a LAN IP
      # (example: CNPG_CERT_EXTRA_IPS=192.168.2.134)
      - CNPG_CERT_EXTRA_IPS=${CNPG_CERT_EXTRA_IPS:-}
      - CNPG_SUPERUSER=${CNPG_SUPERUSER:-}
      - CNPG_SUPERUSER_FILE=/etc/serviceradar/cnpg/superuser-username
    volumes:
      - cert-data:/certs
      - cnpg-credentials:/etc/serviceradar/cnpg:ro
      - ./docker/compose/generate-certs.sh:/generate-certs.sh:ro
    command: sh -c "apk add --no-cache openssl bash && cp /generate-certs.sh /tmp/gen.sh && chmod +x /tmp/gen.sh && CERT_DIR=/certs bash /tmp/gen.sh"
    depends_on:
      db-credentials:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - serviceradar-net

  cnpg-migrator:
    image: docker:28.0.1-cli
    container_name: serviceradar-cnpg-migrator
    environment:
      - FORCE=true
      - CNPG_ALLOW_RUNNING_COMPOSE_PROJECT=true
      - SERVICERADAR_VOLUME_PREFIX=${SERVICERADAR_VOLUME_PREFIX:-serviceradar}
      - CNPG_DATA_VOLUME=${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_cnpg-data
      - CNPG_CREDENTIALS_VOLUME=${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_cnpg-credentials
      - CNPG_DATABASE=${CNPG_DATABASE:-serviceradar}
      - CNPG_SUPERUSER=${CNPG_SUPERUSER:-}
      - CNPG_SUPERUSER_PASSWORD=${CNPG_SUPERUSER_PASSWORD:-}
      - CNPG_PASSWORD=${CNPG_PASSWORD:-}
      - CNPG_EXPECTED_PG_MAJOR=18
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/compose/migrate-cnpg-pg16-to-pg18.sh:/migrate-cnpg-pg16-to-pg18.sh:ro
    command: sh /migrate-cnpg-pg16-to-pg18.sh
    restart: "no"

  db-credentials:
    image: alpine:3.20
    container_name: serviceradar-db-credentials
    volumes:
      - cnpg-credentials:/etc/serviceradar/cnpg
      - cnpg-data:/var/lib/postgresql/18/docker:ro
      - ./docker/compose/bootstrap-db-credentials.sh:/bootstrap-db-credentials.sh:ro
    environment:
      - CNPG_DATA_DIR=/var/lib/postgresql/18/docker
      - CNPG_SUPERUSER=${CNPG_SUPERUSER:-}
      - CNPG_PASSWORD=${CNPG_PASSWORD:-}
      - CNPG_SUPERUSER_PASSWORD=${CNPG_SUPERUSER_PASSWORD:-}
    command: sh /bootstrap-db-credentials.sh
    depends_on:
      cnpg-migrator:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - serviceradar-net

  cnpg:
    image: ghcr.io/carverauto/serviceradar-cnpg:18.3.0-sr2
    container_name: serviceradar-cnpg-mtls
    user: "0:0"
    entrypoint: ["/bin/sh", "/check-cnpg-major-version.sh"]
    depends_on:
      db-credentials:
        condition: service_completed_successfully
      cert-generator:
        condition: service_completed_successfully
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=timescaledb,age"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/etc/serviceradar/certs/cnpg.pem"
      - "-c"
      - "ssl_key_file=/etc/serviceradar/certs/cnpg-key.pem"
      - "-c"
      - "ssl_ca_file=/etc/serviceradar/certs/root.pem"
      - "-c"
      - "hba_file=/etc/serviceradar/pg_hba.conf"
      - "-c"
      - "ident_file=/etc/serviceradar/pg_ident.conf"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "max_wal_size=1GB"
    environment:
      - CNPG_DATA_DIR=/var/lib/postgresql/18/docker
      - CNPG_EXPECTED_PG_MAJOR=18
      - POSTGRES_USER=${CNPG_SUPERUSER:-postgres}
      - POSTGRES_PASSWORD_FILE=/etc/serviceradar/cnpg/superuser-password
      - POSTGRES_DB=${CNPG_DATABASE:-serviceradar}
      - TS_TUNE=false
    ports:
      - "${CNPG_PUBLIC_BIND:-127.0.0.1}:${CNPG_PUBLIC_PORT:-5455}:5432"
    volumes:
      - cnpg-data:/var/lib/postgresql/18/docker
      - cert-data:/etc/serviceradar/certs:ro
      - cnpg-credentials:/etc/serviceradar/cnpg:ro
      - ./docker/compose/check-cnpg-major-version.sh:/check-cnpg-major-version.sh:ro
      - ./docker/compose/pg_hba.conf:/etc/serviceradar/pg_hba.conf:ro
      - ./docker/compose/pg_ident.conf:/etc/serviceradar/pg_ident.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "set -e; cp /etc/serviceradar/certs/db-superuser-key.pem /tmp/pg_healthcheck.key; chmod 600 /tmp/pg_healthcheck.key; CNPG_HEALTHCHECK_USER=$$(cat /etc/serviceradar/cnpg/superuser-username 2>/dev/null || printf '%s' ${CNPG_SUPERUSER:-postgres}); PGPASSWORD=$$(cat /etc/serviceradar/cnpg/superuser-password) PGSSLMODE=verify-full PGSSLROOTCERT=/etc/serviceradar/certs/root.pem PGSSLCERT=/etc/serviceradar/certs/db-superuser.pem PGSSLKEY=/tmp/pg_healthcheck.key pg_isready -h localhost -U $$CNPG_HEALTHCHECK_USER -d ${CNPG_DATABASE:-serviceradar}"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      serviceradar-net:
        aliases:
          - cnpg
          - cnpg-rw
    restart: unless-stopped

  cert-permissions-fixer:
    image: alpine:3.20
    container_name: serviceradar-cert-permissions-fixer-mtls
    volumes:
      - cert-data:/etc/serviceradar/certs
      - ./docker/compose/fix-cert-permissions.sh:/fix-cert-permissions.sh:ro
    command: sh /fix-cert-permissions.sh
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - serviceradar-net

  # Bootstrap admin credentials (idempotent).
  config-updater:
    image: alpine:3.20
    container_name: serviceradar-config-updater
    environment:
      - SERVICERADAR_ADMIN_EMAIL=${SERVICERADAR_ADMIN_EMAIL:-root@localhost}
    volumes:
      - admin-creds:/etc/serviceradar/admin
      - ./docker/compose/bootstrap-admin.sh:/bootstrap-admin.sh:ro
    command: sh /bootstrap-admin.sh
    restart: "no"
    networks:
      - serviceradar-net

  cloak-keygen:
    image: alpine:3.20
    container_name: serviceradar-cloak-keygen
    volumes:
      - cloak-key:/etc/serviceradar/cloak
    command: >
      sh -c 'set -e;
      mkdir -p /etc/serviceradar/cloak;
      if [ ! -f /etc/serviceradar/cloak/cloak.key ]; then
        umask 077;
        head -c 32 /dev/urandom | base64 | tr -d "\n" > /etc/serviceradar/cloak/cloak.key;
        echo "Generated CLOAK_KEY";
      else
        echo "CLOAK_KEY already present";
      fi'
    restart: "no"
    networks:
      - serviceradar-net

  core-elx-migrations:
    image: ghcr.io/carverauto/serviceradar-core-elx:${APP_TAG:-latest}
    container_name: serviceradar-core-elx-migrations
    hostname: core-elx-migrations
    environment:
      - CLUSTER_ENABLED=false
      - SERVICERADAR_CORE_REPO_ENABLED=true
      - SERVICERADAR_CORE_OBAN_ENABLED=false
      - SERVICERADAR_CORE_RUN_MIGRATIONS=true
      - SERVICERADAR_MIGRATION_ONLY=true
      - SERVICERADAR_MIGRATIONS_MARKER_PATH=/var/lib/serviceradar/migrations/complete
      - CLOAK_KEY_FILE=/etc/serviceradar/cloak/cloak.key
      - CNPG_HOST=${CNPG_DOCKER_HOST:-cnpg}
      - CNPG_PORT=${CNPG_DOCKER_PORT:-5432}
      - CNPG_DATABASE=${CNPG_DATABASE:-serviceradar}
      - CNPG_USERNAME_FILE=/etc/serviceradar/cnpg/superuser-username
      - CNPG_USERNAME=${CNPG_SUPERUSER:-postgres}
      - CNPG_PASSWORD_FILE=/etc/serviceradar/cnpg/superuser-password
      - CNPG_APP_USER=${CNPG_APP_USER:-serviceradar}
      - CNPG_APP_PASSWORD_FILE=/etc/serviceradar/cnpg/serviceradar-password
      - CNPG_SSL_MODE=${CNPG_SSL_MODE:-verify-full}
      - CNPG_TLS_SERVER_NAME=${CNPG_TLS_SERVER_NAME:-cnpg}
      - CNPG_CERT_DIR=/etc/serviceradar/certs
      - CNPG_CA_FILE=/etc/serviceradar/certs/root.pem
      - CNPG_CERT_FILE=/etc/serviceradar/certs/db-superuser.pem
      - CNPG_KEY_FILE=/etc/serviceradar/certs/db-superuser-key.pem
    volumes:
      - cert-data:/etc/serviceradar/certs:ro
      - cloak-key:/etc/serviceradar/cloak:ro
      - cnpg-credentials:/etc/serviceradar/cnpg:ro
      - migrations-data:/var/lib/serviceradar/migrations
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      cloak-keygen:
        condition: service_completed_successfully
      db-credentials:
        condition: service_completed_successfully
      cnpg:
        condition: service_healthy
    restart: "no"
    networks:
      - serviceradar-net

  core-elx:
    image: ghcr.io/carverauto/serviceradar-core-elx:${APP_TAG:-latest}
    container_name: serviceradar-core-elx-mtls
    hostname: core-elx
    environment:
      - CLUSTER_ENABLED=true
      - CLUSTER_STRATEGY=epmd
      - CLUSTER_HOSTS=serviceradar_web_ng@web-ng,serviceradar_agent_gateway@agent-gateway,serviceradar_agent_gateway_t2@agent-gateway-t2
      - ENABLE_TLS_DIST=true
      - SSL_DIST_OPTFILE=/etc/serviceradar/ssl_dist.conf
      - ELIXIR_ERL_OPTIONS=${ELIXIR_ERL_OPTIONS:-+fnu}
      - SPIFFE_CERT_DIR=/etc/serviceradar/certs
      - RELEASE_NODE=serviceradar_core@core-elx
      - RELEASE_DISTRIBUTION=sname
      - RELEASE_COOKIE=${RELEASE_COOKIE:-serviceradar_dev_cookie}
      - SERVICERADAR_CORE_OBAN_ENABLED=${SERVICERADAR_CORE_OBAN_ENABLED:-true}
      - SERVICERADAR_CORE_REPO_ENABLED=${SERVICERADAR_CORE_REPO_ENABLED:-true}
      - SERVICERADAR_CORE_RUN_MIGRATIONS=${SERVICERADAR_CORE_RUN_MIGRATIONS:-false}
      - SERVICERADAR_MIGRATIONS_MARKER_PATH=/var/lib/serviceradar/migrations/complete
      - SERVICERADAR_LOCAL_MAILER=${SERVICERADAR_LOCAL_MAILER:-false}
      - CLOAK_KEY_FILE=/etc/serviceradar/cloak/cloak.key
      - POOL_SIZE=${POOL_SIZE:-40}
      - DATABASE_QUEUE_TARGET_MS=${DATABASE_QUEUE_TARGET_MS:-2000}
      - DATABASE_QUEUE_INTERVAL_MS=${DATABASE_QUEUE_INTERVAL_MS:-2000}
      - DATABASE_TIMEOUT_MS=${DATABASE_TIMEOUT_MS:-120000}
      - DATABASE_POOL_TIMEOUT_MS=${DATABASE_POOL_TIMEOUT_MS:-120000}
      - SYNC_INGESTOR_BATCH_CONCURRENCY=${SYNC_INGESTOR_BATCH_CONCURRENCY:-2}
      - SYNC_INGESTOR_COALESCE_MS=${SYNC_INGESTOR_COALESCE_MS:-250}
      - SYNC_INGESTOR_MAX_INFLIGHT=${SYNC_INGESTOR_MAX_INFLIGHT:-2}
      - SYNC_INGESTOR_QUEUE_MAX_CHUNKS=${SYNC_INGESTOR_QUEUE_MAX_CHUNKS:-10}
      - SYNC_INGESTOR_ASYNC=${SYNC_INGESTOR_ASYNC:-true}
      - DEVICE_ENRICHMENT_RULES_DIR=/var/lib/serviceradar/rules/device-enrichment
      - PLUGIN_STORAGE_PUBLIC_URL=${PLUGIN_STORAGE_PUBLIC_URL:-http://web-ng:4000}
      - PLUGIN_STORAGE_SIGNING_SECRET=${PLUGIN_STORAGE_SIGNING_SECRET:-H8DPohD5rFUqGboVqCKLYXrlyofYUJk6k+XBzKEb5G8LN9brhYpNloE3UgxBQmPW}
      - PLUGIN_STORAGE_DOWNLOAD_TTL_SECONDS=${PLUGIN_STORAGE_DOWNLOAD_TTL_SECONDS:-86400}
      - CNPG_HOST=${CNPG_DOCKER_HOST:-cnpg}
      - CNPG_PORT=${CNPG_DOCKER_PORT:-5432}
      - CNPG_DATABASE=${CNPG_DATABASE:-serviceradar}
      - CNPG_USERNAME=${CNPG_USERNAME:-serviceradar}
      - CNPG_PASSWORD_FILE=/etc/serviceradar/cnpg/serviceradar-password
      - CNPG_SSL_MODE=${CNPG_SSL_MODE:-verify-full}
      - CNPG_TLS_SERVER_NAME=${CNPG_TLS_SERVER_NAME:-cnpg}
      - CNPG_CERT_DIR=/etc/serviceradar/certs
      - CNPG_CERT_FILE=/etc/serviceradar/certs/db-client.pem
      - CNPG_KEY_FILE=/etc/serviceradar/certs/db-client-key.pem
      # Datasvc gRPC client configuration
      - DATASVC_HOST=datasvc
      - DATASVC_PORT=50057
      - DATASVC_SSL=true
      - DATASVC_CERT_DIR=/etc/serviceradar/certs
      - DATASVC_CERT_NAME=core
      # EventWriter optional; db-event-writer handles NATS -> CNPG ingestion in compose
      - NATS_ENABLED=true
      - NATS_URL=nats://nats:4222
      - NATS_TLS=true
      - NATS_SERVER_NAME=nats.serviceradar
      - NATS_CREDS_FILE=/etc/serviceradar/creds/platform.creds
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://log-collector:4317
      - OTEL_CERT_DIR=/etc/serviceradar/certs
      - OTEL_CERT_NAME=core
      - OTEL_SERVICE_NAME=serviceradar-core-elx
    volumes:
      - cert-data:/etc/serviceradar/certs:ro
      - ./docker/compose/ssl_dist.core.conf:/etc/serviceradar/ssl_dist.conf:ro
      - cloak-key:/etc/serviceradar/cloak:ro
      - cnpg-credentials:/etc/serviceradar/cnpg:ro
      - ${NATS_CREDS_DIR:-./docker/compose/creds}:/etc/serviceradar/creds:ro
      - migrations-data:/var/lib/serviceradar/migrations
      - ${DEVICE_ENRICHMENT_RULES_DIR_HOST:-./docker/compose/rules/device-enrichment}:/var/lib/serviceradar/rules/device-enrichment:ro
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      cloak-keygen:
        condition: service_completed_successfully
      core-elx-migrations:
        condition: service_completed_successfully
      cnpg:
        condition: service_healthy
      nats:
        condition: service_started
      log-collector:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /var/lib/serviceradar/migrations/complete && /app/bin/serviceradar_core_elx pid"
        ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 300s
    networks:
      - serviceradar-net
    restart: unless-stopped

  # Bootstrap NATS operator/account credentials (idempotent).
  nats-creds-init:
    image: ghcr.io/carverauto/serviceradar-tools:${APP_TAG:-latest}
    container_name: serviceradar-nats-creds-init
    volumes:
      - ${NATS_CREDS_DIR:-./docker/compose/creds}:/etc/serviceradar/creds
      - ./docker/compose/creds:/seed/creds:ro
    environment:
      - NATS_OPERATOR_NAME=${NATS_OPERATOR_NAME:-serviceradar-dev}
      - NATS_OPERATOR_SEED=${NATS_OPERATOR_SEED:-}
      - NATS_SYSTEM_ACCOUNT_PUBLIC_KEY=${NATS_SYSTEM_ACCOUNT_PUBLIC_KEY:-}
    command:
      - bash
      - -c
      - |
          set -euo pipefail
          creds_dir="/etc/serviceradar/creds"
          seed_dir="/seed/creds"
          if [ -f "$${creds_dir}/operator.jwt" ]; then
            if [ ! -f "$${creds_dir}/operator.seed" ]; then
              if [ -n "$${NATS_OPERATOR_SEED}" ]; then
                echo "Persisting operator seed to creds volume."
                echo "$${NATS_OPERATOR_SEED}" > "$${creds_dir}/operator.seed"
                chmod 0600 "$${creds_dir}/operator.seed"
              else
                echo "Warning: operator.seed missing and NATS_OPERATOR_SEED not set; NATS account provisioning will fail."
              fi
            fi
            if [ ! -f "$${creds_dir}/system_account.pub" ] && [ -n "$${NATS_SYSTEM_ACCOUNT_PUBLIC_KEY}" ]; then
              echo "$${NATS_SYSTEM_ACCOUNT_PUBLIC_KEY}" > "$${creds_dir}/system_account.pub"
              chmod 0644 "$${creds_dir}/system_account.pub"
            fi
            echo "NATS creds already present; skipping bootstrap."
            exit 0
          fi
          mkdir -p "$${creds_dir}"
          if [ -f "$${seed_dir}/operator.jwt" ]; then
            echo "Copying seed NATS creds into volume."
            cp -a "$${seed_dir}/." "$${creds_dir}/"
            if [ ! -f "$${creds_dir}/operator.seed" ] && [ -n "$${NATS_OPERATOR_SEED}" ]; then
              echo "Persisting operator seed to creds volume."
              echo "$${NATS_OPERATOR_SEED}" > "$${creds_dir}/operator.seed"
              chmod 0600 "$${creds_dir}/operator.seed"
            fi
            if [ ! -f "$${creds_dir}/system_account.pub" ] && [ -n "$${NATS_SYSTEM_ACCOUNT_PUBLIC_KEY}" ]; then
              echo "$${NATS_SYSTEM_ACCOUNT_PUBLIC_KEY}" > "$${creds_dir}/system_account.pub"
              chmod 0644 "$${creds_dir}/system_account.pub"
            fi
            exit 0
          fi
          args=(nats-bootstrap --local --output-dir "$${creds_dir}" --operator-name "$${NATS_OPERATOR_NAME}" --output json)
          if [ -n "$${NATS_OPERATOR_SEED}" ]; then
            args+=(--import-operator-seed "$${NATS_OPERATOR_SEED}")
          fi
          serviceradar-cli "$${args[@]}"
          if [ ! -f "$${creds_dir}/operator.seed" ] && [ -n "$${NATS_OPERATOR_SEED}" ]; then
            echo "Persisting operator seed to creds volume."
            echo "$${NATS_OPERATOR_SEED}" > "$${creds_dir}/operator.seed"
            chmod 0600 "$${creds_dir}/operator.seed"
          fi
          if [ ! -f "$${creds_dir}/system_account.pub" ] && [ -n "$${NATS_SYSTEM_ACCOUNT_PUBLIC_KEY}" ]; then
            echo "$${NATS_SYSTEM_ACCOUNT_PUBLIC_KEY}" > "$${creds_dir}/system_account.pub"
            chmod 0644 "$${creds_dir}/system_account.pub"
          fi
    restart: "no"
    networks:
      - serviceradar-net

  # Initialize NATS resolver directory for account JWT persistence
  nats-config-init:
    image: alpine:3.20
    container_name: serviceradar-nats-config-init
    volumes:
      - nats-data:/data
      - ${NATS_CREDS_DIR:-./docker/compose/creds}:/etc/serviceradar/creds:ro
    depends_on:
      nats-creds-init:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - |
          set -e
          mkdir -p /data/jwt
          if [ -d /etc/serviceradar/creds/jwt ]; then
            find /etc/serviceradar/creds/jwt -maxdepth 1 -type f -name '*.jwt' -exec cp {} /data/jwt/ \;
            echo 'Seeded account JWTs from creds/jwt'
          fi
          if [ -f /etc/serviceradar/creds/system.jwt ] && [ -f /etc/serviceradar/creds/system_account.pub ]; then
            system_key="$$(cat /etc/serviceradar/creds/system_account.pub)"
            if [ -n "$${system_key}" ]; then
              cp /etc/serviceradar/creds/system.jwt "/data/jwt/$${system_key}.jwt"
              echo 'Seeded system account JWT'
            fi
          fi
          echo 'Prepared NATS resolver directory'
    restart: "no"
    networks:
      - serviceradar-net

  nats:
    image: nats:latest
    platform: linux/amd64
    container_name: serviceradar-nats-mtls
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    volumes:
      - nats-data:/data
      - cert-data:/etc/serviceradar/certs:ro
      - ${NATS_CREDS_DIR:-./docker/compose/creds}:/etc/serviceradar/creds:ro
      - ./docker/compose/nats.docker.conf:/etc/nats/nats-server.conf:ro
    command: ["--config", "/etc/nats/nats-server.conf"]
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      cert-permissions-fixer:
        condition: service_completed_successfully
      nats-config-init:
        condition: service_completed_successfully
    networks:
      serviceradar-net:
        aliases:
          - nats.serviceradar
          - serviceradar-nats
    restart: unless-stopped

  datasvc:
    image: ghcr.io/carverauto/serviceradar-datasvc:${APP_TAG:-latest}
    container_name: serviceradar-datasvc-mtls
    cpus: "2.0"
    ports:
      - "50057:50057"
    volumes:
      - ./docker/compose/datasvc.mtls.json:/etc/serviceradar/datasvc.json:ro
      - cert-data:/etc/serviceradar/certs:ro
      - ${NATS_CREDS_DIR:-./docker/compose/creds}:/etc/serviceradar/creds:ro
      - datasvc-data:/var/lib/serviceradar
      - ./logs:/var/log/serviceradar
    environment:
      - CONFIG_PATH=/etc/serviceradar/datasvc.json
      - WAIT_FOR_NATS=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NATS_OPERATOR_SEED=${NATS_OPERATOR_SEED:-}
      - NATS_SYSTEM_ACCOUNT_PUBLIC_KEY=${NATS_SYSTEM_ACCOUNT_PUBLIC_KEY:-}
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wait-for-port --host 127.0.0.1 --port 50057 --attempts 1 --interval 1s --quiet"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      serviceradar-net:
        aliases:
          - datasvc.serviceradar
    restart: unless-stopped

  agent:
    image: ghcr.io/carverauto/serviceradar-agent:${APP_TAG:-latest}
    container_name: serviceradar-agent-mtls
    hostname: agent
    # Note: agent is push-based and doesn't expose a gRPC server
    volumes:
      - ./docker/compose/agent.mtls.json:/etc/serviceradar/agent.json:ro
      - cert-data:/etc/serviceradar/certs:ro
      - agent-checkers:/var/lib/serviceradar/checkers
      - ./logs:/var/log/serviceradar
    environment:
      - CONFIG_PATH=/etc/serviceradar/agent.json
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      datasvc:
        condition: service_healthy
      agent-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f serviceradar-agent"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      serviceradar-net:
        aliases:
          - agent.serviceradar
    restart: unless-stopped

  agent-gateway:
    image: ghcr.io/carverauto/serviceradar-agent-gateway:${APP_TAG:-latest}
    container_name: serviceradar-agent-gateway-mtls
    hostname: agent-gateway
    environment:
      - GATEWAY_PARTITION_ID=${GATEWAY_PARTITION_ID:-default}
      - GATEWAY_ID=${GATEWAY_ID:-docker-gateway}
      - GATEWAY_DOMAIN=${GATEWAY_DOMAIN:-default}
      - GATEWAY_GRPC_PORT=50052
      # Disable StateMonitor - agent-gateway has no database
      - STATE_MONITOR_ENABLED=false
      - CLUSTER_ENABLED=true
      - CLUSTER_STRATEGY=epmd
      - CLUSTER_HOSTS=serviceradar_web_ng@web-ng,serviceradar_core@core-elx
      - ENABLE_TLS_DIST=true
      - SSL_DIST_OPTFILE=/etc/serviceradar/ssl_dist.conf
      - ELIXIR_ERL_OPTIONS=${ELIXIR_ERL_OPTIONS:-+fnu}
      - SPIFFE_CERT_DIR=/etc/serviceradar/certs
      - RELEASE_NODE=serviceradar_agent_gateway@agent-gateway
      - RELEASE_DISTRIBUTION=sname
      - RELEASE_COOKIE=${RELEASE_COOKIE:-serviceradar_dev_cookie}
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://log-collector:4317
      - OTEL_CERT_DIR=/etc/serviceradar/certs
      - OTEL_CERT_NAME=gateway
      - OTEL_SERVICE_NAME=serviceradar-agent-gateway
    ports:
      - "${GATEWAY_PUBLIC_BIND:-127.0.0.1}:${GATEWAY_PUBLIC_PORT:-50052}:50052"
    volumes:
      - cert-data:/etc/serviceradar/certs:ro
      - ./docker/compose/ssl_dist.gateway.conf:/etc/serviceradar/ssl_dist.conf:ro
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      core-elx:
        condition: service_healthy
      log-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "/app/bin/serviceradar_agent_gateway", "pid"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      serviceradar-net:
        aliases:
          - agent-gateway
          - agent-gateway.serviceradar
    restart: unless-stopped

  log-collector:
    image: ghcr.io/carverauto/serviceradar-log-collector:${APP_TAG:-latest}
    container_name: serviceradar-log-collector-mtls
    build:
      context: .
      dockerfile: docker/compose/Dockerfile.log-collector
    ports:
      - "514:514/udp"
      - "4317:4317"
      - "50044:50044"
    volumes:
      - ./docker/compose/log-collector.docker.toml:/etc/serviceradar/log-collector.toml:ro
      - ./docker/compose/flowgger.docker.toml:/etc/serviceradar/flowgger.toml:ro
      - ./docker/compose/otel.docker.toml:/etc/serviceradar/otel.toml:ro
      - cert-data:/etc/serviceradar/certs:ro
      - ${NATS_CREDS_DIR:-./docker/compose/creds}:/etc/serviceradar/creds:ro
      - log-collector-data:/var/lib/serviceradar
      - ./logs:/var/log/serviceradar
    environment:
      - CONFIG_SOURCE=file
      - CONFIG_PATH=/etc/serviceradar/log-collector.toml
      - LOG_LEVEL=${LOG_LEVEL:-info}
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      nats:
        condition: service_started
    networks:
      - serviceradar-net
    restart: unless-stopped

  trapd:
    image: ghcr.io/carverauto/serviceradar-trapd:${APP_TAG:-latest}
    container_name: serviceradar-trapd-mtls
    ports:
      - "162:162/udp"
      - "50043:50043"
    volumes:
      - ./docker/compose/trapd.docker.json:/etc/serviceradar/trapd.json:ro
      - cert-data:/etc/serviceradar/certs:ro
      - ${NATS_CREDS_DIR:-./docker/compose/creds}:/etc/serviceradar/creds:ro
      - trapd-data:/var/lib/serviceradar
      - ./logs:/var/log/serviceradar
    environment:
      - CONFIG_SOURCE=file
      - CONFIG_PATH=/etc/serviceradar/trapd.json
      - LOG_LEVEL=${LOG_LEVEL:-info}
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      nats:
        condition: service_started
    networks:
      - serviceradar-net
    restart: unless-stopped

  flow-collector:
    image: ghcr.io/carverauto/serviceradar-flow-collector:${APP_TAG:-latest}
    container_name: serviceradar-flow-collector-mtls
    build:
      context: .
      dockerfile: rust/flow-collector/Dockerfile
    ports:
      - "2055:2055/udp"       # NetFlow/IPFIX
      - "6343:6343/udp"       # sFlow
    volumes:
      - ./docker/compose/flow-collector.docker.json:/etc/serviceradar/flow-collector.json:ro
      - cert-data:/etc/serviceradar/certs:ro
      - ${NATS_CREDS_DIR:-./docker/compose/creds}:/etc/serviceradar/creds:ro
      - flow-data:/var/lib/serviceradar
      - ./logs:/var/log/serviceradar
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      nats:
        condition: service_started
    networks:
      - serviceradar-net
    restart: unless-stopped

  bmp-collector:
    image: ghcr.io/carverauto/arancini:${ARANCINI_TAG:-v0.7.2}
    container_name: serviceradar-bmp-collector-mtls
    ports:
      - "11019:11019"
    volumes:
      - cert-data:/etc/serviceradar/certs:ro
      - bmp-data:/var/lib/serviceradar
      - ./logs:/var/log/serviceradar
    command:
      - "--bmp-address=0.0.0.0:11019"
      - "--kafka-disable"
      - "--nats-enable"
      - "--nats-server=nats://nats:4222"
      - "--nats-subject=arancini.updates"
      - "--nats-tls-required"
      - "--nats-tls-ca-cert-path=/etc/serviceradar/certs/root.pem"
      - "--nats-tls-client-cert-path=/etc/serviceradar/certs/bmp-collector.pem"
      - "--nats-tls-client-key-path=/etc/serviceradar/certs/bmp-collector-key.pem"
      - "--curation-state-path=/var/lib/serviceradar/state.bin"
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      nats:
        condition: service_started
    networks:
      - serviceradar-net
    restart: unless-stopped

  zen:
    image: ghcr.io/carverauto/serviceradar-zen:${APP_TAG:-latest}
    container_name: serviceradar-zen-mtls
    ports:
      - "50040:50040"
    volumes:
      - ./docker/compose/zen.docker.json:/etc/serviceradar/zen.json:ro
      - cert-data:/etc/serviceradar/certs:ro
      - ${NATS_CREDS_DIR:-./docker/compose/creds}:/etc/serviceradar/creds:ro
      - zen-data:/var/lib/serviceradar
      - ./logs:/var/log/serviceradar
    environment:
      - CONFIG_SOURCE=file
      - CONFIG_PATH=/etc/serviceradar/zen.json
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      nats:
        condition: service_started
      datasvc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wait-for-port --host 127.0.0.1 --port 50040 --attempts 1 --interval 1s --quiet"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - serviceradar-net
    restart: unless-stopped

  db-event-writer:
    image: ghcr.io/carverauto/serviceradar-db-event-writer:${APP_TAG:-latest}
    container_name: serviceradar-db-event-writer-mtls
    ports:
      - "50041:50041"
    volumes:
      - ./docker/compose/db-event-writer.mtls.json:/etc/serviceradar/templates/db-event-writer.json:ro
      - cert-data:/etc/serviceradar/certs:ro
      - cnpg-credentials:/etc/serviceradar/cnpg:ro
      - ${NATS_CREDS_DIR:-./docker/compose/creds}:/etc/serviceradar/creds:ro
      - db-event-writer-data:/var/lib/serviceradar
      - db-event-writer-config:/etc/serviceradar/consumers
      - ./logs:/var/log/serviceradar
    environment:
      - CONFIG_SOURCE=file
      - CONFIG_PATH=/etc/serviceradar/templates/db-event-writer.json
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CNPG_HOST=${CNPG_DOCKER_HOST:-cnpg}
      - CNPG_PORT=${CNPG_DOCKER_PORT:-5432}
      - CNPG_DATABASE=${CNPG_DATABASE:-serviceradar}
      - CNPG_USERNAME=${CNPG_USERNAME:-serviceradar}
      - CNPG_PASSWORD_FILE=/etc/serviceradar/cnpg/serviceradar-password
      - CNPG_SSL_MODE=${CNPG_SSL_MODE:-verify-full}
      - CNPG_CERT_DIR=/etc/serviceradar/certs
      - CNPG_CA_FILE=/etc/serviceradar/certs/root.pem
      - CNPG_CERT_FILE=/etc/serviceradar/certs/db-client.pem
      - CNPG_KEY_FILE=/etc/serviceradar/certs/db-client-key.pem
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      nats:
        condition: service_started
      cnpg:
        condition: service_healthy
      core-elx-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wait-for-port --host 127.0.0.1 --port 50041 --attempts 1 --interval 1s --quiet"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - serviceradar-net
    restart: unless-stopped

  web-ng:
    image: ghcr.io/carverauto/serviceradar-web-ng:${APP_TAG:-latest}
    container_name: serviceradar-web-ng-mtls
    environment:
      - PORT=4000
      - PHX_SERVER=true
      - PHX_HOST=${SERVICERADAR_HOST:-localhost}
      - PHX_CHECK_ORIGIN=${PHX_CHECK_ORIGIN:-false}
      - SERVICERADAR_DEV_ROUTES=${SERVICERADAR_DEV_ROUTES:-true}
      - SERVICERADAR_LOCAL_MAILER=${SERVICERADAR_LOCAL_MAILER:-true}
      - SERVICERADAR_WEB_NG_OBAN_ENABLED=${SERVICERADAR_WEB_NG_OBAN_ENABLED:-true}
      - SERVICERADAR_GOD_VIEW_ENABLED=true
      - SERVICERADAR_ADMIN_EMAIL=${SERVICERADAR_ADMIN_EMAIL:-root@localhost}
      - SERVICERADAR_ADMIN_PASSWORD_FILE=/etc/serviceradar/admin/admin-password
      - SERVICERADAR_GATEWAY_ADDR=${SERVICERADAR_GATEWAY_ADDR:-${SERVICERADAR_HOST:-localhost}:50052}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - CORE_ADDRESS=${CORE_ADDRESS:-core-elx:50052}
      - CLUSTER_ENABLED=true
      - CLUSTER_STRATEGY=epmd
      - CLUSTER_HOSTS=serviceradar_agent_gateway@agent-gateway,serviceradar_core@core-elx,serviceradar_agent_gateway_t2@agent-gateway-t2
      - CLUSTER_TLS_ENABLED=true
      - SSL_DIST_OPTFILE=/etc/serviceradar/ssl_dist.conf
      - ELIXIR_ERL_OPTIONS=${ELIXIR_ERL_OPTIONS:-+fnu}
      - RELEASE_NODE=serviceradar_web_ng@web-ng
      - RELEASE_DISTRIBUTION=sname
      - RELEASE_COOKIE=${RELEASE_COOKIE:-serviceradar_dev_cookie}
      - SERVICERADAR_SECURITY_MODE=${SERVICERADAR_SECURITY_MODE:-mtls}
      - SECRET_KEY_BASE=${WEB_NG_SECRET_KEY_BASE:-H8DPohD5rFUqGboVqCKLYXrlyofYUJk6k+XBzKEb5G8LN9brhYpNloE3UgxBQmPW}
      - PLUGIN_STORAGE_BACKEND=filesystem
      - PLUGIN_STORAGE_PATH=/var/lib/serviceradar/plugin-packages
      - PLUGIN_STORAGE_SIGNING_SECRET=${PLUGIN_STORAGE_SIGNING_SECRET:-H8DPohD5rFUqGboVqCKLYXrlyofYUJk6k+XBzKEb5G8LN9brhYpNloE3UgxBQmPW}
      - DEVICE_ENRICHMENT_RULES_DIR=/var/lib/serviceradar/rules/device-enrichment
      - CLOAK_KEY_FILE=/etc/serviceradar/cloak/cloak.key
      - ADMIN_BASIC_AUTH_USERNAME=${ADMIN_BASIC_AUTH_USERNAME:-}
      - ADMIN_BASIC_AUTH_PASSWORD=${ADMIN_BASIC_AUTH_PASSWORD:-}
      - CNPG_HOST=${CNPG_DOCKER_HOST:-cnpg}
      - CNPG_PORT=${CNPG_DOCKER_PORT:-5432}
      - CNPG_DATABASE=${CNPG_DATABASE:-serviceradar}
      - CNPG_USERNAME=${CNPG_USERNAME:-serviceradar}
      - CNPG_PASSWORD_FILE=/etc/serviceradar/cnpg/serviceradar-password
      - CNPG_SSL_MODE=${CNPG_SSL_MODE:-verify-full}
      - CNPG_TLS_SERVER_NAME=${CNPG_TLS_SERVER_NAME:-cnpg}
      - CNPG_CERT_DIR=/etc/serviceradar/certs
      - CNPG_CERT_FILE=/etc/serviceradar/certs/db-client.pem
      - CNPG_KEY_FILE=/etc/serviceradar/certs/db-client-key.pem
      # Datasvc gRPC client configuration
      - DATASVC_ADDRESS=datasvc:50057
      - DATASVC_HOST=datasvc
      - DATASVC_PORT=50057
      - DATASVC_SSL=true
      - DATASVC_CERT_DIR=/etc/serviceradar/certs
      - DATASVC_CERT_NAME=web
      - DATASVC_SERVER_NAME=datasvc.serviceradar
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://log-collector:4317
      - OTEL_CERT_DIR=/etc/serviceradar/certs
      - OTEL_CERT_NAME=web
      - OTEL_SERVICE_NAME=serviceradar-web-ng
    volumes:
      - cert-data:/etc/serviceradar/certs:ro
      - admin-creds:/etc/serviceradar/admin:ro
      - ./docker/compose/ssl_dist.web.conf:/etc/serviceradar/ssl_dist.conf:ro
      - cloak-key:/etc/serviceradar/cloak:ro
      - cnpg-credentials:/etc/serviceradar/cnpg:ro
      - plugin-packages:/var/lib/serviceradar/plugin-packages
      - ${DEVICE_ENRICHMENT_RULES_DIR_HOST:-./docker/compose/rules/device-enrichment}:/var/lib/serviceradar/rules/device-enrichment
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      config-updater:
        condition: service_completed_successfully
      cloak-keygen:
        condition: service_completed_successfully
      cnpg:
        condition: service_healthy
      core-elx-migrations:
        condition: service_completed_successfully
      core-elx:
        condition: service_healthy
      log-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f serviceradar_web_ng >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - serviceradar-net
    restart: unless-stopped

  caddy:
    image: caddy:2.8.4-alpine
    container_name: serviceradar-caddy-mtls
    user: "0:0"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - cert-data:/etc/serviceradar/certs:ro
      - ./docker/compose/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      cert-permissions-fixer:
        condition: service_completed_successfully
      web-ng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - serviceradar-net
    restart: unless-stopped

volumes:
  agent-checkers:
    name: "${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_agent-checkers"
  cert-data:
    name: "${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_cert-data"
  cnpg-credentials:
    name: "${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_cnpg-credentials"
  cnpg-data:
    name: "${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_cnpg-data"
  datasvc-data:
  nats-data:
    name: "${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_nats-data"
  nats-creds:
    name: "${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_nats-creds"
  cloak-key:
    name: "${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_cloak-key"
  admin-creds:
    name: "${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_admin-creds"
  migrations-data:
    name: "${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_migrations-data"
  plugin-packages:
    name: "${SERVICERADAR_VOLUME_PREFIX:-serviceradar}_plugin-packages"
  logs:
  log-collector-data:
  trapd-data:
  flow-data:
  bmp-data:
  zen-data:
  db-event-writer-data:
  db-event-writer-config:

networks:
  serviceradar-net:
    driver: bridge
